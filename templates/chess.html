<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MattFish Chess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            gap: 30px;
            padding: 20px;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { color: #e74c3c; margin: 0; font-size: 28px; }
        #status {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            font-size: 15px;
        }
        .diff-btn, .color-btn, .undo-btn, .sound-btn, .eval-btn {
            padding: 10px;
            border: 2px solid #444;
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .diff-btn:hover, .color-btn:hover { border-color: #666; }
        .diff-btn.active, .color-btn.active { 
            border-color: #4CAF50; 
            background: rgba(76,175,80,0.2); 
        }
        .undo-btn {
            border-color: #f39c12;
            background: rgba(243,156,18,0.1);
        }
        .undo-btn:hover {
            border-color: #f39c12;
            background: rgba(243,156,18,0.2);
        }
        .undo-btn:disabled {
            border-color: #555;
            background: transparent;
            color: #666;
            cursor: not-allowed;
        }
        .sound-btn {
            border-color: #2196F3;
            background: rgba(33,150,243,0.1);
        }
        .sound-btn:hover {
            border-color: #2196F3;
            background: rgba(33,150,243,0.2);
        }
        .sound-btn.off {
            border-color: #555;
            background: transparent;
            color: #666;
        }
        .eval-btn {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.1);
        }
        .eval-btn:hover {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.2);
        }
        .eval-btn.active {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.3);
        }
        .new-game-btn {
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .new-game-btn:hover { background: #c0392b; }
        .board-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .board-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .coords-ranks {
            position: absolute;
            left: -25px;
            top: 0;
            height: 560px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            font-size: 14px;
            color: #888;
            width: 20px;
            text-align: center;
        }
        .coords-files {
            display: flex;
            justify-content: space-around;
            width: 560px;
            padding: 5px 0;
            font-size: 14px;
            color: #888;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 3px solid #555;
            border-radius: 4px;
        }
        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.1s;
        }
        .square img {
            width: 60px;
            height: 60px;
            pointer-events: none;
        }
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        .square:hover { filter: brightness(1.15); }
        .selected { background: #f7ec5f !important; }
        .last-move { box-shadow: inset 0 0 0 4px rgba(255, 107, 107, 0.7); }
        .legal::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            pointer-events: none;
        }
        .light.legal::after { background: rgba(0, 0, 0, 0.2); }
        .dark.legal::after { background: rgba(255, 255, 255, 0.25); }
        .promotion-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .promotion-modal.active { display: flex; }
        .promo-piece {
            width: 80px;
            height: 80px;
            cursor: pointer;
            background: #f0d9b5;
            border-radius: 10px;
            margin: 10px;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .promo-piece:hover { transform: scale(1.1); background: #fff; }
        .promo-piece img { width: 70px; height: 70px; }
        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-text { font-size: 42px; font-weight: bold; margin-bottom: 20px; }
        .play-again-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .move-history {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            width: 560px;
            max-height: 120px;
            overflow-y: auto;
        }
        .move-history h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .moves-list { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
        .move-pair { background: #1a1a2e; padding: 4px 8px; border-radius: 4px; }
        .move-num { color: #888; }
        .move-w { color: #f0d9b5; }
        .move-b { color: #b58863; }
        .section-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-top: 5px;
        }
        /* ========== EVALUATION BAR ========== */
        .eval-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .eval-container.active {
            display: flex;
        }
        .eval-bar-wrapper {
            width: 30px;
            height: 560px;
            background: #2e2e2e;
            border: 2px solid #555;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .eval-bar-white {
            position: absolute;
            left: 0;
            right: 0;
            background: #f0d9b5;
            transition: height 0.5s ease;
        }
        .eval-bar-black {
            position: absolute;
            left: 0;
            right: 0;
            background: #b58863;
            transition: height 0.5s ease;
        }
        .eval-bar-white {
            bottom: 0;
        }
        .eval-bar-black {
            top: 0;
        }
        .eval-bar-wrapper.flipped .eval-bar-white {
            bottom: auto;
            top: 0;
        }
        .eval-bar-wrapper.flipped .eval-bar-black {
            top: auto;
            bottom: 0;
        }
        .eval-center-line {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 2px;
            background: #e74c3c;
            z-index: 2;
        }
        .eval-number {
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-align: center;
            min-width: 50px;
        }
        .eval-label {
            font-size: 10px;
            color: #888;
            text-align: center;
        }
        .eval-label-player {
            color: #4CAF50;
            font-weight: bold;
        }

        /* ========== PERSONALIZATION PANEL ========== */
        .personalize-panel {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
        }
        .personalize-panel h3 {
            font-size: 14px;
            color: #e74c3c;
            margin-bottom: 12px;
            text-align: center;
        }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .color-swatch {
            width: 100%;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .color-swatch:hover {
            transform: scale(1.1);
            border-color: white;
        }
        .color-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 0 2px #e74c3c;
        }
        .custom-color-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .custom-color-row label {
            font-size: 12px;
            color: #aaa;
        }
        .custom-color-row input[type="color"] {
            width: 40px;
            height: 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        .custom-color-row input[type="text"] {
            flex: 1;
            padding: 6px 8px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
        }
        .upload-area {
            border: 2px dashed #555;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .upload-area:hover {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }
        .upload-area.dragover {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .upload-area p {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-btn {
            padding: 6px 14px;
            font-size: 12px;
            background: #444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .upload-btn:hover { background: #555; }
        .preview-img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 6px;
            margin-top: 8px;
            display: none;
        }
        .preview-img.visible {
            display: block;
        }
        .remove-img-btn {
            padding: 4px 10px;
            font-size: 11px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 6px;
            display: none;
        }
        .remove-img-btn.visible {
            display: inline-block;
        }
        .remove-img-btn:hover { background: #a93226; }
        .reset-btn {
            width: 100%;
            padding: 8px;
            font-size: 12px;
            background: #555;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
        }
        .reset-btn:hover { background: #666; }
        .bg-image-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            opacity: 0.15;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-image-overlay" id="bgImageOverlay"></div>

    <div class="sidebar">
        <h1 id="appTitle">♔ MattFish</h1>
        <div id="status">Click "New Game" to start</div>

        <div class="section-title">Difficulty</div>
        <div>
            <button class="diff-btn" onclick="setDiff('Easy')">Easy</button>
            <button class="diff-btn active" onclick="setDiff('Medium')">Medium</button>
            <button class="diff-btn" onclick="setDiff('Hard')">Hard</button>
        </div>

        <div class="section-title">Play As</div>
        <div>
            <button class="color-btn active" onclick="setColor('white')">White</button>
            <button class="color-btn" onclick="setColor('black')">Black</button>
        </div>

        <button class="undo-btn" id="undoBtn" onclick="undoMove()" disabled>↩ Undo Move</button>
        <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊 Sound On</button>
        <button class="eval-btn" id="evalBtn" onclick="toggleEvalBar()">📊 Eval Bar</button>
        <button class="new-game-btn" onclick="newGame()">New Game</button>
        <a href="/" style="color:#4CAF50; text-decoration:none; text-align:center;">← Back to Stats</a>

        <!-- PERSONALIZATION PANEL -->
        <div class="personalize-panel">
            <h3>🎨 Personalize</h3>
            <div class="color-grid" id="colorGrid"></div>
            <div class="custom-color-row">
                <label>Custom:</label>
                <input type="color" id="customColorPicker" value="#e74c3c" onchange="applyCustomColor(this.value)">
                <input type="text" id="customColorHex" value="#e74c3c" maxlength="7" onchange="applyCustomColor(this.value)">
            </div>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('bgImageInput').click()">
                <p>🖼️ Click or drop image</p>
                <button class="upload-btn" type="button">Choose Image</button>
                <img class="preview-img" id="previewImg" alt="Preview">
                <button class="remove-img-btn" id="removeImgBtn" onclick="event.stopPropagation(); removeBgImage()">Remove Image</button>
            </div>
            <input type="file" id="bgImageInput" accept="image/*" onchange="handleImageUpload(event)">
            <button class="reset-btn" onclick="resetPersonalization()">Reset to Default</button>
        </div>
    </div>

    <div class="board-area">
        <div class="board-wrapper">
            <div class="coords-ranks" id="ranks"></div>
            <div id="board"></div>
            <div class="eval-container" id="evalContainer">
                <div class="eval-label" id="evalLabelTop">White</div>
                <div class="eval-bar-wrapper" id="evalBarWrapper">
                    <div class="eval-bar-black" id="evalBarBlack"></div>
                    <div class="eval-bar-white" id="evalBarWhite"></div>
                    <div class="eval-center-line"></div>
                </div>
                <div class="eval-label" id="evalLabelBottom">Black</div>
                <div class="eval-number" id="evalNumber">0.0</div>
            </div>
        </div>
        <div class="coords-files" id="files"></div>
        <div class="move-history">
            <h3>Move History</h3>
            <div class="moves-list" id="moves"></div>
        </div>
    </div>

    <div class="promotion-modal" id="promoModal">
        <div>
            <span class="promo-piece" onclick="doPromo('q')"><img id="promoQ" src="/static/pieces/wQ (1).png" alt="Queen"></span>
            <span class="promo-piece" onclick="doPromo('r')"><img id="promoR" src="/static/pieces/wR (1).png" alt="Rook"></span>
            <span class="promo-piece" onclick="doPromo('b')"><img id="promoB" src="/static/pieces/wB (1).png" alt="Bishop"></span>
            <span class="promo-piece" onclick="doPromo('n')"><img id="promoN" src="/static/pieces/wN (1).png" alt="Knight"></span>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOver">
        <div class="game-over-text" id="gameOverText"></div>
        <button class="play-again-btn" onclick="newGame()">Play Again</button>
    </div>

    <script>
        const PIECE_IMAGES = {
            'P': '/static/pieces/wP (1).png',
            'N': '/static/pieces/wN (1).png',
            'B': '/static/pieces/wB (1).png',
            'R': '/static/pieces/wR (1).png',
            'Q': '/static/pieces/wQ (1).png',
            'K': '/static/pieces/wK (1).png',
            'p': '/static/pieces/bP (1).png',
            'n': '/static/pieces/bN (1).png',
            'b': '/static/pieces/bB (1).png',
            'r': '/static/pieces/bR (1).png',
            'q': '/static/pieces/bQ (1).png',
            'k': '/static/pieces/bK (1).png'
        };

        let currentFEN = '';
        let selectedSquare = null;
        let legalMoves = [];
        let lastMove = null;
        let isThinking = false;
        let difficulty = 'Medium';
        let playerColor = 'white';
        let pendingPromo = null;
        let moveHistory = [];
        let boardHistory = [];
        let soundEnabled = true;
        let audioCtx = null;
        let isCheck = false;
        let sessionId = null;
        let evalBarEnabled = false;

        // ========== PERSONALIZATION ==========
        const PRESET_COLORS = [
            '#e74c3c', '#c0392b', '#e67e22', '#f39c12',
            '#f1c40f', '#2ecc71', '#27ae60', '#1abc9c',
            '#16a085', '#3498db', '#2980b9', '#9b59b6',
            '#8e44ad', '#e91e63', '#ff5722', '#00bcd4'
        ];
        let currentAccentColor = '#e74c3c';

        function initPersonalization() {
            const grid = document.getElementById('colorGrid');
            PRESET_COLORS.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color;
                swatch.dataset.color = color;
                swatch.onclick = () => applyColor(color);
                grid.appendChild(swatch);
            });

            // Load saved preferences
            const savedColor = localStorage.getItem('mattfish_accent_color');
            const savedImage = localStorage.getItem('mattfish_bg_image');

            if (savedColor) {
                applyColor(savedColor, false);
            }
            if (savedImage) {
                applyBgImage(savedImage);
            }
        }

        function applyColor(color, save = true) {
            currentAccentColor = color;
            document.getElementById('customColorPicker').value = color;
            document.getElementById('customColorHex').value = color;

            // Update all swatch active states
            document.querySelectorAll('.color-swatch').forEach(s => {
                s.classList.toggle('active', s.dataset.color === color);
            });

            // Apply to title
            document.getElementById('appTitle').style.color = color;

            // Apply to new game button
            const newGameBtn = document.querySelector('.new-game-btn');
            newGameBtn.style.background = color;
            newGameBtn.onmouseover = () => newGameBtn.style.background = darkenColor(color, 20);
            newGameBtn.onmouseout = () => newGameBtn.style.background = color;

            // Apply to personalization panel title
            document.querySelector('.personalize-panel h3').style.color = color;

            // Apply to active diff button border
            document.querySelectorAll('.diff-btn.active').forEach(b => {
                b.style.borderColor = color;
            });

            // Apply to active color button
            document.querySelectorAll('.color-btn.active').forEach(b => {
                b.style.borderColor = color;
            });

            // Apply to eval bar center line
            document.querySelector('.eval-center-line').style.background = color;

            // Apply to game over text when active
            const gameOverText = document.getElementById('gameOverText');
            if (gameOverText.style.color === 'rgb(231, 76, 60)' || gameOverText.style.color === '#e74c3c') {
                gameOverText.style.color = color;
            }

            if (save) {
                localStorage.setItem('mattfish_accent_color', color);
            }
        }

        function applyCustomColor(value) {
            let color = value;
            if (!color.startsWith('#')) color = '#' + color;
            if (/^#[0-9A-Fa-f]{6}$/.test(color)) {
                applyColor(color);
            }
        }

        function darkenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max((num >> 16) - amt, 0);
            const G = Math.max((num >> 8 & 0x00FF) - amt, 0);
            const B = Math.max((num & 0x0000FF) - amt, 0);
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                applyBgImage(dataUrl);
                localStorage.setItem('mattfish_bg_image', dataUrl);
            };
            reader.readAsDataURL(file);
        }

        function applyBgImage(dataUrl) {
            const overlay = document.getElementById('bgImageOverlay');
            overlay.style.backgroundImage = `url(${dataUrl})`;

            const preview = document.getElementById('previewImg');
            preview.src = dataUrl;
            preview.classList.add('visible');

            document.getElementById('removeImgBtn').classList.add('visible');
            document.querySelector('.upload-area p').textContent = 'Image set!';
        }

        function removeBgImage() {
            const overlay = document.getElementById('bgImageOverlay');
            overlay.style.backgroundImage = '';

            const preview = document.getElementById('previewImg');
            preview.src = '';
            preview.classList.remove('visible');

            document.getElementById('removeImgBtn').classList.remove('visible');
            document.querySelector('.upload-area p').textContent = '🖼️ Click or drop image';

            localStorage.removeItem('mattfish_bg_image');
            document.getElementById('bgImageInput').value = '';
        }

        function resetPersonalization() {
            applyColor('#e74c3c');
            removeBgImage();
            localStorage.removeItem('mattfish_accent_color');
        }

        // Drag and drop for image
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const dataUrl = evt.target.result;
                    applyBgImage(dataUrl);
                    localStorage.setItem('mattfish_bg_image', dataUrl);
                };
                reader.readAsDataURL(file);
            }
        });

        // ========== EVALUATION BAR ==========
        function toggleEvalBar() {
            evalBarEnabled = !evalBarEnabled;
            const btn = document.getElementById('evalBtn');
            const container = document.getElementById('evalContainer');

            if (evalBarEnabled) {
                btn.classList.add('active');
                container.classList.add('active');
                updateEvalBar();
            } else {
                btn.classList.remove('active');
                container.classList.remove('active');
            }
        }

        function updateEvalBarOrientation() {
            const wrapper = document.getElementById('evalBarWrapper');
            const topLabel = document.getElementById('evalLabelTop');
            const bottomLabel = document.getElementById('evalLabelBottom');

            if (playerColor === 'black') {
                wrapper.classList.add('flipped');
                topLabel.textContent = 'White';
                bottomLabel.textContent = 'Black (You)';
                bottomLabel.classList.add('eval-label-player');
                topLabel.classList.remove('eval-label-player');
            } else {
                wrapper.classList.remove('flipped');
                topLabel.textContent = 'Black';
                bottomLabel.textContent = 'White (You)';
                bottomLabel.classList.add('eval-label-player');
                topLabel.classList.remove('eval-label-player');
            }
        }

        async function updateEvalBar() {
            if (!evalBarEnabled || !sessionId) return;

            try {
                const response = await fetch('/api/chess/eval', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                const data = await response.json();

                if (data.error) return;

                const whiteBar = document.getElementById('evalBarWhite');
                const blackBar = document.getElementById('evalBarBlack');
                const evalNumber = document.getElementById('evalNumber');

                let displayText = '';
                let whitePercent = 50;

                if (data.mate !== 0) {
                    if (data.mate > 0) {
                        displayText = '+' + data.mate + 'M';
                        whitePercent = 100;
                    } else {
                        displayText = data.mate + 'M';
                        whitePercent = 0;
                    }
                } else {
                    const evalCp = data.eval;
                    const evalPawns = evalCp / 100;

                    if (evalPawns > 0) {
                        displayText = '+' + evalPawns.toFixed(1);
                    } else if (evalPawns < 0) {
                        displayText = evalPawns.toFixed(1);
                    } else {
                        displayText = '0.0';
                    }

                    const clamped = Math.max(-1000, Math.min(1000, evalCp));
                    whitePercent = 50 + (clamped / 20);
                    whitePercent = Math.max(5, Math.min(95, whitePercent));
                }

                whiteBar.style.height = whitePercent + '%';
                blackBar.style.height = (100 - whitePercent) + '%';

                let playerEval = displayText;
                if (playerColor === 'black') {
                    if (displayText.startsWith('+')) {
                        playerEval = '-' + displayText.substring(1);
                    } else if (displayText.startsWith('-')) {
                        playerEval = '+' + displayText.substring(1);
                    }
                }

                evalNumber.textContent = playerEval;

                if (playerColor === 'white') {
                    if (displayText.startsWith('+')) {
                        evalNumber.style.color = '#4CAF50';
                    } else if (displayText.startsWith('-')) {
                        evalNumber.style.color = currentAccentColor;
                    } else {
                        evalNumber.style.color = '#888';
                    }
                } else {
                    if (displayText.startsWith('-')) {
                        evalNumber.style.color = '#4CAF50';
                    } else if (displayText.startsWith('+')) {
                        evalNumber.style.color = currentAccentColor;
                    } else {
                        evalNumber.style.color = '#888';
                    }
                }

            } catch(e) {}
        }

        // Sound effects using Web Audio API
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playTone(freq, duration, type, volume) {
            if (!soundEnabled) return;
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function playMoveSound() {
            playTone(800, 0.08, 'sine', 0.15);
            setTimeout(() => playTone(600, 0.06, 'sine', 0.1), 30);
        }

        function playCheckSound() {
            playTone(880, 0.15, 'square', 0.2);
            setTimeout(() => playTone(880, 0.15, 'square', 0.2), 200);
            setTimeout(() => playTone(880, 0.3, 'square', 0.2), 400);
        }

        function playGameOverSound(won) {
            if (won) {
                playTone(523, 0.2, 'sine', 0.3);
                setTimeout(() => playTone(659, 0.2, 'sine', 0.3), 200);
                setTimeout(() => playTone(784, 0.2, 'sine', 0.3), 400);
                setTimeout(() => playTone(1047, 0.4, 'sine', 0.3), 600);
            } else {
                playTone(400, 0.3, 'sine', 0.2);
                setTimeout(() => playTone(350, 0.3, 'sine', 0.2), 300);
                setTimeout(() => playTone(300, 0.5, 'sine', 0.2), 600);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            if (soundEnabled) {
                btn.textContent = '🔊 Sound On';
                btn.classList.remove('off');
            } else {
                btn.textContent = '🔇 Sound Off';
                btn.classList.add('off');
            }
        }

        window.onload = function() {
            initPersonalization();
            newGame();
        };

        function setDiff(d) {
            difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === d);
                if (b.classList.contains('active')) {
                    b.style.borderColor = currentAccentColor;
                } else {
                    b.style.borderColor = '#444';
                }
            });
        }

        function setColor(c) {
            playerColor = c;
            document.querySelectorAll('.color-btn').forEach(b => {
                b.classList.toggle('active', b.textContent.toLowerCase() === c);
                if (b.classList.contains('active')) {
                    b.style.borderColor = currentAccentColor;
                } else {
                    b.style.borderColor = '#444';
                }
            });
            updateEvalBarOrientation();
            newGame();
        }

        function updatePromoImages() {
            const prefix = playerColor === 'white' ? 'w' : 'b';
            document.getElementById('promoQ').src = '/static/pieces/' + prefix + 'Q (1).png';
            document.getElementById('promoR').src = '/static/pieces/' + prefix + 'R (1).png';
            document.getElementById('promoB').src = '/static/pieces/' + prefix + 'B (1).png';
            document.getElementById('promoN').src = '/static/pieces/' + prefix + 'N (1).png';
        }

        function updateCoords() {
            const ranksEl = document.getElementById('ranks');
            const filesEl = document.getElementById('files');

            if (playerColor === 'black') {
                ranksEl.innerHTML = '12345678'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'hgfedcba'.split('').map(f => '<span>' + f + '</span>').join('');
            } else {
                ranksEl.innerHTML = '87654321'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'abcdefgh'.split('').map(f => '<span>' + f + '</span>').join('');
            }
        }

        function updateUndoButton() {
            const btn = document.getElementById('undoBtn');
            const canUndo = boardHistory.length > 1 || 
                (playerColor === 'black' && boardHistory.length > 0 && moveHistory.length > 0);
            btn.disabled = !canUndo || isThinking || document.getElementById('gameOver').classList.contains('active');
        }

        async function newGame() {
            document.getElementById('promoModal').classList.remove('active');
            document.getElementById('gameOver').classList.remove('active');
            selectedSquare = null;
            lastMove = null;
            pendingPromo = null;
            moveHistory = [];
            boardHistory = [];
            isCheck = false;
            updateMoves();
            updatePromoImages();
            updateCoords();
            updateUndoButton();
            setStatus('Starting...');

            try {
                const response = await fetch('/api/chess/new', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ color: playerColor, session_id: sessionId })
                });
                const data = await response.json();

                if (data.error) {
                    setStatus('Error: ' + data.error);
                    return;
                }

                sessionId = data.session_id || sessionId;
                currentFEN = data.fen;
                legalMoves = data.legal_moves;
                boardHistory.push({
                    fen: currentFEN,
                    legalMoves: [...legalMoves],
                    lastMove: null,
                    moveHistory: []
                });
                drawBoard();
                updateEvalBarOrientation();
                updateEvalBar();

                if (playerColor === 'black') {
                    setStatus('MattFish is thinking...');
                    await engineFirstMove();
                } else {
                    setStatus('Your turn! Click a white piece to move.');
                }
            } catch(err) {
                setStatus('Failed to start: ' + err.message);
            }
        }

        async function engineFirstMove() {
            isThinking = true;
            updateUndoButton();
            try {
                const response = await fetch('/api/chess/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: 'engine', difficulty: difficulty, session_id: sessionId })
                });
                const data = await response.json();
                isThinking = false;

                if (!data.error) {
                    currentFEN = data.fen;
                    isCheck = data.check || false;
                    lastMove = {
                        from: data.engine_move.substring(0, 2),
                        to: data.engine_move.substring(2, 4)
                    };
                    moveHistory.push({ white: data.engine_move, black: null });
                    updateMoves();
                    legalMoves = data.legal_moves || [];
                    boardHistory.push({
                        fen: currentFEN,
                        legalMoves: [...legalMoves],
                        lastMove: {...lastMove},
                        moveHistory: JSON.parse(JSON.stringify(moveHistory))
                    });
                    playMoveSound();
                    drawBoard();
                    updateEvalBar();
                    updateUndoButton();
                    setStatus('Engine played ' + data.engine_move + '. Your turn!');
                }
            } catch(err) {
                isThinking = false;
                updateUndoButton();
                setStatus('Error: ' + err.message);
            }
        }

        async function undoMove() {
            if (boardHistory.length < 2) return;

            isThinking = true;
            updateUndoButton();
            setStatus('Undoing...');

            boardHistory.pop();
            const prevState = boardHistory[boardHistory.length - 1];

            currentFEN = prevState.fen;
            legalMoves = [...prevState.legalMoves];
            lastMove = prevState.lastMove ? {...prevState.lastMove} : null;
            moveHistory = JSON.parse(JSON.stringify(prevState.moveHistory));
            isCheck = false;

            try {
                await fetch('/api/chess/undo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
            } catch(e) {}

            isThinking = false;
            updateMoves();
            drawBoard();
            updateEvalBar();
            updateUndoButton();
            setStatus('Undone. Your turn!');
        }

        function drawBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            const fenParts = currentFEN.split(' ');
            const fenRows = fenParts[0].split('/');
            const activeColor = fenParts[1] || 'w';
            const grid = [];
            for (let r = 0; r < 8; r++) {
                const row = [];
                for (let char of fenRows[r]) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) row.push(null);
                    } else {
                        row.push(char);
                    }
                }
                grid.push(row);
            }

            if (playerColor === 'black') {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const stdRank = 7 - vRow;
                        const stdFile = 7 - vCol;
                        const piece = grid[stdRank][stdFile];
                        const squareName = 'hgfedcba'[vCol] + (vRow + 1);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            } else {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const piece = grid[vRow][vCol];
                        const squareName = 'abcdefgh'[vCol] + (8 - vRow);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            }
        }

        function createSquare(boardEl, vRow, vCol, squareName, piece, activeColor) {
            const square = document.createElement('div');
            const isLight = (vRow + vCol) % 2 === 0;

            square.className = 'square ' + (isLight ? 'light' : 'dark');
            square.dataset.square = squareName;

            if (isCheck && piece) {
                if ((activeColor === 'w' && piece === 'K') || (activeColor === 'b' && piece === 'k')) {
                    square.classList.add('check');
                }
            }

            if (piece && PIECE_IMAGES[piece]) {
                const img = document.createElement('img');
                img.src = PIECE_IMAGES[piece];
                img.alt = piece;
                square.appendChild(img);
            }

            if (lastMove) {
                if (square.dataset.square === lastMove.from || square.dataset.square === lastMove.to) {
                    square.classList.add('last-move');
                }
            }

            if (selectedSquare === square.dataset.square) {
                square.classList.add('selected');
            }

            if (selectedSquare) {
                const isLegalDest = legalMoves.some(m => 
                    m.substring(0, 2) === selectedSquare && 
                    m.substring(2, 4) === square.dataset.square
                );
                if (isLegalDest) {
                    square.classList.add('legal');
                }
            }

            square.addEventListener('click', function() { handleClick(square); });
            boardEl.appendChild(square);
        }

        function handleClick(square) {
            if (isThinking) return;

            const sq = square.dataset.square;
            const piece = square.querySelector('img');
            const isPlayerPiece = piece && (
                (playerColor === 'white' && piece.src.includes('/w')) ||
                (playerColor === 'black' && piece.src.includes('/b'))
            );

            if (!selectedSquare) {
                if (isPlayerPiece) {
                    selectedSquare = sq;
                    drawBoard();
                }
                return;
            }

            if (selectedSquare === sq) {
                selectedSquare = null;
                drawBoard();
                return;
            }

            const matchingMove = legalMoves.find(m => 
                m.substring(0, 2) === selectedSquare && 
                m.substring(2, 4) === sq
            );

            if (matchingMove) {
                const fromSquare = document.querySelector('[data-square="' + selectedSquare + '"]');
                const fromPiece = fromSquare.querySelector('img');
                const isPawn = fromPiece && (fromPiece.src.includes('wP') || fromPiece.src.includes('bP'));
                const promoRank = playerColor === 'white' ? '8' : '1';

                if (isPawn && sq[1] === promoRank) {
                    if (matchingMove.length === 4) {
                        pendingPromo = selectedSquare + sq;
                        document.getElementById('promoModal').classList.add('active');
                        return;
                    }
                }
                sendMove(matchingMove);
            } else if (isPlayerPiece) {
                selectedSquare = sq;
                drawBoard();
            } else {
                selectedSquare = null;
                drawBoard();
            }
        }

        function doPromo(piece) {
            document.getElementById('promoModal').classList.remove('active');
            if (pendingPromo) {
                sendMove(pendingPromo + piece);
                pendingPromo = null;
            }
        }

        async function sendMove(move) {
            isThinking = true;
            selectedSquare = null;
            updateUndoButton();
            setStatus('MattFish is thinking...');

            try {
                const response = await fetch('/api/chess/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: move, difficulty: difficulty, session_id: sessionId })
                });

                const data = await response.json();
                isThinking = false;

                if (data.error) {
                    setStatus('Error: ' + data.error);
                    if (data.fen) {
                        currentFEN = data.fen;
                        drawBoard();
                    }
                    updateUndoButton();
                    return;
                }

                currentFEN = data.fen;
                isCheck = data.check || false;

                if (data.engine_move) {
                    lastMove = {
                        from: data.engine_move.substring(0, 2),
                        to: data.engine_move.substring(2, 4)
                    };
                } else {
                    lastMove = {
                        from: move.substring(0, 2),
                        to: move.substring(2, 4)
                    };
                }

                if (data.player_move) {
                    if (playerColor === 'white') {
                        moveHistory.push({ white: data.player_move, black: data.engine_move });
                    } else {
                        moveHistory.push({ white: data.engine_move, black: data.player_move });
                    }
                    updateMoves();
                }

                legalMoves = data.legal_moves || [];

                if (isCheck) {
                    playCheckSound();
                } else {
                    playMoveSound();
                }

                boardHistory.push({
                    fen: currentFEN,
                    legalMoves: [...legalMoves],
                    lastMove: lastMove ? {...lastMove} : null,
                    moveHistory: JSON.parse(JSON.stringify(moveHistory))
                });

                drawBoard();
                updateEvalBar();
                updateUndoButton();

                if (data.game_over) {
                    const playerWon = (playerColor === 'white' && data.result === '1-0') || (playerColor === 'black' && data.result === '0-1');
                    playGameOverSound(playerWon);
                    showGameOver(data.result);
                } else {
                    setStatus(data.engine_move ? 
                        'Engine played ' + data.engine_move + '. Your turn!' : 
                        'Your turn!');
                }
            } catch(err) {
                isThinking = false;
                updateUndoButton();
                setStatus('Error: ' + err.message);
            }
        }

        function updateMoves() {
            const container = document.getElementById('moves');
            container.innerHTML = '';

            moveHistory.forEach((pair, i) => {
                const div = document.createElement('div');
                div.className = 'move-pair';
                div.innerHTML = '<span class="move-num">' + (i + 1) + '.</span> ' +
                    '<span class="move-w">' + (pair.white || '...') + '</span>' +
                    (pair.black ? ' <span class="move-b">' + pair.black + '</span>' : '');
                container.appendChild(div);
            });
        }

        function showGameOver(result) {
            const overlay = document.getElementById('gameOver');
            const text = document.getElementById('gameOverText');

            let msg = result;
            let color = '#fff';
            const playerWon = (playerColor === 'white' && result === '1-0') || (playerColor === 'black' && result === '0-1');
            const playerLost = (playerColor === 'white' && result === '0-1') || (playerColor === 'black' && result === '1-0');

            if (playerWon) { msg = 'You Win!'; color = '#4CAF50'; }
            else if (playerLost) { msg = 'MattFish Wins!'; color = currentAccentColor; }
            else { msg = 'Draw!'; color = '#f39c12'; }

            text.textContent = msg;
            text.style.color = color;
            overlay.classList.add('active');
            setStatus('Game Over: ' + result);
            updateUndoButton();
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }
    </script>
