<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e1e1e">
    <link rel="icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>MattFish Chess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            gap: 30px;
            padding: 20px;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { color: #e74c3c; margin: 0; font-size: 28px; }
        #status {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            font-size: 15px;
        }
        .diff-btn, .color-btn, .undo-btn, .sound-btn, .eval-btn, .time-btn {
            padding: 10px;
            border: 2px solid #444;
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .diff-btn:hover, .color-btn:hover, .time-btn:hover { border-color: #666; }
        .diff-btn.active, .color-btn.active { 
            border-color: #4CAF50; 
            background: rgba(76,175,80,0.2); 
        }
        .time-btn.active {
            border-color: #2196F3;
            background: rgba(33,150,243,0.2);
        }
        .undo-btn {
            border-color: #f39c12;
            background: rgba(243,156,18,0.1);
        }
        .undo-btn:hover {
            border-color: #f39c12;
            background: rgba(243,156,18,0.2);
        }
        .undo-btn:disabled {
            border-color: #555;
            background: transparent;
            color: #666;
            cursor: not-allowed;
        }
        .sound-btn {
            border-color: #2196F3;
            background: rgba(33,150,243,0.1);
        }
        .sound-btn:hover {
            border-color: #2196F3;
            background: rgba(33,150,243,0.2);
        }
        .sound-btn.off {
            border-color: #555;
            background: transparent;
            color: #666;
        }
        .eval-btn {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.1);
        }
        .eval-btn:hover {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.2);
        }
        .eval-btn.active {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.3);
        }
        .drag-btn {
            border-color: #FF9800;
            background: rgba(255,152,0,0.1);
        }
        .drag-btn:hover {
            border-color: #FF9800;
            background: rgba(255,152,0,0.2);
        }
        .drag-btn.off {
            border-color: #555;
            background: transparent;
            color: #666;
        }
        .new-game-btn {
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .new-game-btn:hover { background: #c0392b; }
        .board-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .board-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .coords-ranks {
            position: absolute;
            left: -25px;
            top: 0;
            height: 560px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            font-size: 14px;
            color: #888;
            width: 20px;
            text-align: center;
        }
        .coords-files {
            display: flex;
            justify-content: space-around;
            width: 560px;
            padding: 5px 0;
            font-size: 14px;
            color: #888;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 3px solid #555;
            border-radius: 4px;
        }
        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
            position: relative;
            transition: background 0.1s;
        }
        .square:active { cursor: grabbing; }
        .square img {
            width: 60px;
            height: 60px;
            pointer-events: none;
        }
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        .square:hover { filter: brightness(1.15); }
        .selected { background: #f7ec5f !important; }
        .last-move { box-shadow: inset 0 0 0 4px rgba(255, 107, 107, 0.7); }
        .legal::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            pointer-events: none;
        }
        .light.legal::after { background: rgba(0, 0, 0, 0.2); }
        .dark.legal::after { background: rgba(255, 255, 255, 0.25); }
        .check { background: rgba(231, 76, 60, 0.6) !important; }

        /* ========== PROMOTION MODAL ========== */
        .promotion-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .promotion-modal.active { display: flex; }
        .promotion-modal > div {
            display: flex;
            gap: 15px;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #555;
        }
        .promo-piece {
            width: 80px;
            height: 80px;
            cursor: pointer;
            background: #f0d9b5;
            border-radius: 10px;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid transparent;
        }
        .promo-piece:hover { 
            transform: scale(1.15); 
            background: #fff; 
            border-color: #e74c3c;
        }
        .promo-piece img { width: 65px; height: 65px; }
        .promo-label {
            text-align: center;
            color: #aaa;
            font-size: 12px;
            margin-bottom: 15px;
            width: 100%;
        }

        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-text { font-size: 42px; font-weight: bold; margin-bottom: 20px; }
        .play-again-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .move-history {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            width: 560px;
            max-height: 120px;
            overflow-y: auto;
        }
        .move-history h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .moves-list { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
        .move-pair { background: #1a1a2e; padding: 4px 8px; border-radius: 4px; }
        .move-num { color: #888; }
        .move-w { color: #f0d9b5; }
        .move-b { color: #b58863; }
        .section-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* ========== EVALUATION BAR ========== */
        .eval-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .eval-container.active {
            display: flex;
        }
        .eval-bar-wrapper {
            width: 30px;
            height: 560px;
            background: #2e2e2e;
            border: 2px solid #555;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .eval-bar-white {
            position: absolute;
            left: 0;
            right: 0;
            background: #f0d9b5;
            transition: height 0.5s ease;
            bottom: 0;
        }
        .eval-bar-black {
            position: absolute;
            left: 0;
            right: 0;
            background: #b58863;
            transition: height 0.5s ease;
            top: 0;
        }
        .eval-bar-wrapper.flipped .eval-bar-white {
            bottom: auto;
            top: 0;
        }
        .eval-bar-wrapper.flipped .eval-bar-black {
            top: auto;
            bottom: 0;
        }
        .eval-center-line {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 2px;
            background: #e74c3c;
            z-index: 2;
        }
        .eval-number {
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-align: center;
            min-width: 50px;
        }
        .eval-label {
            font-size: 10px;
            color: #888;
            text-align: center;
        }
        .eval-label-player {
            color: #4CAF50;
            font-weight: bold;
        }

        .personalize-toggle-btn { 
            padding: 10px; 
            font-size: 14px; 
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.2s; 
            width: 100%; 
        }
        .personalize-toggle-btn:hover { background: #c0392b; }
        .personalize-panel { 
            background: #2a2a2a; 
            border: 1px solid #444; 
            border-radius: 10px; 
            padding: 15px; 
            margin-top: 10px; 
        }
        .personalize-panel h3 { 
            font-size: 14px; 
            margin-bottom: 12px; 
            text-align: center; 
        }
        .color-grid { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 4px; 
            margin-bottom: 10px; 
        }
        .color-swatch { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 4px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: 0.2s; 
        }
        .color-swatch:hover { 
            transform: scale(1.15); 
            border-color: white; 
            z-index: 2; 
            position: relative; 
        }
        .color-swatch.active { 
            border-color: #fff; 
            box-shadow: 0 0 0 2px #e74c3c; 
        }
        .custom-color-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 10px; 
        }
        .custom-color-row label { 
            font-size: 11px; 
            color: #aaa; 
            min-width: 70px; 
        }
        .custom-color-row input[type="color"] { 
            width: 36px; 
            height: 28px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            background: none; 
            padding: 0; 
        }
        .custom-color-row input[type="text"] { 
            flex: 1; 
            padding: 5px 8px; 
            font-size: 12px; 
            border-radius: 4px; 
            border: 1px solid #555; 
            background: #1e1e1e; 
            color: white; 
            width: auto; 
        }
        .upload-area { 
            border: 2px dashed #555; 
            border-radius: 8px; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-bottom: 10px; 
        }
        .upload-area:hover { 
            border-color: #e74c3c; 
            background: rgba(231, 76, 60, 0.05); 
        }
        .upload-area.dragover { 
            border-color: #4CAF50; 
            background: rgba(76, 175, 80, 0.1); 
        }
        .upload-area p { 
            font-size: 12px; 
            color: #888; 
            margin-bottom: 6px; 
        }
        .upload-area input[type="file"] { display: none; }
        .upload-btn { 
            padding: 6px 14px; 
            font-size: 12px; 
            background: #444; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        }
        .upload-btn:hover { background: #555; }
        .preview-img { 
            max-width: 100%; 
            max-height: 80px; 
            border-radius: 6px; 
            margin-top: 8px; 
            display: none; 
        }
        .preview-img.visible { display: block; }
        .remove-img-btn { 
            padding: 4px 10px; 
            font-size: 11px; 
            background: #c0392b; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-top: 6px; 
            display: none; 
        }
        .remove-img-btn.visible { display: inline-block; }
        .remove-img-btn:hover { background: #a93226; }
        .reset-btn { 
            width: 100%; 
            padding: 8px; 
            font-size: 12px; 
            background: #555; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 8px; 
        }
        .reset-btn:hover { background: #666; }
        .bg-image-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            z-index: -1; 
            opacity: 0.12; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            pointer-events: none; 
        }

        /* ========== TIME CONTROL ========== */
        .timer-display {
            background: #2e2e2e;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 2px;
        }
        .timer-display.active-turn {
            border: 2px solid #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .timer-display.low-time {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .time-controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .time-btn {
            padding: 8px 6px;
            font-size: 12px;
        }
        .custom-time-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .custom-time-row input {
            width: 60px;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
            text-align: center;
            font-size: 13px;
        }
        .custom-time-row label {
            font-size: 11px;
            color: #aaa;
        }
        /* ========== GAME REVIEW MODAL ========== */
        .review-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }
        .review-modal.active { display: flex; }
        .review-content {
            background: #1e1e1e;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 20px;
            width: 95%;
            max-width: 1000px;
            max-height: 92vh;
            overflow-y: auto;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .review-header h2 { color: #e74c3c; }
        .review-close-btn {
            background: transparent;
            border: 2px solid #555;
            color: white;
            border-radius: 6px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 16px;
        }
        .review-close-btn:hover { border-color: #e74c3c; }
        .review-body {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .review-board-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        #reviewBoard {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            border: 3px solid #555;
            border-radius: 4px;
        }
        #reviewBoard .square {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #reviewBoard .square img { width: 42px; height: 42px; pointer-events: none; }
        #reviewBoard .light { background: #f0d9b5; }
        #reviewBoard .dark { background: #b58863; }
        #reviewBoard .review-last-move { box-shadow: inset 0 0 0 3px rgba(255, 107, 107, 0.7); }
        .review-move-info {
            background: #2e2e2e;
            border-radius: 8px;
            padding: 10px 15px;
            min-width: 250px;
            text-align: center;
            font-size: 14px;
        }
        .review-nav-btns { display: flex; gap: 8px; }
        .review-nav-btns button {
            padding: 8px 14px;
            border: 2px solid #444;
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .review-nav-btns button:hover { border-color: #666; }
        .review-sidebar {
            flex: 1;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .eval-graph {
            display: flex;
            align-items: flex-end;
            height: 80px;
            background: #2e2e2e;
            border-radius: 6px;
            padding: 4px;
            gap: 1px;
            overflow-x: auto;
        }
        .eval-graph-bar {
            flex: 1;
            min-width: 3px;
            cursor: pointer;
            border-radius: 1px;
        }
        .eval-graph-bar.selected { outline: 2px solid #4CAF50; }
        .review-moves-list {
            background: #2e2e2e;
            border-radius: 8px;
            padding: 10px;
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .review-move-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .review-move-row:hover { background: #3a3a3a; }
        .review-move-row.selected { background: rgba(76,175,80,0.25); }
        .tag-Blunder { color: #e74c3c; font-weight: bold; }
        .tag-Mistake { color: #f39c12; font-weight: bold; }
        .tag-Inaccuracy { color: #f1c40f; }
        .tag-Good { color: #777; }
        .review-actions { display: flex; gap: 10px; }
        .review-actions button { flex: 1; }
        .pgn-textarea {
            width: 100%;
            min-height: 90px;
            background: #111;
            color: #4CAF50;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }

        .time-out-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1001;
        }
        .time-out-overlay.active { display: flex; }
        .time-out-text { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
    </style>
    <script type="text/javascript" src="/static/theme.js"></script>
</head>
<body>
    <div class="bg-image-overlay" id="bgImageOverlay"></div>

    <div class="sidebar">
        <h1>♔ MattFish</h1>
        <div id="status">Click "New Game" to start</div>

        <!-- Player Timer -->
        <div class="timer-display" id="playerTimer">10:00</div>

        <div class="section-title">Difficulty</div>
        <div>
            <button class="diff-btn" onclick="setDiff('Easy')">Easy</button>
            <button class="diff-btn active" onclick="setDiff('Medium')">Medium</button>
            <button class="diff-btn" onclick="setDiff('Hard')">Hard</button>
        </div>

        <div class="section-title">Play As</div>
        <div>
            <button class="color-btn active" onclick="setColor('white')">White</button>
            <button class="color-btn" onclick="setColor('black')">Black</button>
        </div>

        <div class="section-title">Time Control</div>
        <div class="time-controls-grid">
            <button class="time-btn active" onclick="setTimeControl('bullet1', this)" data-min="1" data-inc="0">1+0</button>
            <button class="time-btn" onclick="setTimeControl('bullet2', this)" data-min="2" data-inc="1">2+1</button>
            <button class="time-btn" onclick="setTimeControl('blitz3', this)" data-min="3" data-inc="2">3+2</button>
            <button class="time-btn" onclick="setTimeControl('blitz5', this)" data-min="5" data-inc="0">5+0</button>
            <button class="time-btn" onclick="setTimeControl('blitz5inc', this)" data-min="5" data-inc="3">5+3</button>
            <button class="time-btn" onclick="setTimeControl('rapid10', this)" data-min="10" data-inc="0">10+0</button>
            <button class="time-btn" onclick="setTimeControl('rapid10inc', this)" data-min="10" data-inc="5">10+5</button>
            <button class="time-btn" onclick="setTimeControl('rapid15', this)" data-min="15" data-inc="10">15+10</button>
        </div>
        <div class="custom-time-row">
            <label>Custom:</label>
            <input type="number" id="customMin" placeholder="Min" min="1" max="180" value="10">
            <label>+</label>
            <input type="number" id="customInc" placeholder="Inc" min="0" max="60" value="0">
            <button class="time-btn" onclick="setCustomTimeControl()" style="padding:6px 10px;">Set</button>
        </div>

        <!-- Engine Timer -->
        <div class="timer-display" id="engineTimer">10:00</div>

        <button class="undo-btn" id="undoBtn" onclick="undoMove()" disabled>↩ Undo Move</button>
        <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊 Sound On</button>
        <button class="eval-btn" id="evalBtn" onclick="toggleEvalBar()">📊 Eval Bar</button>
        <button class="drag-btn" id="dragBtn" onclick="toggleDragMode()">✋ Drag: On</button>
        <button class="new-game-btn" onclick="newGame()">New Game</button>
        <button class="undo-btn" onclick="openReview()" style="border-color:#9C27B0; background:rgba(156,39,176,0.1);">📖 Review Game</button>

    <script>
        const PIECE_IMAGES = {
            'P': '/static/pieces/wP (1).png',
            'N': '/static/pieces/wN (1).png',
            'B': '/static/pieces/wB (1).png',
            'R': '/static/pieces/wR (1).png',
            'Q': '/static/pieces/wQ (1).png',
            'K': '/static/pieces/wK (1).png',
            'p': '/static/pieces/bP (1).png',
            'n': '/static/pieces/bN (1).png',
            'b': '/static/pieces/bB (1).png',
            'r': '/static/pieces/bR (1).png',
            'q': '/static/pieces/bQ (1).png',
            'k': '/static/pieces/bK (1).png'
        };

        let currentFEN = '';
        let selectedSquare = null;
        let legalMoves = [];
        let lastMove = null;
        let isThinking = false;
        let difficulty = 'Medium';
        let playerColor = 'white';
        let pendingPromo = null;
        let moveHistory = [];
        let boardHistory = [];
        let soundEnabled = true;
        let audioCtx = null;
        let isCheck = false;
        let sessionId = null;
        let evalBarEnabled = false;
        let dragEnabled = (localStorage.getItem('dragEnabled') !== 'false');

        // ========== TIME CONTROL ==========
        let timeControl = { minutes: 10, increment: 0 };
        let playerTime = 600;
        let engineTime = 600;
        let timerInterval = null;
        let activeTimer = null;
        let gameStarted = false;

        const TIME_PRESETS = {
            'bullet1': { minutes: 1, increment: 0 },
            'bullet2': { minutes: 2, increment: 1 },
            'blitz3': { minutes: 3, increment: 2 },
            'blitz5': { minutes: 5, increment: 0 },
            'blitz5inc': { minutes: 5, increment: 3 },
            'rapid10': { minutes: 10, increment: 0 },
            'rapid10inc': { minutes: 10, increment: 5 },
            'rapid15': { minutes: 15, increment: 10 }
        };

        function formatTime(seconds) {
            if (seconds <= 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function updateTimerDisplay() {
            const playerTimer = document.getElementById('playerTimer');
            const engineTimer = document.getElementById('engineTimer');

            playerTimer.textContent = formatTime(playerTime);
            engineTimer.textContent = formatTime(engineTime);

            playerTimer.classList.toggle('active-turn', activeTimer === 'player');
            engineTimer.classList.toggle('active-turn', activeTimer === 'engine');

            playerTimer.classList.toggle('low-time', playerTime < 30);
            engineTimer.classList.toggle('low-time', engineTime < 30);
        }

        function startTimer(who) {
            stopTimer();
            activeTimer = who;
            updateTimerDisplay();

            timerInterval = setInterval(function() {
                if (who === 'player') {
                    playerTime -= 0.1;
                    if (playerTime <= 0) {
                        playerTime = 0;
                        stopTimer();
                        showTimeOut('You ran out of time! MattFish wins.');
                    }
                } else {
                    engineTime -= 0.1;
                    if (engineTime <= 0) {
                        engineTime = 0;
                        stopTimer();
                        showTimeOut('MattFish ran out of time! You win.');
                    }
                }
                updateTimerDisplay();
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            activeTimer = null;
            updateTimerDisplay();
        }

        function addIncrement(who) {
            if (timeControl.increment > 0) {
                if (who === 'player') {
                    playerTime += timeControl.increment;
                } else {
                    engineTime += timeControl.increment;
                }
                updateTimerDisplay();
            }
        }

        function showTimeOut(message) {
            const overlay = document.getElementById('timeOutOverlay');
            const text = document.getElementById('timeOutText');
            text.textContent = message;
            text.style.color = message.includes('You win') ? '#4CAF50' : '#e74c3c';
            overlay.classList.add('active');
            setStatus('Time out!');
            playGameOverSound(message.includes('You win'));
        }

        function setTimeControl(preset, btn) {
            timeControl = TIME_PRESETS[preset];
            playerTime = timeControl.minutes * 60;
            engineTime = timeControl.minutes * 60;
            updateTimerDisplay();

            document.querySelectorAll('.time-btn').forEach(function(b) {
                b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        function setCustomTimeControl() {
            const min = parseInt(document.getElementById('customMin').value) || 10;
            const inc = parseInt(document.getElementById('customInc').value) || 0;
            timeControl = { minutes: min, increment: inc };
            playerTime = min * 60;
            engineTime = min * 60;
            updateTimerDisplay();

            document.querySelectorAll('.time-btn').forEach(function(b) {
                b.classList.remove('active');
            });
        }

        // ========== EVALUATION BAR ==========
        function toggleEvalBar() {
            evalBarEnabled = !evalBarEnabled;
            const btn = document.getElementById('evalBtn');
            const container = document.getElementById('evalContainer');

            if (evalBarEnabled) {
                btn.classList.add('active');
                container.classList.add('active');
                updateEvalBar();
            } else {
                btn.classList.remove('active');
                container.classList.remove('active');
            }
        }

        function updateEvalBarOrientation() {
            const wrapper = document.getElementById('evalBarWrapper');
            const topLabel = document.getElementById('evalLabelTop');
            const bottomLabel = document.getElementById('evalLabelBottom');

            if (playerColor === 'black') {
                wrapper.classList.add('flipped');
                topLabel.textContent = 'White';
                bottomLabel.textContent = 'Black (You)';
                bottomLabel.classList.add('eval-label-player');
                topLabel.classList.remove('eval-label-player');
            } else {
                wrapper.classList.remove('flipped');
                topLabel.textContent = 'Black';
                bottomLabel.textContent = 'White (You)';
                bottomLabel.classList.add('eval-label-player');
                topLabel.classList.remove('eval-label-player');
            }
        }

        async function updateEvalBar() {
            if (!evalBarEnabled || !sessionId) return;

            try {
                const response = await fetch('/api/chess/eval', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                const data = await response.json();

                if (data.error) return;

                const whiteBar = document.getElementById('evalBarWhite');
                const blackBar = document.getElementById('evalBarBlack');
                const evalNumber = document.getElementById('evalNumber');

                let displayText = '';
                let whitePercent = 50;

                if (data.mate !== 0) {
                    if (data.mate > 0) {
                        displayText = '+' + data.mate + 'M';
                        whitePercent = 100;
                    } else {
                        displayText = data.mate + 'M';
                        whitePercent = 0;
                    }
                } else {
                    const evalCp = data.eval;
                    const evalPawns = evalCp / 100;

                    if (evalPawns > 0) {
                        displayText = '+' + evalPawns.toFixed(1);
                    } else if (evalPawns < 0) {
                        displayText = evalPawns.toFixed(1);
                    } else {
                        displayText = '0.0';
                    }

                    const clamped = Math.max(-1000, Math.min(1000, evalCp));
                    whitePercent = 50 + (clamped / 20);
                    whitePercent = Math.max(5, Math.min(95, whitePercent));
                }

                whiteBar.style.height = whitePercent + '%';
                blackBar.style.height = (100 - whitePercent) + '%';

                let playerEval = displayText;
                if (playerColor === 'black') {
                    if (displayText.startsWith('+')) {
                        playerEval = '-' + displayText.substring(1);
                    } else if (displayText.startsWith('-')) {
                        playerEval = '+' + displayText.substring(1);
                    }
                }

                evalNumber.textContent = playerEval;

                if (playerColor === 'white') {
                    if (displayText.startsWith('+')) {
                        evalNumber.style.color = '#4CAF50';
                    } else if (displayText.startsWith('-')) {
                        evalNumber.style.color = '#e74c3c';
                    } else {
                        evalNumber.style.color = '#888';
                    }
                } else {
                    if (displayText.startsWith('-')) {
                        evalNumber.style.color = '#4CAF50';
                    } else if (displayText.startsWith('+')) {
                        evalNumber.style.color = '#e74c3c';
                    } else {
                        evalNumber.style.color = '#888';
                    }
                }

            } catch(e) {}
        }

        // Sound effects using Web Audio API
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playTone(freq, duration, type, volume) {
            if (!soundEnabled) return;
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function playMoveSound() {
            playTone(800, 0.08, 'sine', 0.15);
            setTimeout(() => playTone(600, 0.06, 'sine', 0.1), 30);
        }

        function playCheckSound() {
            playTone(880, 0.15, 'square', 0.2);
            setTimeout(() => playTone(880, 0.15, 'square', 0.2), 200);
            setTimeout(() => playTone(880, 0.3, 'square', 0.2), 400);
        }

        function playGameOverSound(won) {
            if (won) {
                playTone(523, 0.2, 'sine', 0.3);
                setTimeout(() => playTone(659, 0.2, 'sine', 0.3), 200);
                setTimeout(() => playTone(784, 0.2, 'sine', 0.3), 400);
                setTimeout(() => playTone(1047, 0.4, 'sine', 0.3), 600);
            } else {
                playTone(400, 0.3, 'sine', 0.2);
                setTimeout(() => playTone(350, 0.3, 'sine', 0.2), 300);
                setTimeout(() => playTone(300, 0.5, 'sine', 0.2), 600);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            if (soundEnabled) {
                btn.textContent = '🔊 Sound On';
                btn.classList.remove('off');
            } else {
                btn.textContent = '🔇 Sound Off';
                btn.classList.add('off');
            }
        }

        function toggleDragMode() {
            dragEnabled = !dragEnabled;
            localStorage.setItem('dragEnabled', dragEnabled ? 'true' : 'false');
            _applyDragBtnState();
        }

        function _applyDragBtnState() {
            const btn = document.getElementById('dragBtn');
            if (!btn) return;
            if (dragEnabled) {
                btn.textContent = '✋ Drag: On';
                btn.classList.remove('off');
            } else {
                btn.textContent = '👆 Click Only';
                btn.classList.add('off');
            }
        }

        window.onload = function() {
            _applyDragBtnState();
            try {
                if (typeof initThemePanel === 'function') {
                    initThemePanel('themePanelContainer');
                }
            } catch (e) {
                console.log('Theme panel not available:', e);
            }
            updateTimerDisplay();
            newGame();
        };

        function setDiff(d) {
            difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === d);
            });
        }

        function setColor(c) {
            playerColor = c;
            document.querySelectorAll('.color-btn').forEach(b => {
                b.classList.toggle('active', b.textContent.toLowerCase() === c);
            });
            updateEvalBarOrientation();
            newGame();
        }

        function updatePromoImages() {
            const prefix = playerColor === 'white' ? 'w' : 'b';
            document.getElementById('promoQ').src = '/static/pieces/' + prefix + 'Q (1).png';
            document.getElementById('promoR').src = '/static/pieces/' + prefix + 'R (1).png';
            document.getElementById('promoB').src = '/static/pieces/' + prefix + 'B (1).png';
            document.getElementById('promoN').src = '/static/pieces/' + prefix + 'N (1).png';
        }

        function updateCoords() {
            const ranksEl = document.getElementById('ranks');
            const filesEl = document.getElementById('files');

            if (playerColor === 'black') {
                ranksEl.innerHTML = '12345678'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'hgfedcba'.split('').map(f => '<span>' + f + '</span>').join('');
            } else {
                ranksEl.innerHTML = '87654321'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'abcdefgh'.split('').map(f => '<span>' + f + '</span>').join('');
            }
        }

        function updateUndoButton() {
            const btn = document.getElementById('undoBtn');
            const canUndo = boardHistory.length > 1 || 
                (playerColor === 'black' && boardHistory.length > 0 && moveHistory.length > 0);
            btn.disabled = !canUndo || isThinking || document.getElementById('gameOver').classList.contains('active') || document.getElementById('timeOutOverlay').classList.contains('active');
        }

        async function newGame() {
            document.getElementById('promoModal').classList.remove('active');
            document.getElementById('gameOver').classList.remove('active');
            document.getElementById('timeOutOverlay').classList.remove('active');
            selectedSquare = null;
            lastMove = null;
            pendingPromo = null;
            moveHistory = [];
            boardHistory = [];
            isCheck = false;
            gameStarted = false;
            stopTimer();

            playerTime = timeControl.minutes * 60;
            engineTime = timeControl.minutes * 60;
            updateTimerDisplay();

            updateMoves();
            updatePromoImages();
            updateCoords();
            updateUndoButton();
            setStatus('Starting...');

            try {
                const response = await fetch('/api/chess/new', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ color: playerColor, session_id: sessionId })
                });
                const data = await response.json();

                if (data.error) {
                    setStatus('Error: ' + data.error);
                    return;
                }

                sessionId = data.session_id || sessionId;
                currentFEN = data.fen;
                legalMoves = data.legal_moves;
                boardHistory.push({
                    fen: currentFEN,
                    legalMoves: [...legalMoves],
                    lastMove: null,
                    moveHistory: []
                });
                drawBoard();
                updateEvalBarOrientation();
                updateEvalBar();
                gameStarted = true;

                if (playerColor === 'black') {
                    setStatus('MattFish is thinking...');
                    startTimer('engine');
                    await engineFirstMove();
                } else {
                    setStatus('Your turn! Click a white piece to move.');
                    startTimer('player');
                }
            } catch(err) {
                setStatus('Failed to start: ' + err.message);
            }
        }

        async function engineFirstMove() {
            isThinking = true;
            updateUndoButton();
            try {
                const response = await fetch('/api/chess/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: 'engine', difficulty: difficulty, session_id: sessionId })
                });
                const data = await response.json();
                isThinking = false;

                if (!data.error) {
                    currentFEN = data.fen;
                    isCheck = data.check || false;
                    lastMove = {
                        from: data.engine_move.substring(0, 2),
                        to: data.engine_move.substring(2, 4)
                    };
                    moveHistory.push({ white: data.engine_move, black: null });
                    updateMoves();
                    legalMoves = data.legal_moves || [];
                    boardHistory.push({
                        fen: currentFEN,
                        legalMoves: [...legalMoves],
                        lastMove: {...lastMove},
                        moveHistory: JSON.parse(JSON.stringify(moveHistory))
                    });

                    stopTimer();
                    addIncrement('engine');
                    startTimer('player');

                    playMoveSound();
                    drawBoard();
                    updateEvalBar();
                    updateUndoButton();
                    setStatus('Engine played ' + data.engine_move + '. Your turn!');
                }
            } catch(err) {
                isThinking = false;
                updateUndoButton();
                setStatus('Error: ' + err.message);
            }
        }

        async function undoMove() {
            if (boardHistory.length < 2) return;

            isThinking = true;
            updateUndoButton();
            setStatus('Undoing...');
            stopTimer();

            boardHistory.pop();
            const prevState = boardHistory[boardHistory.length - 1];

            currentFEN = prevState.fen;
            legalMoves = [...prevState.legalMoves];
            lastMove = prevState.lastMove ? {...prevState.lastMove} : null;
            moveHistory = JSON.parse(JSON.stringify(prevState.moveHistory));
            isCheck = false;

            try {
                await fetch('/api/chess/undo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
            } catch(e) {}

            isThinking = false;
            updateMoves();
            drawBoard();
            updateEvalBar();
            updateUndoButton();

            const fenParts = currentFEN.split(' ');
            const activeColor = fenParts[1] || 'w';
            const isPlayerTurn = (playerColor === 'white' && activeColor === 'w') || (playerColor === 'black' && activeColor === 'b');
            startTimer(isPlayerTurn ? 'player' : 'engine');

            setStatus('Undone. Your turn!');
        }

        function drawBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            const fenParts = currentFEN.split(' ');
            const fenRows = fenParts[0].split('/');
            const activeColor = fenParts[1] || 'w';
            const grid = [];
            for (let r = 0; r < 8; r++) {
                const row = [];
                for (let char of fenRows[r]) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) row.push(null);
                    } else {
                        row.push(char);
                    }
                }
                grid.push(row);
            }

            if (playerColor === 'black') {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const stdRank = 7 - vRow;
                        const stdFile = 7 - vCol;
                        const piece = grid[stdRank][stdFile];
                        const squareName = 'hgfedcba'[vCol] + (vRow + 1);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            } else {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const piece = grid[vRow][vCol];
                        const squareName = 'abcdefgh'[vCol] + (8 - vRow);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            }
        }

        // ===== DRAG & DROP + ANIMATION =====
        let _drag = null; // { fromSq, ghostEl, startX, startY, wasDrag }

        function _ghostify(imgEl, startX, startY) {
            const size = 62;
            const g = document.createElement('img');
            g.src = imgEl.src;
            g.style.cssText = `position:fixed;width:${size}px;height:${size}px;left:${startX - size/2}px;top:${startY - size/2}px;pointer-events:none;z-index:9999;transform:scale(1.18);filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));opacity:0.95;`;
            document.body.appendChild(g);
            return g;
        }

        function _squareAtPoint(x, y) {
            const prev = _drag && _drag.ghostEl ? _drag.ghostEl.style.display : null;
            if (_drag && _drag.ghostEl) _drag.ghostEl.style.display = 'none';
            const el = document.elementFromPoint(x, y);
            if (_drag && _drag.ghostEl && prev !== null) _drag.ghostEl.style.display = '';
            return el?.closest?.('[data-square]')?.dataset?.square || null;
        }

        function _onPtrMove(e) {
            if (!_drag) return;
            const x = e.clientX, y = e.clientY;
            if (_drag.ghostEl) {
                const size = 62;
                _drag.ghostEl.style.left = (x - size/2) + 'px';
                _drag.ghostEl.style.top  = (y - size/2) + 'px';
            }
            if (!_drag.wasDrag) {
                const dx = x - _drag.startX, dy = y - _drag.startY;
                if (Math.hypot(dx, dy) > 8) {
                    _drag.wasDrag = true;
                    // Create ghost, hide source piece
                    const fromEl = document.querySelector('[data-square="' + _drag.fromSq + '"]');
                    const img = fromEl?.querySelector('img');
                    if (img) {
                        img.style.opacity = '0';
                        _drag.ghostEl = _ghostify(img, x, y);
                    }
                }
            }
        }

        function _onPtrUp(e) {
            document.removeEventListener('pointermove', _onPtrMove);
            document.removeEventListener('pointerup', _onPtrUp);
            if (!_drag) return;
            const { fromSq, wasDrag, ghostEl } = _drag;
            if (ghostEl) ghostEl.remove();
            // Restore opacity of source piece
            const fromEl = document.querySelector('[data-square="' + fromSq + '"]');
            if (fromEl) { const img = fromEl.querySelector('img'); if (img) img.style.opacity = ''; }
            const toSq = wasDrag ? _squareAtPoint(e.clientX, e.clientY) : null;
            _drag = null;
            if (wasDrag && toSq && toSq !== fromSq) {
                _completeDrag(fromSq, toSq);
            } else if (!wasDrag) {
                // Treat as click — delegate to existing handleClick
                const el = document.querySelector('[data-square="' + fromSq + '"]');
                if (el) handleClick(el);
            }
        }

        function _startDrag(e, sq) {
            e.preventDefault();
            _drag = { fromSq: sq, ghostEl: null, startX: e.clientX, startY: e.clientY, wasDrag: false };
            document.addEventListener('pointermove', _onPtrMove);
            document.addEventListener('pointerup', _onPtrUp);
        }

        function _completeDrag(fromSq, toSq) {
            if (isThinking || !gameStarted) return;
            const isPlayerPiece = (() => {
                const el = document.querySelector('[data-square="' + fromSq + '"]');
                const img = el?.querySelector('img');
                return img && ((playerColor === 'white' && img.src.includes('/w')) || (playerColor === 'black' && img.src.includes('/b')));
            })();
            if (!isPlayerPiece) return;

            const match = legalMoves.find(m => m.substring(0,2) === fromSq && m.substring(2,4) === toSq);
            if (!match) { selectedSquare = null; drawBoard(); return; }

            const fromEl = document.querySelector('[data-square="' + fromSq + '"]');
            const isPawn = fromEl?.querySelector('img')?.src.match(/[wb]P/);
            const promoRank = playerColor === 'white' ? '8' : '1';
            if (isPawn && toSq[1] === promoRank) {
                selectedSquare = null;
                pendingPromo = fromSq + toSq;
                document.getElementById('promoModal').classList.add('active');
                return;
            }
            selectedSquare = null;
            sendMove(match);
        }

        // Slide animation for click moves (not drag)
        function _animateSlide(fromSq, toSq, cb) {
            const fromEl = document.querySelector('[data-square="' + fromSq + '"]');
            const toEl   = document.querySelector('[data-square="' + toSq + '"]');
            const img    = fromEl?.querySelector('img');
            if (!fromEl || !toEl || !img) { cb && cb(); return; }
            const fr = fromEl.getBoundingClientRect(), tr = toEl.getBoundingClientRect();
            const clone = document.createElement('img');
            clone.src = img.src;
            clone.style.cssText = `position:fixed;width:56px;height:56px;left:${fr.left + (fr.width-56)/2}px;top:${fr.top + (fr.height-56)/2}px;pointer-events:none;z-index:500;transition:left .14s ease,top .14s ease;`;
            document.body.appendChild(clone);
            img.style.visibility = 'hidden';
            requestAnimationFrame(() => requestAnimationFrame(() => {
                clone.style.left = (tr.left + (tr.width-56)/2) + 'px';
                clone.style.top  = (tr.top  + (tr.height-56)/2) + 'px';
            }));
            setTimeout(() => { clone.remove(); img.style.visibility = ''; cb && cb(); }, 160);
        }

        function createSquare(boardEl, vRow, vCol, squareName, piece, activeColor) {
            const square = document.createElement('div');
            const isLight = (vRow + vCol) % 2 === 0;

            square.className = 'square ' + (isLight ? 'light' : 'dark');
            square.dataset.square = squareName;

            if (isCheck && piece) {
                if ((activeColor === 'w' && piece === 'K') || (activeColor === 'b' && piece === 'k')) {
                    square.classList.add('check');
                }
            }

            if (piece && PIECE_IMAGES[piece]) {
                const img = document.createElement('img');
                img.src = PIECE_IMAGES[piece];
                img.alt = piece;
                square.appendChild(img);
            }

            if (lastMove) {
                if (square.dataset.square === lastMove.from || square.dataset.square === lastMove.to) {
                    square.classList.add('last-move');
                }
            }

            if (selectedSquare === square.dataset.square) {
                square.classList.add('selected');
            }

            if (selectedSquare) {
                const isLegalDest = legalMoves.some(m => 
                    m.substring(0, 2) === selectedSquare && 
                    m.substring(2, 4) === square.dataset.square
                );
                if (isLegalDest) {
                    square.classList.add('legal');
                }
            }

            square.addEventListener('pointerdown', (e) => {
                // Only start drag/interact for player pieces when it's player's turn
                if (isThinking || !gameStarted) return;
                if (!dragEnabled) return; // click-only mode: let the native click handler do the move
                _startDrag(e, squareName);
            });
            square.addEventListener('click', function() { handleClick(square); });
            boardEl.appendChild(square);
        }

        // ========== FIXED PROMOTION HANDLING ==========
        function handleClick(square) {
            if (isThinking || !gameStarted) return;

            const sq = square.dataset.square;
            const piece = square.querySelector('img');
            const isPlayerPiece = piece && (
                (playerColor === 'white' && piece.src.includes('/w')) ||
                (playerColor === 'black' && piece.src.includes('/b'))
            );

            if (!selectedSquare) {
                if (isPlayerPiece) {
                    selectedSquare = sq;
                    drawBoard();
                }
                return;
            }

            if (selectedSquare === sq) {
                selectedSquare = null;
                drawBoard();
                return;
            }

            const matchingMove = legalMoves.find(m => 
                m.substring(0, 2) === selectedSquare && 
                m.substring(2, 4) === sq
            );

            if (matchingMove) {
                const fromSquare = document.querySelector('[data-square="' + selectedSquare + '"]');
                const fromPiece = fromSquare.querySelector('img');
                const isPawn = fromPiece && (fromPiece.src.includes('wP') || fromPiece.src.includes('bP'));
                const promoRank = playerColor === 'white' ? '8' : '1';

                if (isPawn && sq[1] === promoRank) {
                    pendingPromo = selectedSquare + sq;
                    document.getElementById('promoModal').classList.add('active');
                    return;
                }
                // Animate before sending
                const fromSq = selectedSquare;
                selectedSquare = null;
                _animateSlide(fromSq, sq, null);
                sendMove(matchingMove);
            } else if (isPlayerPiece) {
                selectedSquare = sq;
                drawBoard();
            } else {
                selectedSquare = null;
                drawBoard();
            }
        }

        function doPromo(piece) {
            document.getElementById('promoModal').classList.remove('active');
            if (pendingPromo) {
                sendMove(pendingPromo + piece);
                pendingPromo = null;
            }
        }

        async function sendMove(move) {
            isThinking = true;
            selectedSquare = null;
            updateUndoButton();

            stopTimer();
            addIncrement('player');

            setStatus('MattFish is thinking...');

            try {
                const response = await fetch('/api/chess/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: move, difficulty: difficulty, session_id: sessionId })
                });

                const data = await response.json();
                isThinking = false;

                if (data.error) {
                    setStatus('Error: ' + data.error);
                    if (data.fen) {
                        currentFEN = data.fen;
                        drawBoard();
                    }
                    startTimer('player');
                    updateUndoButton();
                    return;
                }

                currentFEN = data.fen;
                isCheck = data.check || false;

                if (data.engine_move) {
                    lastMove = {
                        from: data.engine_move.substring(0, 2),
                        to: data.engine_move.substring(2, 4)
                    };
                } else {
                    lastMove = {
                        from: move.substring(0, 2),
                        to: move.substring(2, 4)
                    };
                }

                if (data.player_move) {
                    if (playerColor === 'white') {
                        moveHistory.push({ white: data.player_move, black: data.engine_move });
                    } else {
                        moveHistory.push({ white: data.engine_move, black: data.player_move });
                    }
                    updateMoves();
                }

                legalMoves = data.legal_moves || [];

                if (isCheck) {
                    playCheckSound();
                } else {
                    playMoveSound();
                }

                boardHistory.push({
                    fen: currentFEN,
                    legalMoves: [...legalMoves],
                    lastMove: lastMove ? {...lastMove} : null,
                    moveHistory: JSON.parse(JSON.stringify(moveHistory))
                });

                drawBoard();
                updateEvalBar();
                updateUndoButton();

                if (data.game_over) {
                    stopTimer();
                    const playerWon = (playerColor === 'white' && data.result === '1-0') || (playerColor === 'black' && data.result === '0-1');
                    playGameOverSound(playerWon);
                    showGameOver(data.result);
                } else {
                    startTimer('engine');
                    setStatus(data.engine_move ? 
                        'Engine played ' + data.engine_move + '. Your turn!' : 
                        'Your turn!');
                }
            } catch(err) {
                isThinking = false;
                startTimer('player');
                updateUndoButton();
                setStatus('Error: ' + err.message);
            }
        }

        function updateMoves() {
            const container = document.getElementById('moves');
            container.innerHTML = '';

            moveHistory.forEach((pair, i) => {
                const div = document.createElement('div');
                div.className = 'move-pair';
                div.innerHTML = '<span class="move-num">' + (i + 1) + '.</span> ' +
                    '<span class="move-w">' + (pair.white || '...') + '</span>' +
                    (pair.black ? ' <span class="move-b">' + pair.black + '</span>' : '');
                container.appendChild(div);
            });
        }

        function showGameOver(result) {
            const overlay = document.getElementById('gameOver');
            const text = document.getElementById('gameOverText');

            let msg = result;
            let color = '#fff';
            const playerWon = (playerColor === 'white' && result === '1-0') || (playerColor === 'black' && result === '0-1');
            const playerLost = (playerColor === 'white' && result === '0-1') || (playerColor === 'black' && result === '1-0');

            if (playerWon) { msg = 'You Win!'; color = '#4CAF50'; }
            else if (playerLost) { msg = 'MattFish Wins!'; color = '#e74c3c'; }
            else { msg = 'Draw!'; color = '#f39c12'; }

            text.textContent = msg;
            text.style.color = color;
            overlay.classList.add('active');
            setStatus('Game Over: ' + result);
            updateUndoButton();
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }
        // ========== GAME REVIEW ==========
        let reviewData = [];
        let reviewIndex = -1; // -1 = starting position

        async function openReview() {
            if (!sessionId) {
                setStatus('Start a game first to review it.');
                return;
            }
            try {
                const res = await fetch('/api/chess/review/' + sessionId);
                const data = await res.json();
                if (data.error) {
                    setStatus('Error: ' + data.error);
                    return;
                }
                reviewData = data.moves || [];
                if (reviewData.length === 0) {
                    setStatus('No moves played yet — nothing to review.');
                    return;
                }
                reviewIndex = reviewData.length - 1;
                renderEvalGraph();
                renderReviewMovesList();
                showReviewMove(reviewIndex);
                document.getElementById('pgnTextarea').value = '';
                document.getElementById('reviewModal').classList.add('active');
            } catch (err) {
                setStatus('Error loading review: ' + err.message);
            }
        }

        function closeReview() {
            document.getElementById('reviewModal').classList.remove('active');
        }

        function reviewStep(delta) {
            if (reviewData.length === 0) return;
            let target = reviewIndex + delta;
            if (delta <= -1000) target = 0;
            if (delta >= 1000) target = reviewData.length - 1;
            target = Math.max(0, Math.min(reviewData.length - 1, target));
            showReviewMove(target);
        }

        function showReviewMove(i) {
            reviewIndex = i;
            const entry = reviewData[i];
            const fromSq = entry.move_uci.substring(0, 2);
            const toSq = entry.move_uci.substring(2, 4);
            renderStaticBoard(entry.fen, { from: fromSq, to: toSq });

            let evalText;
            if (entry.mate) {
                evalText = 'Mate in ' + Math.abs(entry.mate);
            } else {
                evalText = (entry.eval / 100).toFixed(2);
            }
            const moveNum = Math.floor(i / 2) + 1;
            const side = entry.white_to_move_before ? 'White' : 'Black';
            document.getElementById('reviewMoveInfo').innerHTML =
                '<strong>Move ' + moveNum + (entry.white_to_move_before ? '.' : '...') + ' ' + entry.move_san + '</strong> (' + side + ')<br>' +
                'Eval: ' + evalText + ' &nbsp;|&nbsp; <span class="tag-' + entry.classification + '">' + entry.classification + '</span>';

            document.querySelectorAll('.review-move-row').forEach((el, idx) => {
                el.classList.toggle('selected', idx === i);
            });
            document.querySelectorAll('.eval-graph-bar').forEach((el, idx) => {
                el.classList.toggle('selected', idx === i);
            });
        }

        function renderEvalGraph() {
            const graph = document.getElementById('evalGraph');
            graph.innerHTML = '';
            reviewData.forEach((entry, i) => {
                const bar = document.createElement('div');
                bar.className = 'eval-graph-bar';
                const pct = Math.max(2, Math.min(100, 50 + (entry.eval / 1000) * 50));
                bar.style.height = pct + '%';
                bar.style.background = entry.eval >= 0 ? '#f0d9b5' : '#b58863';
                if (entry.classification === 'Blunder') bar.style.background = '#e74c3c';
                else if (entry.classification === 'Mistake') bar.style.background = '#f39c12';
                bar.title = entry.move_san + ' (' + (entry.eval / 100).toFixed(2) + ')';
                bar.addEventListener('click', () => showReviewMove(i));
                graph.appendChild(bar);
            });
        }

        function renderReviewMovesList() {
            const list = document.getElementById('reviewMovesList');
            list.innerHTML = '';
            reviewData.forEach((entry, i) => {
                const row = document.createElement('div');
                row.className = 'review-move-row';
                const moveNum = Math.floor(i / 2) + 1;
                const label = moveNum + (entry.white_to_move_before ? '.' : '...') + ' ' + entry.move_san;
                row.innerHTML = '<span>' + label + '</span>' +
                    '<span class="tag-' + entry.classification + '">' + entry.classification + '</span>';
                row.addEventListener('click', () => showReviewMove(i));
                list.appendChild(row);
            });
        }

        // Renders a read-only board into #reviewBoard from a FEN string (always White's-perspective)
        function renderStaticBoard(fen, lastMoveSquares) {
            const boardEl = document.getElementById('reviewBoard');
            boardEl.innerHTML = '';
            const fenRows = fen.split(' ')[0].split('/');
            const grid = [];
            for (let r = 0; r < 8; r++) {
                const row = [];
                for (const char of fenRows[r]) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) row.push(null);
                    } else {
                        row.push(char);
                    }
                }
                grid.push(row);
            }
            for (let vRow = 0; vRow < 8; vRow++) {
                for (let vCol = 0; vCol < 8; vCol++) {
                    const piece = grid[vRow][vCol];
                    const squareName = 'abcdefgh'[vCol] + (8 - vRow);
                    const square = document.createElement('div');
                    const isLight = (vRow + vCol) % 2 === 0;
                    square.className = 'square ' + (isLight ? 'light' : 'dark');
                    if (lastMoveSquares && (squareName === lastMoveSquares.from || squareName === lastMoveSquares.to)) {
                        square.classList.add('review-last-move');
                    }
                    if (piece && PIECE_IMAGES[piece]) {
                        const img = document.createElement('img');
                        img.src = PIECE_IMAGES[piece];
                        img.alt = piece;
                        square.appendChild(img);
                    }
                    boardEl.appendChild(square);
                }
            }
        }

        async function fetchPGN() {
            if (!sessionId) return null;
            const res = await fetch('/api/chess/pgn/' + sessionId);
            const data = await res.json();
            return data.pgn || null;
        }

        async function copyPGN() {
            const pgn = await fetchPGN();
            if (!pgn) {
                setStatus('No PGN available.');
                return;
            }
            document.getElementById('pgnTextarea').value = pgn;
            try {
                await navigator.clipboard.writeText(pgn);
                setStatus('PGN copied to clipboard!');
            } catch (e) {
                setStatus('PGN ready below — copy manually.');
            }
        }

        async function downloadPGN() {
            const pgn = await fetchPGN();
            if (!pgn) {
                setStatus('No PGN available.');
                return;
            }
            document.getElementById('pgnTextarea').value = pgn;
            const blob = new Blob([pgn], { type: 'application/x-chess-pgn' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mattfish-game.pgn';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
