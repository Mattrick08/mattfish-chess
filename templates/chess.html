<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MattFish Chess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            gap: 30px;
            padding: 20px;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
        h1 { color: #e74c3c; margin: 0; font-size: 28px; }
        #status {
            background: #2e2e2e;
            padding: 12px;
            border-radius: 8px;
            min-height: 45px;
            display: flex;
            align-items: center;
            font-size: 14px;
        }
        .section-title {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-top: 3px;
            letter-spacing: 0.5px;
        }
        .diff-btn, .color-btn, .undo-btn, .sound-btn, .eval-btn, .time-btn, .mp-action-btn {
            padding: 10px;
            border: 2px solid #444;
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .diff-btn:hover, .color-btn:hover, .time-btn:hover { border-color: #666; }
        .diff-btn.active, .color-btn.active { 
            border-color: #4CAF50; 
            background: rgba(76,175,80,0.2); 
        }
        .time-btn.active {
            border-color: #2196F3;
            background: rgba(33,150,243,0.2);
        }
        .undo-btn {
            border-color: #f39c12;
            background: rgba(243,156,18,0.1);
        }
        .undo-btn:hover {
            border-color: #f39c12;
            background: rgba(243,156,18,0.2);
        }
        .undo-btn:disabled {
            border-color: #555;
            background: transparent;
            color: #666;
            cursor: not-allowed;
        }
        .sound-btn {
            border-color: #2196F3;
            background: rgba(33,150,243,0.1);
        }
        .sound-btn:hover {
            border-color: #2196F3;
            background: rgba(33,150,243,0.2);
        }
        .sound-btn.off {
            border-color: #555;
            background: transparent;
            color: #666;
        }
        .eval-btn {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.1);
        }
        .eval-btn:hover {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.2);
        }
        .eval-btn.active {
            border-color: #9C27B0;
            background: rgba(156,39,176,0.3);
        }
        .mp-action-btn {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.1);
        }
        .mp-action-btn:hover {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.2);
        }
        .new-game-btn {
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .new-game-btn:hover { background: #c0392b; }
        .board-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .board-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .coords-ranks {
            position: absolute;
            left: -25px;
            top: 0;
            height: 560px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            font-size: 14px;
            color: #888;
            width: 20px;
            text-align: center;
        }
        .coords-files {
            display: flex;
            justify-content: space-around;
            width: 560px;
            padding: 5px 0;
            font-size: 14px;
            color: #888;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 3px solid #555;
            border-radius: 4px;
        }
        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.1s;
        }
        .square img {
            width: 60px;
            height: 60px;
            pointer-events: none;
        }
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        .square:hover { filter: brightness(1.15); }
        .selected { background: #f7ec5f !important; }
        .last-move { box-shadow: inset 0 0 0 4px rgba(255, 107, 107, 0.7); }
        .legal::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            pointer-events: none;
        }
        .light.legal::after { background: rgba(0, 0, 0, 0.2); }
        .dark.legal::after { background: rgba(255, 255, 255, 0.25); }
        .check { background: rgba(231, 76, 60, 0.6) !important; }
        .promotion-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .promotion-modal.active { display: flex; }
        .promotion-modal > div {
            display: flex;
            gap: 15px;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #555;
        }
        .promo-piece {
            width: 80px;
            height: 80px;
            cursor: pointer;
            background: #f0d9b5;
            border-radius: 10px;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid transparent;
        }
        .promo-piece:hover { 
            transform: scale(1.15); 
            background: #fff; 
            border-color: #e74c3c;
        }
        .promo-piece img { width: 65px; height: 65px; }
        .promo-label {
            text-align: center;
            color: #aaa;
            font-size: 12px;
            margin-bottom: 15px;
            width: 100%;
        }
        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-text { font-size: 42px; font-weight: bold; margin-bottom: 20px; }
        .play-again-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .move-history {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            width: 560px;
            max-height: 120px;
            overflow-y: auto;
        }
        .move-history h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .moves-list { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
        .move-pair { background: #1a1a2e; padding: 4px 8px; border-radius: 4px; }
        .move-num { color: #888; }
        .move-w { color: #f0d9b5; }
        .move-b { color: #b58863; }
        .eval-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .eval-container.active { display: flex; }
        .eval-bar-wrapper {
            width: 30px;
            height: 560px;
            background: #2e2e2e;
            border: 2px solid #555;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .eval-bar-white {
            position: absolute;
            left: 0; right: 0;
            background: #f0d9b5;
            transition: height 0.5s ease;
            bottom: 0;
        }
        .eval-bar-black {
            position: absolute;
            left: 0; right: 0;
            background: #b58863;
            transition: height 0.5s ease;
            top: 0;
        }
        .eval-bar-wrapper.flipped .eval-bar-white {
            bottom: auto; top: 0;
        }
        .eval-bar-wrapper.flipped .eval-bar-black {
            top: auto; bottom: 0;
        }
        .eval-center-line {
            position: absolute;
            left: 0; right: 0;
            top: 50%;
            height: 2px;
            background: #e74c3c;
            z-index: 2;
        }
        .eval-number {
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-align: center;
            min-width: 50px;
        }
        .eval-label {
            font-size: 10px;
            color: #888;
            text-align: center;
        }
        .eval-label-player {
            color: #4CAF50;
            font-weight: bold;
        }
        .mp-panel {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            display: none;
        }
        .mp-panel.active { display: block; }
        .mp-room-info {
            text-align: center;
            margin-bottom: 10px;
        }
        .mp-room-code {
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .mp-room-code:hover { color: #66BB6A; }
        .mp-player-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .mp-player-info .connected { color: #4CAF50; }
        .mp-player-info .disconnected { color: #e74c3c; }
        .mp-player-info .you { font-weight: bold; color: #fff; }
        .mp-chat-container {
            background: #1e1e1e;
            border-radius: 6px;
            height: 150px;
            overflow-y: auto;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .mp-chat-message {
            margin-bottom: 4px;
            padding: 3px 6px;
            border-radius: 4px;
        }
        .mp-chat-message .sender {
            font-weight: bold;
            color: #4CAF50;
        }
        .mp-chat-message .sender-spectator {
            color: #9C27B0;
        }
        .mp-chat-input-row {
            display: flex;
            gap: 6px;
        }
        .mp-chat-input {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
            font-size: 13px;
        }
        .mp-chat-send {
            padding: 8px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .mp-chat-send:hover { background: #45a049; }
        .mp-spectator-badge {
            background: #9C27B0;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 8px;
        }
        .mp-draw-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .mp-draw-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            border: 1px solid #555;
            background: transparent;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        .mp-draw-btn:hover { border-color: #f39c12; }
        .mp-resign-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            border: 1px solid #555;
            background: transparent;
            color: #e74c3c;
            border-radius: 4px;
            cursor: pointer;
        }
        .mp-resign-btn:hover { border-color: #e74c3c; }
        .mp-draw-offer-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1500;
        }
        .mp-draw-offer-overlay.active { display: flex; }
        .mp-draw-offer-box {
            background: #2a2a2a;
            border: 2px solid #f39c12;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            max-width: 350px;
        }
        .mp-draw-offer-box h3 {
            color: #f39c12;
            margin-bottom: 15px;
        }
        .mp-draw-offer-box p {
            color: #aaa;
            margin-bottom: 20px;
        }
        .mp-draw-offer-box .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mp-draw-offer-box button {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .mp-accept-btn { background: #4CAF50; color: white; }
        .mp-decline-btn { background: #555; color: white; }
        .timer-display {
            background: #2e2e2e;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 2px;
        }
        .timer-display.active-turn {
            border: 2px solid #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .timer-display.low-time {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .time-controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .time-btn {
            padding: 8px 6px;
            font-size: 12px;
        }
        .custom-time-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .custom-time-row input {
            width: 60px;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
            text-align: center;
            font-size: 13px;
        }
        .custom-time-row label {
            font-size: 11px;
            color: #aaa;
        }
        .time-out-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1001;
        }
        .time-out-overlay.active { display: flex; }
        .time-out-text { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        .personalize-toggle-btn { 
            padding: 10px; 
            font-size: 14px; 
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.2s; 
            width: 100%; 
        }
        .personalize-toggle-btn:hover { background: #c0392b; }
        .personalize-panel { 
            background: #2a2a2a; 
            border: 1px solid #444; 
            border-radius: 10px; 
            padding: 15px; 
            margin-top: 10px; 
        }
        .personalize-panel h3 { 
            font-size: 14px; 
            margin-bottom: 12px; 
            text-align: center; 
        }
        .color-grid { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 4px; 
            margin-bottom: 10px; 
        }
        .color-swatch { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 4px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: 0.2s; 
        }
        .color-swatch:hover { 
            transform: scale(1.15); 
            border-color: white; 
            z-index: 2; 
            position: relative; 
        }
        .color-swatch.active { 
            border-color: #fff; 
            box-shadow: 0 0 0 2px #e74c3c; 
        }
        .custom-color-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 10px; 
        }
        .custom-color-row label { 
            font-size: 11px; 
            color: #aaa; 
            min-width: 70px; 
        }
        .custom-color-row input[type="color"] { 
            width: 36px; 
            height: 28px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            background: none; 
            padding: 0; 
        }
        .custom-color-row input[type="text"] { 
            flex: 1; 
            padding: 5px 8px; 
            font-size: 12px; 
            border-radius: 4px; 
            border: 1px solid #555; 
            background: #1e1e1e; 
            color: white; 
            width: auto; 
        }
        .upload-area { 
            border: 2px dashed #555; 
            border-radius: 8px; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-bottom: 10px; 
        }
        .upload-area:hover { 
            border-color: #e74c3c; 
            background: rgba(231, 76, 60, 0.05); 
        }
        .upload-area.dragover { 
            border-color: #4CAF50; 
            background: rgba(76, 175, 80, 0.1); 
        }
        .upload-area p { 
            font-size: 12px; 
            color: #888; 
            margin-bottom: 6px; 
        }
        .upload-area input[type="file"] { display: none; }
        .upload-btn { 
            padding: 6px 14px; 
            font-size: 12px; 
            background: #444; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        }
        .upload-btn:hover { background: #555; }
        .preview-img { 
            max-width: 100%; 
            max-height: 80px; 
            border-radius: 6px; 
            margin-top: 8px; 
            display: none; 
        }
        .preview-img.visible { display: block; }
        .remove-img-btn { 
            padding: 4px 10px; 
            font-size: 11px; 
            background: #c0392b; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-top: 6px; 
            display: none; 
        }
        .remove-img-btn.visible { display: inline-block; }
        .remove-img-btn:hover { background: #a93226; }
        .reset-btn { 
            width: 100%; 
            padding: 8px; 
            font-size: 12px; 
            background: #555; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 8px; 
        }
        .reset-btn:hover { background: #666; }
        .bg-image-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            z-index: -1; 
            opacity: 0.12; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            pointer-events: none; 
        }
        .mode-badge {
            text-align: center;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .mode-badge.engine { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .mode-badge.multiplayer { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .mode-badge.spectator { background: rgba(156, 39, 176, 0.2); color: #9C27B0; }
    </style>
    <script type="text/javascript" src="/static/theme.js"></script>
</head>
<body>
    <div class="bg-image-overlay" id="bgImageOverlay"></div>

    <div class="sidebar">
        <h1>&#9818; MattFish</h1>

        <div class="mode-badge engine" id="modeBadge">Engine Mode</div>

        <div id="status">Click "New Game" to start</div>

        <div class="timer-display" id="playerTimer">10:00</div>

        <div id="engineControls">
            <div class="section-title">Difficulty</div>
            <div>
                <button class="diff-btn" onclick="setDiff('Easy')">Easy</button>
                <button class="diff-btn active" onclick="setDiff('Medium')">Medium</button>
                <button class="diff-btn" onclick="setDiff('Hard')">Hard</button>
            </div>

            <div class="section-title">Play As</div>
            <div>
                <button class="color-btn active" onclick="setColor('white')">White</button>
                <button class="color-btn" onclick="setColor('black')">Black</button>
            </div>

            <div class="section-title">Time Control</div>
            <div class="time-controls-grid">
                <button class="time-btn active" onclick="setTimeControl('bullet1', this)" data-min="1" data-inc="0">1+0</button>
                <button class="time-btn" onclick="setTimeControl('bullet2', this)" data-min="2" data-inc="1">2+1</button>
                <button class="time-btn" onclick="setTimeControl('blitz3', this)" data-min="3" data-inc="2">3+2</button>
                <button class="time-btn" onclick="setTimeControl('blitz5', this)" data-min="5" data-inc="0">5+0</button>
                <button class="time-btn" onclick="setTimeControl('blitz5inc', this)" data-min="5" data-inc="3">5+3</button>
                <button class="time-btn" onclick="setTimeControl('rapid10', this)" data-min="10" data-inc="0">10+0</button>
                <button class="time-btn" onclick="setTimeControl('rapid10inc', this)" data-min="10" data-inc="5">10+5</button>
                <button class="time-btn" onclick="setTimeControl('rapid15', this)" data-min="15" data-inc="10">15+10</button>
            </div>
            <div class="custom-time-row">
                <label>Custom:</label>
                <input type="number" id="customMin" placeholder="Min" min="1" max="180" value="10">
                <label>+</label>
                <input type="number" id="customInc" placeholder="Inc" min="0" max="60" value="0">
                <button class="time-btn" onclick="setCustomTimeControl()" style="padding:6px 10px;">Set</button>
            </div>
        </div>

        <div class="mp-panel" id="mpPanel">
            <div class="mp-room-info">
                <div class="section-title">Room Code</div>
                <div class="mp-room-code" id="mpRoomCode" onclick="copyMpRoomCode()" title="Click to copy">------</div>
            </div>
            <div class="mp-player-info" id="mpPlayerInfo">
                <span id="whitePlayer">White: Waiting...</span>
                <span id="blackPlayer">Black: Waiting...</span>
            </div>
            <div class="mp-spectator-badge" id="mpSpectatorBadge" style="display:none;">&#128064; Spectator Mode</div>
            <div class="section-title">Chat</div>
            <div class="mp-chat-container" id="mpChatContainer"></div>
            <div class="mp-chat-input-row" id="mpChatInputRow">
                <input type="text" class="mp-chat-input" id="mpChatInput" placeholder="Type a message..." maxlength="500">
                <button class="mp-chat-send" onclick="sendChatMessage()">Send</button>
            </div>
            <div class="mp-draw-row" id="mpActionRow">
                <button class="mp-draw-btn" onclick="offerDraw()">&#127987; Offer Draw</button>
                <button class="mp-resign-btn" onclick="resignGame()">&#127987; Resign</button>
            </div>
        </div>

        <div class="timer-display" id="engineTimer">10:00</div>

        <button class="undo-btn" id="undoBtn" onclick="undoMove()" disabled>&#8617; Undo Move</button>
        <button class="sound-btn" id="soundBtn" onclick="toggleSound()">&#128266; Sound On</button>
        <button class="eval-btn" id="evalBtn" onclick="toggleEvalBar()">&#128202; Eval Bar</button>
        <button class="new-game-btn" onclick="newGame()">New Game</button>
        <button class="mp-action-btn" id="mpLeaveBtn" onclick="leaveMpGame()" style="display:none;">&#10060; Leave Room</button>
        <button id="personalizeToggleBtn" class="personalize-toggle-btn" onclick="togglePersonalizePanel()">&#127912; Personalize</button>
        <div id="themePanelContainer"></div>
        <a href="/" style="color:#4CAF50; text-decoration:none; text-align:center;">&#8592; Back to Stats</a>
    </div>

    <div class="board-area">
        <div class="board-wrapper">
            <div class="coords-ranks" id="ranks"></div>
            <div id="board"></div>
            <div class="eval-container" id="evalContainer">
                <div class="eval-label" id="evalLabelTop">White</div>
                <div class="eval-bar-wrapper" id="evalBarWrapper">
                    <div class="eval-bar-black" id="evalBarBlack"></div>
                    <div class="eval-bar-white" id="evalBarWhite"></div>
                    <div class="eval-center-line"></div>
                </div>
                <div class="eval-label" id="evalLabelBottom">Black</div>
                <div class="eval-number" id="evalNumber">0.0</div>
            </div>
        </div>
        <div class="coords-files" id="files"></div>
        <div class="move-history">
            <h3>Move History</h3>
            <div class="moves-list" id="moves"></div>
        </div>
    </div>

    <div class="promotion-modal" id="promoModal">
        <div>
            <div style="width:100%;">
                <div class="promo-label">Choose promotion piece:</div>
                <div style="display:flex; gap:15px; justify-content:center;">
                    <div class="promo-piece" onclick="doPromo('q')" title="Queen">
                        <img id="promoQ" src="/static/pieces/wQ (1).png" alt="Queen">
                    </div>
                    <div class="promo-piece" onclick="doPromo('r')" title="Rook">
                        <img id="promoR" src="/static/pieces/wR (1).png" alt="Rook">
                    </div>
                    <div class="promo-piece" onclick="doPromo('b')" title="Bishop">
                        <img id="promoB" src="/static/pieces/wB (1).png" alt="Bishop">
                    </div>
                    <div class="promo-piece" onclick="doPromo('n')" title="Knight">
                        <img id="promoN" src="/static/pieces/wN (1).png" alt="Knight">
                    </div>
                </div>
            </div>
        </div>
