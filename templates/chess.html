    <div class="game-over-overlay" id="gameOver">
        <div class="game-over-text" id="gameOverText"></div>
        <button class="play-again-btn" onclick="newGame()">Play Again</button>
    </div>

    <div class="time-out-overlay" id="timeOutOverlay">
        <div class="time-out-text" id="timeOutText"></div>
        <button class="play-again-btn" onclick="newGame()">Play Again</button>
    </div>

    <div class="mp-draw-offer-overlay" id="drawOfferOverlay">
        <div class="mp-draw-offer-box">
            <h3>&#127987; Draw Offered</h3>
            <p id="drawOfferText">Your opponent offers a draw.</p>
            <div class="buttons">
                <button class="mp-accept-btn" onclick="respondDraw(true)">Accept</button>
                <button class="mp-decline-btn" onclick="respondDraw(false)">Decline</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>

        const PIECE_IMAGES = {
            'P': '/static/pieces/wP (1).png',
            'N': '/static/pieces/wN (1).png',
            'B': '/static/pieces/wB (1).png',
            'R': '/static/pieces/wR (1).png',
            'Q': '/static/pieces/wQ (1).png',
            'K': '/static/pieces/wK (1).png',
            'p': '/static/pieces/bP (1).png',
            'n': '/static/pieces/bN (1).png',
            'b': '/static/pieces/bB (1).png',
            'r': '/static/pieces/bR (1).png',
            'q': '/static/pieces/bQ (1).png',
            'k': '/static/pieces/bK (1).png'
        };

        let currentFEN = '';
        let selectedSquare = null;
        let legalMoves = [];
        let lastMove = null;
        let isThinking = false;
        let difficulty = 'Medium';
        let playerColor = 'white';
        let pendingPromo = null;
        let moveHistory = [];
        let boardHistory = [];
        let soundEnabled = true;
        let audioCtx = null;
        let isCheck = false;
        let sessionId = null;
        let evalBarEnabled = false;

        let timeControl = { minutes: 10, increment: 0 };
        let playerTime = 600;
        let engineTime = 600;
        let timerInterval = null;
        let activeTimer = null;
        let gameStarted = false;

        const TIME_PRESETS = {
            'bullet1': { minutes: 1, increment: 0 },
            'bullet2': { minutes: 2, increment: 1 },
            'blitz3': { minutes: 3, increment: 2 },
            'blitz5': { minutes: 5, increment: 0 },
            'blitz5inc': { minutes: 5, increment: 3 },
            'rapid10': { minutes: 10, increment: 0 },
            'rapid10inc': { minutes: 10, increment: 5 },
            'rapid15': { minutes: 15, increment: 10 }
        };

        let socket = null;
        let isMultiplayer = false;
        let isSpectator = false;
        let roomCode = null;
        let myMpColor = null;
        let mpGameStarted = false;
        let mpGameOver = false;
        let whiteTimeMp = 600;
        let blackTimeMp = 600;
        let mpActiveTimer = null;

        function detectMode() {
            const params = new URLSearchParams(window.location.search);
            roomCode = params.get('room');
            myMpColor = params.get('color');
            const mode = params.get('mode');

            if (roomCode) {
                isMultiplayer = true;
                if (mode === 'spectate') {
                    isSpectator = true;
                    myMpColor = null;
                }
                initSocket();
                return;
            }

            isMultiplayer = false;
            isSpectator = false;
            updateModeUI();
        }

        function updateModeUI() {
            const badge = document.getElementById('modeBadge');
            const engineControls = document.getElementById('engineControls');
            const mpPanel = document.getElementById('mpPanel');
            const mpLeaveBtn = document.getElementById('mpLeaveBtn');
            const undoBtn = document.getElementById('undoBtn');
            const evalBtn = document.getElementById('evalBtn');

            if (isSpectator) {
                badge.textContent = 'Spectator Mode';
                badge.className = 'mode-badge spectator';
                engineControls.style.display = 'none';
                mpPanel.classList.add('active');
                mpLeaveBtn.style.display = 'block';
                undoBtn.style.display = 'none';
                evalBtn.style.display = 'none';
                document.getElementById('mpSpectatorBadge').style.display = 'block';
                document.getElementById('mpActionRow').style.display = 'none';
                document.getElementById('mpChatInputRow').style.display = 'none';
            } else if (isMultiplayer) {
                badge.textContent = 'Multiplayer';
                badge.className = 'mode-badge multiplayer';
                engineControls.style.display = 'none';
                mpPanel.classList.add('active');
                mpLeaveBtn.style.display = 'block';
                undoBtn.style.display = 'none';
                evalBtn.style.display = 'none';
                document.getElementById('mpSpectatorBadge').style.display = 'none';
                document.getElementById('mpActionRow').style.display = 'flex';
                document.getElementById('mpChatInputRow').style.display = 'flex';
            } else {
                badge.textContent = 'Engine Mode';
                badge.className = 'mode-badge engine';
                engineControls.style.display = 'block';
                mpPanel.classList.remove('active');
                mpLeaveBtn.style.display = 'none';
                undoBtn.style.display = 'block';
                evalBtn.style.display = 'block';
            }
        }

        function initSocket() {
            socket = io();

            socket.on('connect', function() {
                console.log('Socket connected');
                if (isSpectator) {
                    socket.emit('join_room', { room_code: roomCode, mode: 'spectate' });
                } else {
                    socket.emit('join_room', { room_code: roomCode, mode: 'play' });
                }
            });

            socket.on('joined_room', function(data) {
                console.log('Joined room:', data);
                roomCode = data.room_code;
                myMpColor = data.your_color;
                document.getElementById('mpRoomCode').textContent = roomCode;
                updateModeUI();
                setStatus(data.message);

                if (myMpColor === 'white') {
                    document.getElementById('whitePlayer').innerHTML = '<span class="you">White: You &#9733;</span>';
                    document.getElementById('blackPlayer').innerHTML = '<span class="disconnected">Black: Waiting...</span>';
                } else {
                    document.getElementById('whitePlayer').innerHTML = '<span class="connected">White: Opponent</span>';
                    document.getElementById('blackPlayer').innerHTML = '<span class="you">Black: You &#9733;</span>';
                }

                playerColor = myMpColor;
                updateEvalBarOrientation();
            });

            socket.on('joined_as_spectator', function(data) {
                console.log('Joined as spectator:', data);
                roomCode = data.room_code;
                document.getElementById('mpRoomCode').textContent = roomCode;
                updateModeUI();
                setStatus('Spectating room ' + roomCode);

                currentFEN = data.fen;
                moveHistory = data.move_history || [];
                whiteTimeMp = data.white_time || 600;
                blackTimeMp = data.black_time || 600;
                mpGameStarted = data.game_started;
                mpGameOver = data.game_over;

                document.getElementById('whitePlayer').innerHTML = data.players.white ? 
                    '<span class="connected">White: Player</span>' : '<span class="disconnected">White: Empty</span>';
                document.getElementById('blackPlayer').innerHTML = data.players.black ? 
                    '<span class="connected">Black: Player</span>' : '<span class="disconnected">Black: Empty</span>';

                updateMoves();
                drawBoard();
                updateMpTimers();

                const chatContainer = document.getElementById('mpChatContainer');
                chatContainer.innerHTML = '';
                (data.chat_history || []).forEach(function(msg) {
                    addChatMessage(msg.sender, msg.message);
                });
            });

            socket.on('guest_joined', function(data) {
                console.log('Guest joined:', data);
                setStatus('Opponent joined! Starting game...');
                document.getElementById('blackPlayer').innerHTML = '<span class="connected">Black: Opponent</span>';

                if (myMpColor === 'white') {
                    setTimeout(function() {
                        socket.emit('start_game', {});
                    }, 1000);
                }
            });

            socket.on('game_started', function(data) {
                console.log('Game started:', data);
                mpGameStarted = true;
                mpGameOver = false;
                currentFEN = data.fen;
                legalMoves = data.legal_moves || [];
                whiteTimeMp = data.white_time || 600;
                blackTimeMp = data.black_time || 600;
                mpActiveTimer = 'white';
                moveHistory = [];
                lastMove = null;
                gameStarted = true;

                setStatus(data.message);
                updateMoves();
                drawBoard();
                updateMpTimers();

                if (!isSpectator) {
                    startMpTimerSync();
                }
            });

            socket.on('move_made', function(data) {
                console.log('Move made:', data);
                currentFEN = data.fen;
                legalMoves = data.legal_moves || [];
                lastMove = data.last_move;
                moveHistory = data.move_history || [];
                whiteTimeMp = data.white_time;
                blackTimeMp = data.black_time;
                mpActiveTimer = data.active_timer;
                isCheck = data.check;

                updateMoves();
                drawBoard();
                updateMpTimers();

                if (isCheck) {
                    playCheckSound();
                } else {
                    playMoveSound();
                }

                if (!isSpectator) {
                    const isMyTurn = (myMpColor === 'white' && mpActiveTimer === 'white') || 
                                     (myMpColor === 'black' && mpActiveTimer === 'black');
                    if (isMyTurn) {
                        setStatus('Your turn!');
                    } else {
                        setStatus('Opponent is thinking...');
                    }
                } else {
                    setStatus((mpActiveTimer === 'white' ? 'White' : 'Black') + ' to move');
                }
            });

            socket.on('game_over', function(data) {
                console.log('Game over:', data);
                mpGameOver = true;
                mpActiveTimer = null;
                stopMpTimerSync();

                const result = data.result;
                let won = false;

                if (!isSpectator && myMpColor) {
                    won = (myMpColor === 'white' && result === '1-0') || 
                          (myMpColor === 'black' && result === '0-1') ||
                          result === '1/2-1/2';
                }

                playGameOverSound(won);
                showGameOver(result, data.message);
            });

            socket.on('chat_message', function(data) {
                addChatMessage(data.sender, data.message);
            });

            socket.on('draw_offered', function(data) {
                if (!isSpectator && myMpColor && data.offered_by !== myMpColor) {
                    document.getElementById('drawOfferText').textContent = 
                        data.offered_by.charAt(0).toUpperCase() + data.offered_by.slice(1) + ' offers a draw.';
                    document.getElementById('drawOfferOverlay').classList.add('active');
                }
            });

            socket.on('draw_declined', function(data) {
                setStatus('Draw offer declined.');
            });

            socket.on('player_left', function(data) {
                setStatus(data.message);
                if (data.player === 'host') {
                    document.getElementById('whitePlayer').innerHTML = '<span class="disconnected">White: Left</span>';
                } else {
                    document.getElementById('blackPlayer').innerHTML = '<span class="disconnected">Black: Left</span>';
                }
            });

            socket.on('spectator_joined', function(data) {
                addChatMessage('System', 'A spectator joined the room.');
            });

            socket.on('timer_update', function(data) {
                whiteTimeMp = data.white_time;
                blackTimeMp = data.black_time;
                mpActiveTimer = data.active_timer;
                updateMpTimers();
            });

            socket.on('error', function(data) {
                console.error('Socket error:', data);
                setStatus('Error: ' + data.message);
            });

            socket.on('disconnect', function() {
                console.log('Socket disconnected');
                setStatus('Connection lost. Reconnecting...');
            });
        }

        let mpTimerSyncInterval = null;

        function startMpTimerSync() {
            stopMpTimerSync();
            mpTimerSyncInterval = setInterval(function() {
                if (!mpGameStarted || mpGameOver) return;

                if (mpActiveTimer === 'white') {
                    whiteTimeMp -= 0.1;
                    if (whiteTimeMp <= 0) whiteTimeMp = 0;
                } else if (mpActiveTimer === 'black') {
                    blackTimeMp -= 0.1;
                    if (blackTimeMp <= 0) blackTimeMp = 0;
                }

                updateMpTimers();

                if (Math.floor(Date.now() / 1000) % 2 === 0) {
                    socket.emit('request_timer_sync', {});
                }
            }, 100);
        }

        function stopMpTimerSync() {
            if (mpTimerSyncInterval) {
                clearInterval(mpTimerSyncInterval);
                mpTimerSyncInterval = null;
            }
        }

        function updateMpTimers() {
            const playerTimer = document.getElementById('playerTimer');
            const engineTimer = document.getElementById('engineTimer');

            if (isSpectator) {
                playerTimer.textContent = formatTime(whiteTimeMp);
                engineTimer.textContent = formatTime(blackTimeMp);
                playerTimer.classList.toggle('active-turn', mpActiveTimer === 'white');
                engineTimer.classList.toggle('active-turn', mpActiveTimer === 'black');
                return;
            }

            if (myMpColor === 'white') {
                playerTimer.textContent = formatTime(whiteTimeMp);
                engineTimer.textContent = formatTime(blackTimeMp);
                playerTimer.classList.toggle('active-turn', mpActiveTimer === 'white');
                engineTimer.classList.toggle('active-turn', mpActiveTimer === 'black');
                playerTimer.classList.toggle('low-time', whiteTimeMp < 30);
                engineTimer.classList.toggle('low-time', blackTimeMp < 30);
            } else {
                playerTimer.textContent = formatTime(blackTimeMp);
                engineTimer.textContent = formatTime(whiteTimeMp);
                playerTimer.classList.toggle('active-turn', mpActiveTimer === 'black');
                engineTimer.classList.toggle('active-turn', mpActiveTimer === 'white');
                playerTimer.classList.toggle('low-time', blackTimeMp < 30);
                engineTimer.classList.toggle('low-time', whiteTimeMp < 30);
            }
        }

        function addChatMessage(sender, message) {
            const container = document.getElementById('mpChatContainer');
            const div = document.createElement('div');
            div.className = 'mp-chat-message';
            const isSpec = sender.includes('Spectator');
            div.innerHTML = '<span class="' + (isSpec ? 'sender-spectator' : 'sender') + '">' + 
                          sender + '</span>: ' + escapeHtml(message);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendChatMessage() {
            const input = document.getElementById('mpChatInput');
            const message = input.value.trim();
            if (!message) return;

            if (socket && roomCode) {
                socket.emit('send_chat', { message: message });
            }
            input.value = '';
        }

        document.getElementById('mpChatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        });

        function copyMpRoomCode() {
            const code = document.getElementById('mpRoomCode').textContent;
            navigator.clipboard.writeText(code).then(function() {
                setStatus('Room code copied!');
                setTimeout(function() { setStatus(''); }, 2000);
            });
        }

        function offerDraw() {
            if (socket && roomCode && !mpGameOver && !isSpectator) {
                socket.emit('offer_draw', {});
                setStatus('Draw offer sent...');
            }
        }

        function respondDraw(accepted) {
            document.getElementById('drawOfferOverlay').classList.remove('active');
            if (socket && roomCode) {
                socket.emit('respond_draw', { accepted: accepted });
            }
        }

        function resignGame() {
            if (socket && roomCode && !mpGameOver && !isSpectator) {
                if (confirm('Are you sure you want to resign?')) {
                    socket.emit('resign', {});
                }
            }
        }

        function leaveMpGame() {
            if (confirm('Leave this room?')) {
                if (socket) {
                    socket.disconnect();
                }
                window.location.href = '/';
            }
        }

        function formatTime(seconds) {
            if (seconds <= 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function updateTimerDisplay() {
            const playerTimer = document.getElementById('playerTimer');
            const engineTimer = document.getElementById('engineTimer');

            playerTimer.textContent = formatTime(playerTime);
            engineTimer.textContent = formatTime(engineTime);

            playerTimer.classList.toggle('active-turn', activeTimer === 'player');
            engineTimer.classList.toggle('active-turn', activeTimer === 'engine');

            playerTimer.classList.toggle('low-time', playerTime < 30);
            engineTimer.classList.toggle('low-time', engineTime < 30);
        }

        function startTimer(who) {
            stopTimer();
            activeTimer = who;
            updateTimerDisplay();

            timerInterval = setInterval(function() {
                if (who === 'player') {
                    playerTime -= 0.1;
                    if (playerTime <= 0) {
                        playerTime = 0;
                        stopTimer();
                        showTimeOut('You ran out of time! MattFish wins.');
                    }
                } else {
                    engineTime -= 0.1;
                    if (engineTime <= 0) {
                        engineTime = 0;
                        stopTimer();
                        showTimeOut('MattFish ran out of time! You win.');
                    }
                }
                updateTimerDisplay();
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            activeTimer = null;
            updateTimerDisplay();
        }

        function addIncrement(who) {
            if (timeControl.increment > 0) {
                if (who === 'player') {
                    playerTime += timeControl.increment;
                } else {
                    engineTime += timeControl.increment;
                }
                updateTimerDisplay();
            }
        }

        function showTimeOut(message) {
            const overlay = document.getElementById('timeOutOverlay');
            const text = document.getElementById('timeOutText');
            text.textContent = message;
            text.style.color = message.includes('You win') ? '#4CAF50' : '#e74c3c';
            overlay.classList.add('active');
            setStatus('Time out!');
            playGameOverSound(message.includes('You win'));
        }

        function setTimeControl(preset, btn) {
            timeControl = TIME_PRESETS[preset];
            playerTime = timeControl.minutes * 60;
            engineTime = timeControl.minutes * 60;
            updateTimerDisplay();

            document.querySelectorAll('.time-btn').forEach(function(b) {
                b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        function setCustomTimeControl() {
            const min = parseInt(document.getElementById('customMin').value) || 10;
            const inc = parseInt(document.getElementById('customInc').value) || 0;
            timeControl = { minutes: min, increment: inc };
            playerTime = min * 60;
            engineTime = min * 60;
            updateTimerDisplay();

            document.querySelectorAll('.time-btn').forEach(function(b) {
                b.classList.remove('active');
            });
        }

        function toggleEvalBar() {
            evalBarEnabled = !evalBarEnabled;
            const btn = document.getElementById('evalBtn');
            const container = document.getElementById('evalContainer');

            if (evalBarEnabled) {
                btn.classList.add('active');
                container.classList.add('active');
                updateEvalBar();
            } else {
                btn.classList.remove('active');
                container.classList.remove('active');
            }
        }

        function updateEvalBarOrientation() {
            const wrapper = document.getElementById('evalBarWrapper');
            const topLabel = document.getElementById('evalLabelTop');
            const bottomLabel = document.getElementById('evalLabelBottom');

            if (playerColor === 'black') {
                wrapper.classList.add('flipped');
                topLabel.textContent = 'White';
                bottomLabel.textContent = 'Black (You)';
                bottomLabel.classList.add('eval-label-player');
                topLabel.classList.remove('eval-label-player');
            } else {
                wrapper.classList.remove('flipped');
                topLabel.textContent = 'Black';
                bottomLabel.textContent = 'White (You)';
                bottomLabel.classList.add('eval-label-player');
                topLabel.classList.remove('eval-label-player');
            }
        }

        async function updateEvalBar() {
            if (!evalBarEnabled || !sessionId || isMultiplayer) return;

            try {
                const response = await fetch('/api/chess/eval', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                const data = await response.json();

                if (data.error) return;

                const whiteBar = document.getElementById('evalBarWhite');
                const blackBar = document.getElementById('evalBarBlack');
                const evalNumber = document.getElementById('evalNumber');

                let displayText = '';
                let whitePercent = 50;

                if (data.mate !== 0) {
                    if (data.mate > 0) {
                        displayText = '+' + data.mate + 'M';
                        whitePercent = 100;
                    } else {
                        displayText = data.mate + 'M';
                        whitePercent = 0;
                    }
                } else {
                    const evalCp = data.eval;
                    const evalPawns = evalCp / 100;

                    if (evalPawns > 0) {
                        displayText = '+' + evalPawns.toFixed(1);
                    } else if (evalPawns < 0) {
                        displayText = evalPawns.toFixed(1);
                    } else {
                        displayText = '0.0';
                    }

                    const clamped = Math.max(-1000, Math.min(1000, evalCp));
                    whitePercent = 50 + (clamped / 20);
                    whitePercent = Math.max(5, Math.min(95, whitePercent));
                }

                whiteBar.style.height = whitePercent + '%';
                blackBar.style.height = (100 - whitePercent) + '%';

                let playerEval = displayText;
                if (playerColor === 'black') {
                    if (displayText.startsWith('+')) {
                        playerEval = '-' + displayText.substring(1);
                    } else if (displayText.startsWith('-')) {
                        playerEval = '+' + displayText.substring(1);
                    }
                }

                evalNumber.textContent = playerEval;

                if (playerColor === 'white') {
                    if (displayText.startsWith('+')) {
                        evalNumber.style.color = '#4CAF50';
                    } else if (displayText.startsWith('-')) {
                        evalNumber.style.color = '#e74c3c';
                    } else {
                        evalNumber.style.color = '#888';
                    }
                } else {
                    if (displayText.startsWith('-')) {
                        evalNumber.style.color = '#4CAF50';
                    } else if (displayText.startsWith('+')) {
                        evalNumber.style.color = '#e74c3c';
                    } else {
                        evalNumber.style.color = '#888';
                    }
                }

            } catch(e) {}
        }

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playTone(freq, duration, type, volume) {
            if (!soundEnabled) return;
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function playMoveSound() {
            playTone(800, 0.08, 'sine', 0.15);
            setTimeout(() => playTone(600, 0.06, 'sine', 0.1), 30);
        }

        function playCheckSound() {
            playTone(880, 0.15, 'square', 0.2);
            setTimeout(() => playTone(880, 0.15, 'square', 0.2), 200);
            setTimeout(() => playTone(880, 0.3, 'square', 0.2), 400);
        }

        function playGameOverSound(won) {
            if (won) {
                playTone(523, 0.2, 'sine', 0.3);
                setTimeout(() => playTone(659, 0.2, 'sine', 0.3), 200);
                setTimeout(() => playTone(784, 0.2, 'sine', 0.3), 400);
                setTimeout(() => playTone(1047, 0.4, 'sine', 0.3), 600);
            } else {
                playTone(400, 0.3, 'sine', 0.2);
                setTimeout(() => playTone(350, 0.3, 'sine', 0.2), 300);
                setTimeout(() => playTone(300, 0.5, 'sine', 0.2), 600);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            if (soundEnabled) {
                btn.innerHTML = '&#128266; Sound On';
                btn.classList.remove('off');
            } else {
                btn.innerHTML = '&#128263; Sound Off';
                btn.classList.add('off');
            }
        }

        window.onload = function() {
            try {
                if (typeof initThemePanel === 'function') {
                    initThemePanel('themePanelContainer');
                }
            } catch (e) {
                console.log('Theme panel not available:', e);
            }
            detectMode();
            if (!isMultiplayer) {
                updateTimerDisplay();
                newGame();
            }
        };

        function setDiff(d) {
            difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === d);
            });
        }

        function setColor(c) {
            playerColor = c;
            document.querySelectorAll('.color-btn').forEach(b => {
                b.classList.toggle('active', b.textContent.toLowerCase() === c);
            });
            updateEvalBarOrientation();
            if (!isMultiplayer) {
                newGame();
            }
        }

        function updatePromoImages() {
            const prefix = playerColor === 'white' ? 'w' : 'b';
            document.getElementById('promoQ').src = '/static/pieces/' + prefix + 'Q (1).png';
            document.getElementById('promoR').src = '/static/pieces/' + prefix + 'R (1).png';
            document.getElementById('promoB').src = '/static/pieces/' + prefix + 'B (1).png';
            document.getElementById('promoN').src = '/static/pieces/' + prefix + 'N (1).png';
        }

        function updateCoords() {
            const ranksEl = document.getElementById('ranks');
            const filesEl = document.getElementById('files');

            if (playerColor === 'black') {
                ranksEl.innerHTML = '12345678'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'hgfedcba'.split('').map(f => '<span>' + f + '</span>').join('');
            } else {
                ranksEl.innerHTML = '87654321'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'abcdefgh'.split('').map(f => '<span>' + f + '</span>').join('');
            }
        }

        function updateUndoButton() {
            const btn = document.getElementById('undoBtn');
            const canUndo = boardHistory.length > 1 || 
                (playerColor === 'black' && boardHistory.length > 0 && moveHistory.length > 0);
            btn.disabled = !canUndo || isThinking || document.getElementById('gameOver').classList.contains('active') || document.getElementById('timeOutOverlay').classList.contains('active');
        }

        async function newGame() {
            if (isMultiplayer) {
                if (isSpectator) {
                    setStatus('Spectator mode - watching room ' + roomCode);
                } else if (mpGameOver) {
                    window.location.href = '/';
                }
                return;
            }

            document.getElementById('promoModal').classList.remove('active');
            document.getElementById('gameOver').classList.remove('active');
            document.getElementById('timeOutOverlay').classList.remove('active');
            selectedSquare = null;
            lastMove = null;
            pendingPromo = null;
            moveHistory = [];
            boardHistory = [];
            isCheck = false;
            gameStarted = false;
            stopTimer();
            stopMpTimerSync();

            playerTime = timeControl.minutes * 60;
            engineTime = timeControl.minutes * 60;
            updateTimerDisplay();

            updateMoves();
            updatePromoImages();
            updateCoords();
            updateUndoButton();
            setStatus('Starting...');

            try {
                const response = await fetch('/api/chess/new', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ color: playerColor, session_id: sessionId })
                });
                const data = await response.json();

                if (data.error) {
                    setStatus('Error: ' + data.error);
                    return;
                }

                sessionId = data.session_id || sessionId;
                currentFEN = data.fen;
                legalMoves = data.legal_moves;
                boardHistory.push({
                    fen: currentFEN,
                    legalMoves: [...legalMoves],
                    lastMove: null,
                    moveHistory: []
                });
                drawBoard();
                updateEvalBarOrientation();
                updateEvalBar();
                gameStarted = true;

                if (playerColor === 'black') {
                    setStatus('MattFish is thinking...');
                    startTimer('engine');
                    await engineFirstMove();
                } else {
                    setStatus('Your turn! Click a white piece to move.');
                    startTimer('player');
                }
            } catch(err) {
                setStatus('Failed to start: ' + err.message);
            }
        }

        async function engineFirstMove() {
            isThinking = true;
            updateUndoButton();
            try {
                const response = await fetch('/api/chess/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: 'engine', difficulty: difficulty, session_id: sessionId })
                });
                const data = await response.json();
                isThinking = false;

                if (!data.error) {
                    currentFEN = data.fen;
                    isCheck = data.check || false;
                    lastMove = {
                        from: data.engine_move.substring(0, 2),
                        to: data.engine_move.substring(2, 4)
                    };
                    moveHistory.push({ white: data.engine_move, black: null });
                    updateMoves();
                    legalMoves = data.legal_moves || [];
                    boardHistory.push({
                        fen: currentFEN,
                        legalMoves: [...legalMoves],
                        lastMove: {...lastMove},
                        moveHistory: JSON.parse(JSON.stringify(moveHistory))
                    });

                    stopTimer();
                    addIncrement('engine');
                    startTimer('player');

                    playMoveSound();
                    drawBoard();
                    updateEvalBar();
                    updateUndoButton();
                    setStatus('Engine played ' + data.engine_move + '. Your turn!');
                }
            } catch(err) {
                isThinking = false;
                updateUndoButton();
                setStatus('Error: ' + err.message);
            }
        }

        async function undoMove() {
            if (isMultiplayer) return;
            if (boardHistory.length < 2) return;

            isThinking = true;
            updateUndoButton();
            setStatus('Undoing...');
            stopTimer();

            boardHistory.pop();
            const prevState = boardHistory[boardHistory.length - 1];

            currentFEN = prevState.fen;
            legalMoves = [...prevState.legalMoves];
            lastMove = prevState.lastMove ? {...prevState.lastMove} : null;
            moveHistory = JSON.parse(JSON.stringify(prevState.moveHistory));
            isCheck = false;

            try {
                await fetch('/api/chess/undo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
            } catch(e) {}

            isThinking = false;
            updateMoves();
            drawBoard();
            updateEvalBar();
            updateUndoButton();

            const fenParts = currentFEN.split(' ');
            const activeColor = fenParts[1] || 'w';
            const isPlayerTurn = (playerColor === 'white' && activeColor === 'w') || (playerColor === 'black' && activeColor === 'b');
            startTimer(isPlayerTurn ? 'player' : 'engine');

            setStatus('Undone. Your turn!');
        }

        function drawBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            const fenParts = currentFEN.split(' ');
            const fenRows = fenParts[0].split('/');
            const activeColor = fenParts[1] || 'w';
            const grid = [];
            for (let r = 0; r < 8; r++) {
                const row = [];
                for (let char of fenRows[r]) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) row.push(null);
                    } else {
                        row.push(char);
                    }
                }
                grid.push(row);
            }

            const viewColor = isMultiplayer ? (myMpColor || 'white') : playerColor;

            if (viewColor === 'black') {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const stdRank = 7 - vRow;
                        const stdFile = 7 - vCol;
                        const piece = grid[stdRank][stdFile];
                        const squareName = 'hgfedcba'[vCol] + (vRow + 1);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            } else {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const piece = grid[vRow][vCol];
                        const squareName = 'abcdefgh'[vCol] + (8 - vRow);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            }
        }

        function createSquare(boardEl, vRow, vCol, squareName, piece, activeColor) {
            const square = document.createElement('div');
            const isLight = (vRow + vCol) % 2 === 0;

            square.className = 'square ' + (isLight ? 'light' : 'dark');
            square.dataset.square = squareName;

            if (isCheck && piece) {
                if ((activeColor === 'w' && piece === 'K') || (activeColor === 'b' && piece === 'k')) {
                    square.classList.add('check');
                }
            }

            if (piece && PIECE_IMAGES[piece]) {
                const img = document.createElement('img');
                img.src = PIECE_IMAGES[piece];
                img.alt = piece;
                square.appendChild(img);
            }

            if (lastMove) {
                if (square.dataset.square === lastMove.from || square.dataset.square === lastMove.to) {
                    square.classList.add('last-move');
                }
            }

            if (selectedSquare === square.dataset.square) {
                square.classList.add('selected');
            }

            if (selectedSquare) {
                const isLegalDest = legalMoves.some(m => 
                    m.substring(0, 2) === selectedSquare && 
                    m.substring(2, 4) === square.dataset.square
                );
                if (isLegalDest) {
                    square.classList.add('legal');
                }
            }

            square.addEventListener('click', function() { handleClick(square); });
            boardEl.appendChild(square);
        }

        function handleClick(square) {
            if (isSpectator) return;

            if (isMultiplayer && mpGameStarted && !mpGameOver) {
                // allow
            } else if (isThinking || !gameStarted) {
                return;
            }

            if (isMultiplayer && myMpColor) {
                const fenParts = currentFEN.split(' ');
                const activeColor = fenParts[1] || 'w';
                const expectedTurn = activeColor === 'w' ? 'white' : 'black';
                if (expectedTurn !== myMpColor) {
                    setStatus('Not your turn!');
                    return;
                }
            }

            const sq = square.dataset.square;
            const piece = square.querySelector('img');
            const myColor = isMultiplayer ? myMpColor : playerColor;

            const isPlayerPiece = piece && (
                (myColor === 'white' && piece.src.includes('/w')) ||
                (myColor === 'black' && piece.src.includes('/b'))
            );

            if (!selectedSquare) {
                if (isPlayerPiece) {
                    selectedSquare = sq;
                    drawBoard();
                }
                return;
            }

            if (selectedSquare === sq) {
                selectedSquare = null;
                drawBoard();
                return;
            }

            const matchingMove = legalMoves.find(m => 
                m.substring(0, 2) === selectedSquare && 
                m.substring(2, 4) === sq
            );

            if (matchingMove) {
                const fromSquare = document.querySelector('[data-square="' + selectedSquare + '"]');
                const fromPiece = fromSquare.querySelector('img');
                const isPawn = fromPiece && (fromPiece.src.includes('wP') || fromPiece.src.includes('bP'));
                const promoRank = myColor === 'white' ? '8' : '1';

                if (isPawn && sq[1] === promoRank) {
                    pendingPromo = selectedSquare + sq;
                    document.getElementById('promoModal').classList.add('active');
                    return;
                }

                if (isMultiplayer) {
                    sendMpMove(matchingMove);
                } else {
                    sendMove(matchingMove);
                }
            } else if (isPlayerPiece) {
                selectedSquare = sq;
                drawBoard();
            } else {
                selectedSquare = null;
                drawBoard();
            }
        }

        function doPromo(piece) {
            document.getElementById('promoModal').classList.remove('active');
            if (pendingPromo) {
                const move = pendingPromo + piece;
                if (isMultiplayer) {
                    sendMpMove(move);
                } else {
                    sendMove(move);
                }
                pendingPromo = null;
            }
        }

        function sendMpMove(move) {
            selectedSquare = null;
            if (socket && roomCode) {
                socket.emit('make_move', { move: move });
                setStatus('Move sent...');
            }
            drawBoard();
        }

        async function sendMove(move) {
            isThinking = true;
            selectedSquare = null;
            updateUndoButton();

            stopTimer();
            addIncrement('player');

            setStatus('MattFish is thinking...');

            try {
                const response = await fetch('/api/chess/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: move, difficulty: difficulty, session_id: sessionId })
                });

                const data = await response.json();
                isThinking = false;

                if (data.error) {
                    setStatus('Error: ' + data.error);
                    if (data.fen) {
                        currentFEN = data.fen;
                        drawBoard();
                    }
                    startTimer('player');
                    updateUndoButton();
                    return;
                }

                currentFEN = data.fen;
                isCheck = data.check || false;

                if (data.engine_move) {
                    lastMove = {
                        from: data.engine_move.substring(0, 2),
                        to: data.engine_move.substring(2, 4)
                    };
                } else {
                    lastMove = {
                        from: move.substring(0, 2),
                        to: move.substring(2, 4)
                    };
                }

                if (data.player_move) {
                    if (playerColor === 'white') {
                        moveHistory.push({ white: data.player_move, black: data.engine_move });
                    } else {
                        moveHistory.push({ white: data.engine_move, black: data.player_move });
                    }
                    updateMoves();
                }

                legalMoves = data.legal_moves || [];

                if (isCheck) {
                    playCheckSound();
                } else {
                    playMoveSound();
                }

                boardHistory.push({
                    fen: currentFEN,
                    legalMoves: [...legalMoves],
                    lastMove: lastMove ? {...lastMove} : null,
                    moveHistory: JSON.parse(JSON.stringify(moveHistory))
                });

                drawBoard();
                updateEvalBar();
                updateUndoButton();

                if (data.game_over) {
                    stopTimer();
                    const playerWon = (playerColor === 'white' && data.result === '1-0') || (playerColor === 'black' && data.result === '0-1');
                    playGameOverSound(playerWon);
                    showGameOver(data.result);
                } else {
                    startTimer('engine');
                    setStatus(data.engine_move ? 
                        'Engine played ' + data.engine_move + '. Your turn!' : 
                        'Your turn!');
                }
            } catch(err) {
                isThinking = false;
                startTimer('player');
                updateUndoButton();
                setStatus('Error: ' + err.message);
            }
        }

        function updateMoves() {
            const container = document.getElementById('moves');
            container.innerHTML = '';

            moveHistory.forEach((pair, i) => {
                const div = document.createElement('div');
                div.className = 'move-pair';
                div.innerHTML = '<span class="move-num">' + (i + 1) + '.</span> ' +
                    '<span class="move-w">' + (pair.white || '...') + '</span>' +
                    (pair.black ? ' <span class="move-b">' + pair.black + '</span>' : '');
                container.appendChild(div);
            });
        }

        function showGameOver(result, customMsg) {
            const overlay = document.getElementById('gameOver');
            const text = document.getElementById('gameOverText');

            let msg = customMsg || result;
            let color = '#fff';

            if (isMultiplayer && myMpColor) {
                const playerWon = (myMpColor === 'white' && result === '1-0') || (myMpColor === 'black' && result === '0-1');
                const playerLost = (myMpColor === 'white' && result === '0-1') || (myMpColor === 'black' && result === '1-0');

                if (playerWon) { msg = 'You Win!'; color = '#4CAF50'; }
                else if (playerLost) { msg = 'You Lose!'; color = '#e74c3c'; }
                else { msg = 'Draw!'; color = '#f39c12'; }
            } else if (isSpectator) {
                msg = 'Game Over: ' + result;
                color = '#f39c12';
            } else {
                const playerWon = (playerColor === 'white' && result === '1-0') || (playerColor === 'black' && result === '0-1');
                const playerLost = (playerColor === 'white' && result === '0-1') || (playerColor === 'black' && result === '1-0');

                if (playerWon) { msg = 'You Win!'; color = '#4CAF50'; }
                else if (playerLost) { msg = 'MattFish Wins!'; color = '#e74c3c'; }
                else { msg = 'Draw!'; color = '#f39c12'; }
            }

            text.textContent = msg;
            text.style.color = color;
            overlay.classList.add('active');
            setStatus('Game Over: ' + result);
            updateUndoButton();
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }
    </script>
