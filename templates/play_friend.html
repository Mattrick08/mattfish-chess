<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MattFish - Play a Friend</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            gap: 30px;
            padding: 20px;
            min-height: 100vh;
        }
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { color: #e74c3c; margin: 0; font-size: 28px; }
        #status {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            font-size: 15px;
        }
        .lobby-section {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
        }
        .lobby-section h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #e74c3c;
        }
        .room-code-display {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #4CAF50;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .room-code-display:hover {
            background: #252525;
        }
        .copy-hint {
            font-size: 11px;
            color: #888;
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            width: 100%;
            margin-top: 8px;
        }
        .btn-primary {
            background: #e74c3c;
            color: white;
        }
        .btn-primary:hover { background: #c0392b; }
        .btn-secondary {
            background: #4CAF50;
            color: white;
        }
        .btn-secondary:hover { background: #45a049; }
        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .time-btn {
            padding: 8px;
            border: 2px solid #444;
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .time-btn:hover { border-color: #666; }
        .time-btn.active {
            border-color: #2196F3;
            background: rgba(33,150,243,0.2);
        }
        .time-controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }
        .timer-display {
            background: #2e2e2e;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 2px;
        }
        .timer-display.active-turn {
            border: 2px solid #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .timer-display.low-time {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .board-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .board-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .coords-ranks {
            position: absolute;
            left: -25px;
            top: 0;
            height: 560px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            font-size: 14px;
            color: #888;
            width: 20px;
            text-align: center;
        }
        .coords-files {
            display: flex;
            justify-content: space-around;
            width: 560px;
            padding: 5px 0;
            font-size: 14px;
            color: #888;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 3px solid #555;
            border-radius: 4px;
        }
        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.1s;
        }
        .square img {
            width: 60px;
            height: 60px;
            pointer-events: none;
        }
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        .square:hover { filter: brightness(1.15); }
        .selected { background: #f7ec5f !important; }
        .last-move { box-shadow: inset 0 0 0 4px rgba(255, 107, 107, 0.7); }
        .legal::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            pointer-events: none;
        }
        .light.legal::after { background: rgba(0, 0, 0, 0.2); }
        .dark.legal::after { background: rgba(255, 255, 255, 0.25); }
        .check { background: rgba(231, 76, 60, 0.6) !important; }
        .promotion-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .promotion-modal.active { display: flex; }
        .promo-piece {
            width: 80px;
            height: 80px;
            cursor: pointer;
            background: #f0d9b5;
            border-radius: 10px;
            margin: 10px;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .promo-piece:hover { transform: scale(1.1); background: #fff; }
        .promo-piece img { width: 70px; height: 70px; }
        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-text { font-size: 42px; font-weight: bold; margin-bottom: 20px; }
        .play-again-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .play-again-btn:hover { background: #45a049; }
        .move-history {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            width: 560px;
            max-height: 120px;
            overflow-y: auto;
        }
        .move-history h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .moves-list { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
        .move-pair { background: #1a1a2e; padding: 4px 8px; border-radius: 4px; }
        .move-num { color: #888; }
        .move-w { color: #f0d9b5; }
        .move-b { color: #b58863; }
        .chat-section {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            max-height: 200px;
            margin-bottom: 10px;
            padding: 5px;
        }
        .chat-message {
            padding: 4px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 13px;
        }
        .chat-message.system { color: #888; font-style: italic; }
        .chat-message.white { color: #f0d9b5; }
        .chat-message.black { color: #b58863; }
        .chat-message.spectator { color: #aaa; }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input-row input {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
        }
        .chat-input-row button {
            padding: 8px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .preset-messages {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .preset-btn {
            padding: 4px 8px;
            font-size: 11px;
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .preset-btn:hover { background: #555; }
        .draw-resign-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .draw-resign-row button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-draw { background: #f39c12; color: white; }
        .btn-draw:hover { background: #e67e22; }
        .btn-resign { background: #e74c3c; color: white; }
        .btn-resign:hover { background: #c0392b; }
        .hidden { display: none !important; }
        .spectator-badge {
            background: #9C27B0;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
        }
        a { color: #4CAF50; text-decoration: none; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="sidebar">
        <h1>♔ MattFish</h1>
        <div id="status">Create or join a room to play</div>

        <!-- LOBBY -->
        <div id="lobbySection" class="lobby-section">
            <h3>🎮 Play a Friend</h3>

            <div id="createRoomView">
                <p style="font-size:12px;color:#aaa;margin-bottom:10px;">Choose time control:</p>
                <div class="time-controls-grid">
                    <button class="time-btn active" onclick="selectTime('blitz3', this)" data-min="3" data-inc="2">3+2</button>
                    <button class="time-btn" onclick="selectTime('blitz5', this)" data-min="5" data-inc="0">5+0</button>
                    <button class="time-btn" onclick="selectTime('blitz5inc', this)" data-min="5" data-inc="3">5+3</button>
                    <button class="time-btn" onclick="selectTime('rapid10', this)" data-min="10" data-inc="0">10+0</button>
                    <button class="time-btn" onclick="selectTime('rapid10inc', this)" data-min="10" data-inc="5">10+5</button>
                    <button class="time-btn" onclick="selectTime('rapid15', this)" data-min="15" data-inc="10">15+10</button>
                </div>
                <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
                <hr style="border-color:#444;margin:15px 0;">
                <p style="font-size:12px;color:#aaa;margin-bottom:8px;">Or join a room:</p>
                <input type="text" id="joinCode" placeholder="ROOM CODE" maxlength="6">
                <button class="btn btn-secondary" onclick="joinRoom()">Join Room</button>
            </div>

            <div id="roomView" class="hidden">
                <p style="font-size:12px;color:#aaa;">Share this code with your friend:</p>
                <div class="room-code-display" id="roomCodeDisplay" onclick="copyRoomCode()">------</div>
                <p class="copy-hint" id="copyHint">Click to copy</p>
                <p id="waitingText" style="text-align:center;color:#888;font-size:14px;margin-top:10px;">Waiting for opponent...</p>
                <button class="btn btn-primary" onclick="leaveRoom()" style="margin-top:10px;">Leave Room</button>
            </div>
        </div>

        <!-- GAME UI (hidden until game starts) -->
        <div id="gameUI" class="hidden">
            <div class="timer-display" id="opponentTimer">10:00</div>

            <div class="draw-resign-row">
                <button class="btn-draw" onclick="offerDraw()">Offer Draw</button>
                <button class="btn-resign" onclick="resign()">Resign</button>
            </div>

            <div class="timer-display" id="myTimer">10:00</div>

            <div class="chat-section">
                <h3 style="font-size:13px;color:#e74c3c;margin-bottom:8px;">💬 Chat</h3>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()">Send</button>
                </div>
                <div class="preset-messages">
                    <button class="preset-btn" onclick="sendPreset('gl')">GL</button>
                    <button class="preset-btn" onclick="sendPreset('hf')">HF</button>
                    <button class="preset-btn" onclick="sendPreset('gg')">GG</button>
                    <button class="preset-btn" onclick="sendPreset('wp')">WP</button>
                    <button class="preset-btn" onclick="sendPreset('ty')">TY</button>
                    <button class="preset-btn" onclick="sendPreset('nice')">Nice</button>
                    <button class="preset-btn" onclick="sendPreset('oops')">Oops</button>
                    <button class="preset-btn" onclick="sendPreset('think')">Thinking</button>
                </div>
            </div>
        </div>

        <div id="spectatorBadge" class="spectator-badge hidden">👁 Spectator Mode</div>

        <a href="/" style="text-align:center;">← Back to Stats</a>
        <a href="/play" style="text-align:center;">🤖 Play vs Engine</a>
    </div>

    <div class="board-area">
        <div class="board-wrapper">
            <div class="coords-ranks" id="ranks"></div>
            <div id="board"></div>
        </div>
        <div class="coords-files" id="files"></div>
        <div class="move-history">
            <h3>Move History</h3>
            <div class="moves-list" id="moves"></div>
        </div>
    </div>

    <div class="promotion-modal" id="promoModal">
        <div>
            <span class="promo-piece" onclick="doPromo('q')"><img id="promoQ" src="/static/pieces/wQ (1).png" alt="Queen"></span>
            <span class="promo-piece" onclick="doPromo('r')"><img id="promoR" src="/static/pieces/wR (1).png" alt="Rook"></span>
            <span class="promo-piece" onclick="doPromo('b')"><img id="promoB" src="/static/pieces/wB (1).png" alt="Bishop"></span>
            <span class="promo-piece" onclick="doPromo('n')"><img id="promoN" src="/static/pieces/wN (1).png" alt="Knight"></span>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOver">
        <div class="game-over-text" id="gameOverText"></div>
        <button class="play-again-btn" onclick="newGame()">New Game</button>
        <button class="play-again-btn" onclick="location.href='/play-friend'" style="background:#555;">Back to Lobby</button>
    </div>

    <script>
        const PIECE_IMAGES = {
            'P': '/static/pieces/wP (1).png',
            'N': '/static/pieces/wN (1).png',
            'B': '/static/pieces/wB (1).png',
            'R': '/static/pieces/wR (1).png',
            'Q': '/static/pieces/wQ (1).png',
            'K': '/static/pieces/wK (1).png',
            'p': '/static/pieces/bP (1).png',
            'n': '/static/pieces/bN (1).png',
            'b': '/static/pieces/bB (1).png',
            'r': '/static/pieces/bR (1).png',
            'q': '/static/pieces/bQ (1).png',
            'k': '/static/pieces/bK (1).png'
        };

        const socket = io();

        let myColor = null; // 'white', 'black', or null (spectator)
        let roomCode = null;
        let currentFEN = '';
        let selectedSquare = null;
        let legalMoves = [];
        let lastMove = null;
        let pendingPromo = null;
        let moveHistory = [];
        let isMyTurn = false;
        let gameStatus = 'lobby'; // lobby, waiting, playing, finished
        let selectedTimeControl = { minutes: 3, increment: 2 };
        let myTime = 180;
        let opponentTime = 180;
        let timerInterval = null;
        let drawOfferPending = false;

        const TIME_PRESETS = {
            'blitz3': { minutes: 3, increment: 2 },
            'blitz5': { minutes: 5, increment: 0 },
            'blitz5inc': { minutes: 5, increment: 3 },
            'rapid10': { minutes: 10, increment: 0 },
            'rapid10inc': { minutes: 10, increment: 5 },
            'rapid15': { minutes: 15, increment: 10 }
        };

        function selectTime(preset, btn) {
            selectedTimeControl = TIME_PRESETS[preset];
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function createRoom() {
            socket.emit('create_room', {
                color: 'white',
                time_control: selectedTimeControl
            });
        }

        function joinRoom() {
            const code = document.getElementById('joinCode').value.trim();
            if (code.length !== 6) {
                setStatus('Please enter a valid 6-character room code');
                return;
            }
            socket.emit('join_room', { room_code: code });
        }

        function leaveRoom() {
            location.reload();
        }

        function copyRoomCode() {
            const code = document.getElementById('roomCodeDisplay').textContent;
            navigator.clipboard.writeText(code).then(() => {
                document.getElementById('copyHint').textContent = 'Copied!';
                setTimeout(() => {
                    document.getElementById('copyHint').textContent = 'Click to copy';
                }, 2000);
            });
        }

        // ========== SOCKET EVENTS ==========
        socket.on('connect', () => {
            console.log('Connected to server');
        });

        socket.on('room_created', (data) => {
            roomCode = data.room_code;
            myColor = data.your_color;
            document.getElementById('createRoomView').classList.add('hidden');
            document.getElementById('roomView').classList.remove('hidden');
            document.getElementById('roomCodeDisplay').textContent = roomCode;
            setStatus('Room created! Share the code with your friend.');
        });

        socket.on('joined_room', (data) => {
            roomCode = data.room_code;
            myColor = data.your_color;
            document.getElementById('lobbySection').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            currentFEN = data.fen;
            setupBoard();
            setStatus('Game started! You are ' + myColor + '.');
        });

        socket.on('joined_as_spectator', (data) => {
            roomCode = data.room_code;
            myColor = null;
            document.getElementById('lobbySection').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            document.getElementById('spectatorBadge').classList.remove('hidden');
            document.querySelector('.draw-resign-row').classList.add('hidden');
            currentFEN = data.fen;

            // Load chat history
            data.chat.forEach(msg => addChatMessage(msg.sender, msg.message));

            setupBoard();
            setStatus('Spectating room ' + roomCode);
        });

        socket.on('game_started', (data) => {
            document.getElementById('lobbySection').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            currentFEN = data.fen;
            myTime = data.time_control.minutes * 60;
            opponentTime = data.time_control.minutes * 60;
            updateTimerDisplay();
            setupBoard();
            gameStatus = 'playing';
            isMyTurn = myColor === 'white';
            setStatus(isMyTurn ? 'Game started! Your turn (White).' : 'Game started! Waiting for opponent...');
            if (isMyTurn) startTimer('my');
            else startTimer('opponent');
        });

        socket.on('move_made', (data) => {
            currentFEN = data.fen;
            legalMoves = data.legal_moves || [];
            lastMove = {
                from: data.move.substring(0, 2),
                to: data.move.substring(2, 4)
            };

            // Update timers
            myTime = data.timers[myColor] || myTime;
            const oppColor = myColor === 'white' ? 'black' : 'white';
            opponentTime = data.timers[oppColor] || opponentTime;
            updateTimerDisplay();

            // Add to move history
            const moveNum = Math.floor(moveHistory.length) + 1;
            if (data.player_color === 'white') {
                moveHistory.push({ white: data.move, black: null });
            } else {
                if (moveHistory.length > 0 && moveHistory[moveHistory.length - 1].black === null) {
                    moveHistory[moveHistory.length - 1].black = data.move;
                } else {
                    moveHistory.push({ white: '...', black: data.move });
                }
            }
            updateMoves();

            // Switch timer
            stopTimer();
            isMyTurn = !isMyTurn;
            if (isMyTurn) {
                startTimer('my');
                setStatus('Your turn!');
            } else {
                startTimer('opponent');
                setStatus('Opponent thinking...');
            }

            drawBoard();

            if (data.check) {
                setStatus('Check!');
            }
        });

        socket.on('chat_message', (data) => {
            addChatMessage(data.sender, data.message);
        });

        socket.on('draw_offered', (data) => {
            if (confirm(data.by.capitalize() + ' offers a draw. Accept?')) {
                socket.emit('respond_draw', { room_code: roomCode, accepted: true });
            } else {
                socket.emit('respond_draw', { room_code: roomCode, accepted: false });
            }
        });

        socket.on('draw_declined', () => {
            setStatus('Draw offer declined.');
        });

        socket.on('game_over', (data) => {
            gameStatus = 'finished';
            stopTimer();
            showGameOver(data.result, data.reason);
        });

        socket.on('player_left', (data) => {
            setStatus(data.message + ' - Game ended.');
            gameStatus = 'finished';
        });

        socket.on('error', (data) => {
            setStatus('Error: ' + data.message);
        });

        socket.on('spectator_joined', (data) => {
            setStatus('A spectator joined! (' + data.count + ' watching)');
        });

        // ========== TIMER FUNCTIONS ==========
        function formatTime(seconds) {
            if (seconds <= 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function updateTimerDisplay() {
            const myTimer = document.getElementById('myTimer');
            const oppTimer = document.getElementById('opponentTimer');

            myTimer.textContent = formatTime(myTime);
            oppTimer.textContent = formatTime(opponentTime);

            myTimer.classList.toggle('low-time', myTime < 30);
            oppTimer.classList.toggle('low-time', opponentTime < 30);
        }

        function startTimer(who) {
            stopTimer();
            const myTimer = document.getElementById('myTimer');
            const oppTimer = document.getElementById('opponentTimer');

            myTimer.classList.toggle('active-turn', who === 'my');
            oppTimer.classList.toggle('active-turn', who === 'opponent');

            timerInterval = setInterval(function() {
                if (who === 'my') {
                    myTime -= 0.1;
                    if (myTime <= 0) {
                        myTime = 0;
                        stopTimer();
                    }
                } else {
                    opponentTime -= 0.1;
                    if (opponentTime <= 0) {
                        opponentTime = 0;
                        stopTimer();
                    }
                }
                updateTimerDisplay();
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('myTimer').classList.remove('active-turn');
            document.getElementById('opponentTimer').classList.remove('active-turn');
        }

        // ========== CHAT ==========
        function addChatMessage(sender, message) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-message';

            if (sender === 'System') {
                div.className += ' system';
            } else if (sender === 'White') {
                div.className += ' white';
            } else if (sender === 'Black') {
                div.className += ' black';
            } else {
                div.className += ' spectator';
            }

            div.textContent = sender + ': ' + message;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg || !roomCode) return;
            socket.emit('send_chat', { room_code: roomCode, message: msg });
            input.value = '';
        }

        function sendPreset(preset) {
            if (!roomCode) return;
            socket.emit('send_preset_message', { room_code: roomCode, preset: preset });
        }

        function offerDraw() {
            if (!roomCode || gameStatus !== 'playing') return;
            socket.emit('offer_draw', { room_code: roomCode });
            setStatus('Draw offer sent...');
        }

        function resign() {
            if (!roomCode || gameStatus !== 'playing') return;
            if (confirm('Are you sure you want to resign?')) {
                socket.emit('resign', { room_code: roomCode });
            }
        }

        // ========== BOARD LOGIC ==========
        function setupBoard() {
            updateCoords();
            drawBoard();
        }

        function updateCoords() {
            const ranksEl = document.getElementById('ranks');
            const filesEl = document.getElementById('files');
            const isFlipped = myColor === 'black';

            if (isFlipped) {
                ranksEl.innerHTML = '12345678'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'hgfedcba'.split('').map(f => '<span>' + f + '</span>').join('');
            } else {
                ranksEl.innerHTML = '87654321'.split('').map(r => '<div>' + r + '</div>').join('');
                filesEl.innerHTML = 'abcdefgh'.split('').map(f => '<span>' + f + '</span>').join('');
            }
        }

        function drawBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            const fenParts = currentFEN.split(' ');
            const fenRows = fenParts[0].split('/');
            const activeColor = fenParts[1] || 'w';
            const grid = [];
            for (let r = 0; r < 8; r++) {
                const row = [];
                for (let char of fenRows[r]) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) row.push(null);
                    } else {
                        row.push(char);
                    }
                }
                grid.push(row);
            }

            const isFlipped = myColor === 'black';

            if (isFlipped) {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const stdRank = 7 - vRow;
                        const stdFile = 7 - vCol;
                        const piece = grid[stdRank][stdFile];
                        const squareName = 'hgfedcba'[vCol] + (vRow + 1);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            } else {
                for (let vRow = 0; vRow < 8; vRow++) {
                    for (let vCol = 0; vCol < 8; vCol++) {
                        const piece = grid[vRow][vCol];
                        const squareName = 'abcdefgh'[vCol] + (8 - vRow);
                        createSquare(board, vRow, vCol, squareName, piece, activeColor);
                    }
                }
            }
        }

        function createSquare(boardEl, vRow, vCol, squareName, piece, activeColor) {
            const square = document.createElement('div');
            const isLight = (vRow + vCol) % 2 === 0;

            square.className = 'square ' + (isLight ? 'light' : 'dark');
            square.dataset.square = squareName;

            if (piece && PIECE_IMAGES[piece]) {
                const img = document.createElement('img');
                img.src = PIECE_IMAGES[piece];
                img.alt = piece;
                square.appendChild(img);
            }

            if (lastMove) {
                if (square.dataset.square === lastMove.from || square.dataset.square === lastMove.to) {
                    square.classList.add('last-move');
                }
            }

            if (selectedSquare === square.dataset.square) {
                square.classList.add('selected');
            }

            if (selectedSquare && isMyTurn && myColor) {
                const isLegalDest = legalMoves.some(m => 
                    m.substring(0, 2) === selectedSquare && 
                    m.substring(2, 4) === square.dataset.square
                );
                if (isLegalDest) {
                    square.classList.add('legal');
                }
            }

            square.addEventListener('click', function() { handleClick(square); });
            boardEl.appendChild(square);
        }

        function handleClick(square) {
            if (!isMyTurn || !myColor || gameStatus !== 'playing') return;

            const sq = square.dataset.square;
            const piece = square.querySelector('img');
            const isMyPiece = piece && (
                (myColor === 'white' && piece.src.includes('/w')) ||
                (myColor === 'black' && piece.src.includes('/b'))
            );

            if (!selectedSquare) {
                if (isMyPiece) {
                    selectedSquare = sq;
                    drawBoard();
                }
                return;
            }

            if (selectedSquare === sq) {
                selectedSquare = null;
                drawBoard();
                return;
            }

            const matchingMove = legalMoves.find(m => 
                m.substring(0, 2) === selectedSquare && 
                m.substring(2, 4) === sq
            );

            if (matchingMove) {
                const fromSquare = document.querySelector('[data-square="' + selectedSquare + '"]');
                const fromPiece = fromSquare.querySelector('img');
                const isPawn = fromPiece && (fromPiece.src.includes('wP') || fromPiece.src.includes('bP'));
                const promoRank = myColor === 'white' ? '8' : '1';

                if (isPawn && sq[1] === promoRank) {
                    if (matchingMove.length === 4) {
                        pendingPromo = selectedSquare + sq;
                        document.getElementById('promoModal').classList.add('active');
                        return;
                    }
                }
                sendMove(matchingMove);
            } else if (isMyPiece) {
                selectedSquare = sq;
                drawBoard();
            } else {
                selectedSquare = null;
                drawBoard();
            }
        }

        function doPromo(piece) {
            document.getElementById('promoModal').classList.remove('active');
            if (pendingPromo) {
                sendMove(pendingPromo + piece);
                pendingPromo = null;
            }
        }

        function sendMove(move) {
            selectedSquare = null;
            socket.emit('make_move', {
                room_code: roomCode,
                move: move
            });
        }

        function updateMoves() {
            const container = document.getElementById('moves');
            container.innerHTML = '';

            moveHistory.forEach((pair, i) => {
                const div = document.createElement('div');
                div.className = 'move-pair';
                div.innerHTML = '<span class="move-num">' + (i + 1) + '.</span> ' +
                    '<span class="move-w">' + (pair.white || '...') + '</span>' +
                    (pair.black ? ' <span class="move-b">' + pair.black + '</span>' : '');
                container.appendChild(div);
            });
        }

        function showGameOver(result, reason) {
            const overlay = document.getElementById('gameOver');
            const text = document.getElementById('gameOverText');

            let msg = '';
            let color = '#fff';

            if (!myColor) {
                msg = 'Game Over: ' + result;
                color = '#888';
            } else {
                const playerWon = (myColor === 'white' && result === '1-0') || (myColor === 'black' && result === '0-1');
                const playerLost = (myColor === 'white' && result === '0-1') || (myColor === 'black' && result === '1-0');

                if (playerWon) { msg = 'You Win!'; color = '#4CAF50'; }
                else if (playerLost) { msg = 'You Lose!'; color = '#e74c3c'; }
                else { msg = 'Draw!'; color = '#f39c12'; }

                if (reason) msg += ' (' + reason + ')';
            }

            text.textContent = msg;
            text.style.color = color;
            overlay.classList.add('active');
            setStatus('Game Over: ' + result);
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function newGame() {
            location.reload();
        }
    </script>
</body>
