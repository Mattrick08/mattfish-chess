<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MattFish - Spectate</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            gap: 30px;
            padding: 20px;
            min-height: 100vh;
        }
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { color: #e74c3c; margin: 0; font-size: 28px; }
        #status { background: #2e2e2e; padding: 15px; border-radius: 8px; font-size: 15px; }
        .join-section {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
        }
        .join-section h3 { font-size: 14px; color: #e74c3c; margin-bottom: 12px; }
        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #555;
            background: #1e1e1e; color: white; font-size: 16px; text-align: center;
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px;
        }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .btn-primary { background: #e74c3c; color: white; }
        .btn-primary:hover { background: #c0392b; }
        .timer-display {
            background: #2e2e2e; padding: 12px 15px; border-radius: 8px;
            font-size: 24px; font-weight: bold; font-family: 'Courier New', monospace;
            text-align: center; letter-spacing: 2px;
        }
        .timer-display.active-turn { border: 2px solid #4CAF50; background: rgba(76, 175, 80, 0.1); }
        .board-area {
            display: flex; flex-direction: column; align-items: center; gap: 15px; flex: 1;
        }
        .board-wrapper {
            position: relative; display: flex; align-items: center; gap: 10px;
        }
        .coords-ranks {
            position: absolute; left: -25px; top: 0; height: 560px;
            display: flex; flex-direction: column; justify-content: space-around;
            font-size: 14px; color: #888; width: 20px; text-align: center;
        }
        .coords-files {
            display: flex; justify-content: space-around; width: 560px;
            padding: 5px 0; font-size: 14px; color: #888;
        }
        #board {
            display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px);
            border: 3px solid #555; border-radius: 4px;
        }
        .square {
            width: 70px; height: 70px; display: flex; justify-content: center; align-items: center;
            cursor: default; user-select: none; position: relative;
        }
        .square img { width: 60px; height: 60px; pointer-events: none; }
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        .last-move { box-shadow: inset 0 0 0 4px rgba(255, 107, 107, 0.7); }
        .move-history {
            background: #2e2e2e; padding: 15px; border-radius: 8px;
            width: 560px; max-height: 120px; overflow-y: auto;
        }
        .move-history h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .moves-list { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
        .move-pair { background: #1a1a2e; padding: 4px 8px; border-radius: 4px; }
        .move-num { color: #888; }
        .move-w { color: #f0d9b5; }
        .move-b { color: #b58863; }
        .chat-section {
            background: #2a2a2a; border-radius: 10px; padding: 15px;
            max-height: 300px; display: flex; flex-direction: column;
        }
        .chat-section h3 { font-size: 13px; color: #e74c3c; margin-bottom: 8px; }
        .chat-messages {
            flex: 1; overflow-y: auto; max-height: 200px; margin-bottom: 10px; padding: 5px;
        }
        .chat-message { padding: 4px 8px; margin-bottom: 4px; border-radius: 4px; font-size: 13px; }
        .chat-message.white { color: #f0d9b5; }
        .chat-message.black { color: #b58863; }
        .chat-message.spectator { color: #aaa; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input {
            flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #555;
            background: #1e1e1e; color: white;
        }
        .chat-input-row button {
            padding: 8px 12px; background: #4CAF50; color: white; border: none;
            border-radius: 4px; cursor: pointer;
        }
        .spectator-count {
            background: #9C27B0; color: white; padding: 8px; border-radius: 6px;
            text-align: center; font-size: 13px;
        }
        .hidden { display: none !important; }
        a { color: #4CAF50; text-decoration: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>👁 Spectate</h1>
        <div id="status">Enter a room code to spectate</div>

        <div id="joinSection" class="join-section">
            <h3>Join a Game</h3>
            <input type="text" id="roomCode" placeholder="ROOM CODE" maxlength="6">
            <button class="btn btn-primary" onclick="joinSpectate()">Watch Game</button>
        </div>

        <div id="gameUI" class="hidden">
            <div class="timer-display" id="whiteTimer">10:00</div>
            <div class="timer-display" id="blackTimer">10:00</div>
            <div class="spectator-count" id="spectatorCount">0 spectators</div>

            <div class="chat-section">
                <h3>💬 Live Chat</h3>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Chat as spectator..." onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>

        <a href="/" target="_self">← Back to Stats</a>
        <a href="/play-friend" target="_self">🎮 Play a Friend</a>
    </div>

    <div class="board-area">
        <div class="board-wrapper">
            <div class="coords-ranks" id="ranks"></div>
            <div id="board"></div>
        </div>
        <div class="coords-files" id="files"></div>
        <div class="move-history">
            <h3>Move History</h3>
            <div class="moves-list" id="moves"></div>
        </div>
    </div>

    <script>
        const PIECE_IMAGES = {
            'P': '/static/pieces/wP (1).png', 'N': '/static/pieces/wN (1).png',
            'B': '/static/pieces/wB (1).png', 'R': '/static/pieces/wR (1).png',
            'Q': '/static/pieces/wQ (1).png', 'K': '/static/pieces/wK (1).png',
            'p': '/static/pieces/bP (1).png', 'n': '/static/pieces/bN (1).png',
            'b': '/static/pieces/bB (1).png', 'r': '/static/pieces/bR (1).png',
            'q': '/static/pieces/bQ (1).png', 'k': '/static/pieces/bK (1).png'
        };

        // FIX: Use polling fallback for Render free tier compatibility
        const socket = io({ transports: ['websocket', 'polling'] });

        let roomCode = null;
        let currentFEN = '';
        let lastMove = null;
        let moveHistory = [];
        let whiteTime = 180;
        let blackTime = 180;
        let timerInterval = null;

        function joinSpectate() {
            const code = document.getElementById('roomCode').value.trim().toUpperCase();
            if (code.length !== 6) {
                setStatus('Please enter a valid 6-character room code');
                return;
            }
            roomCode = code;
            console.log('Joining room:', roomCode);
            socket.emit('join_room', { room_code: code });
        }

        socket.on('connect', () => {
            console.log('Connected to server, socket id:', socket.id);
        });

        socket.on('connect_error', (err) => {
            console.error('Connection error:', err.message);
        });

        socket.on('joined_as_spectator', (data) => {
            console.log('Joined as spectator:', data);
            document.getElementById('joinSection').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            currentFEN = data.fen;

            if (data.chat) {
                data.chat.forEach(msg => addChatMessage(msg.sender, msg.message));
            }
            setupBoard();
            setStatus('Spectating room ' + roomCode);
            socket.emit('request_sync', { room_code: roomCode });
        });

        socket.on('sync_state', (data) => {
            console.log('Sync state:', data);
            currentFEN = data.fen;
            if (data.timers) {
                whiteTime = data.timers.white || whiteTime;
                blackTime = data.timers.black || blackTime;
            }
            updateTimerDisplay();
            setupBoard();
        });

        socket.on('move_made', (data) => {
            console.log('Move made:', data);
            currentFEN = data.fen;
            lastMove = {
                from: data.move.substring(0, 2),
                to: data.move.substring(2, 4)
            };

            if (data.timers) {
                whiteTime = data.timers.white || whiteTime;
                blackTime = data.timers.black || blackTime;
            }
            updateTimerDisplay();

            if (data.player_color === 'white') {
                moveHistory.push({ white: data.move, black: null });
            } else {
                if (moveHistory.length > 0 && moveHistory[moveHistory.length - 1].black === null) {
                    moveHistory[moveHistory.length - 1].black = data.move;
                } else {
                    moveHistory.push({ white: '...', black: data.move });
                }
            }
            updateMoves();
            drawBoard();
        });

        socket.on('chat_message', (data) => {
            addChatMessage(data.sender, data.message);
        });

        socket.on('spectator_joined', (data) => {
            document.getElementById('spectatorCount').textContent = data.count + ' spectator' + (data.count !== 1 ? 's' : '');
        });

        socket.on('game_over', (data) => {
            stopTimer();
            setStatus('Game Over: ' + data.result + ' (' + data.reason + ')');
        });

        socket.on('error', (data) => {
            console.error('Error:', data);
            setStatus('Error: ' + data.message);
        });

        function formatTime(seconds) {
            if (seconds <= 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function updateTimerDisplay() {
            document.getElementById('whiteTimer').textContent = formatTime(whiteTime);
            document.getElementById('blackTimer').textContent = formatTime(blackTime);
        }

        function startTimer(activeColor) {
            stopTimer();
            document.getElementById('whiteTimer').classList.toggle('active-turn', activeColor === 'white');
            document.getElementById('blackTimer').classList.toggle('active-turn', activeColor === 'black');

            timerInterval = setInterval(function() {
                if (activeColor === 'white') whiteTime -= 0.1;
                else blackTime -= 0.1;
                updateTimerDisplay();
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            document.getElementById('whiteTimer').classList.remove('active-turn');
            document.getElementById('blackTimer').classList.remove('active-turn');
        }

        function addChatMessage(sender, message) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-message';
            if (sender === 'White') div.className += ' white';
            else if (sender === 'Black') div.className += ' black';
            else div.className += ' spectator';
            div.textContent = sender + ': ' + message;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg || !roomCode) return;
            socket.emit('send_chat', { room_code: roomCode, message: msg });
            input.value = '';
        }

        function setupBoard() {
            document.getElementById('ranks').innerHTML = '87654321'.split('').map(r => '<div>' + r + '</div>').join('');
            document.getElementById('files').innerHTML = 'abcdefgh'.split('').map(f => '<span>' + f + '</span>').join('');
            drawBoard();
        }

        function drawBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            if (!currentFEN) {
                console.warn('No FEN available, cannot draw board');
                return;
            }

            const fenParts = currentFEN.split(' ');
            const fenRows = fenParts[0].split('/');
            const grid = [];
            for (let r = 0; r < 8; r++) {
                const row = [];
                for (let char of fenRows[r]) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) row.push(null);
                    } else row.push(char);
                }
                grid.push(row);
            }
            for (let vRow = 0; vRow < 8; vRow++) {
                for (let vCol = 0; vCol < 8; vCol++) {
                    const piece = grid[vRow][vCol];
                    const squareName = 'abcdefgh'[vCol] + (8 - vRow);
                    const square = document.createElement('div');
                    const isLight = (vRow + vCol) % 2 === 0;
                    square.className = 'square ' + (isLight ? 'light' : 'dark');
                    if (piece && PIECE_IMAGES[piece]) {
                        const img = document.createElement('img');
                        img.src = PIECE_IMAGES[piece];
                        square.appendChild(img);
                    }
                    if (lastMove && (squareName === lastMove.from || squareName === lastMove.to)) {
                        square.classList.add('last-move');
                    }
                    board.appendChild(square);
                }
            }
        }

        function updateMoves() {
            const container = document.getElementById('moves');
            container.innerHTML = '';
            moveHistory.forEach((pair, i) => {
                const div = document.createElement('div');
                div.className = 'move-pair';
                div.innerHTML = '<span class="move-num">' + (i + 1) + '.</span> ' +
                    '<span class="move-w">' + (pair.white || '...') + '</span>' +
                    (pair.black ? ' <span class="move-b">' + pair.black + '</span>' : '');
                container.appendChild(div);
            });
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }
    </script>
</body>
</html>
