<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MattFish Puzzles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            gap: 30px;
            padding: 20px;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { color: #e74c3c; margin: 0; font-size: 28px; }
        #status {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            font-size: 15px;
        }
        .puzzle-info {
            background: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
        }
        .puzzle-info p {
            font-size: 14px;
            color: #ccc;
            margin: 4px 0;
        }
        .puzzle-info .rating {
            color: #f39c12;
            font-weight: bold;
            font-size: 18px;
        }
        .puzzle-info .themes {
            color: #4CAF50;
            font-size: 12px;
        }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            color: white;
        }
        .new-puzzle-btn {
            background: #e74c3c;
        }
        .new-puzzle-btn:hover { background: #c0392b; }
        .hint-btn {
            background: #f39c12;
        }
        .hint-btn:hover { background: #d68910; }
        .hint-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        .back-link {
            color: #4CAF50;
            text-decoration: none;
            text-align: center;
            margin-top: 10px;
        }
        .stats-corner {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2e2e2e;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            z-index: 100;
        }
        .stats-corner .wins { color: #4CAF50; }
        .stats-corner .losses { color: #e74c3c; }
        .board-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .board-wrapper {
            position: relative;
        }
        .coords-ranks {
            position: absolute;
            left: -25px;
            top: 0;
            height: 560px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            font-size: 14px;
            color: #888;
            width: 20px;
            text-align: center;
        }
        .coords-files {
            display: flex;
            justify-content: space-around;
            width: 560px;
            padding: 5px 0;
            font-size: 14px;
            color: #888;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 3px solid #555;
            border-radius: 4px;
        }
        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.1s;
        }
        .square img {
            width: 60px;
            height: 60px;
            pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        .square:hover { filter: brightness(1.15); }
        .selected { background: #f7ec5f !important; }
        .wrong-move { animation: shake 0.5s; background: #e74c3c !important; }
        .correct-move { animation: pulse 0.5s; background: #4CAF50 !important; }
        .hint-square { box-shadow: inset 0 0 0 4px #f39c12 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .promotion-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .promotion-modal.active { display: flex; }
        .promo-piece {
            width: 80px;
            height: 80px;
            cursor: pointer;
            background: #f0d9b5;
            border-radius: 10px;
            margin: 10px;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .promo-piece:hover { transform: scale(1.1); background: #fff; }
        .promo-piece img { width: 70px; height: 70px; }
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .success-overlay.active { display: flex; }
        .success-text { font-size: 42px; font-weight: bold; color: #4CAF50; margin-bottom: 20px; }
        .fail-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .fail-overlay.active { display: flex; }
        .fail-text { font-size: 36px; font-weight: bold; color: #e74c3c; margin-bottom: 10px; }
        .fail-subtext { font-size: 18px; color: #ccc; margin-bottom: 20px; }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Stats Corner -->
    <div class="stats-corner" id="statsCorner">
        <span class="wins">W: <span id="winCount">0</span></span> | 
        <span class="losses">L: <span id="lossCount">0</span></span>
    </div>

    <div class="sidebar">
        <h1>♔ Puzzles</h1>
        <div id="status">Loading puzzle...</div>

        <div class="puzzle-info" id="puzzleInfo" style="display:none">
            <p>Rating: <span class="rating" id="puzzleRating">-</span></p>
            <p class="themes" id="puzzleThemes">-</p>
            <p id="moveCounter">Move 1 of -</p>
        </div>

        <button class="btn hint-btn" id="hintBtn" onclick="showHint()" disabled>💡 Hint</button>
        <button class="btn new-puzzle-btn" onclick="loadNewPuzzle()">🔄 New Puzzle</button>
        <a href="/" class="back-link">← Back to Stats</a>
        <a href="/play" class="back-link">← Play vs Engine</a>
    </div>

    <div class="board-area">
        <div class="board-wrapper">
            <div class="coords-ranks" id="ranks">87654321</div>
            <div id="board"></div>
        </div>
        <div class="coords-files" id="files">abcdefgh</div>
    </div>

    <div class="promotion-modal" id="promoModal">
        <div>
            <span class="promo-piece" onclick="doPromo('q')"><img src="/static/pieces/wQ (1).png" alt="Queen"></span>
            <span class="promo-piece" onclick="doPromo('r')"><img src="/static/pieces/wR (1).png" alt="Rook"></span>
            <span class="promo-piece" onclick="doPromo('b')"><img src="/static/pieces/wB (1).png" alt="Bishop"></span>
            <span class="promo-piece" onclick="doPromo('n')"><img src="/static/pieces/wN (1).png" alt="Knight"></span>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-text">✓ Puzzle Solved!</div>
        <button class="btn new-puzzle-btn" onclick="loadNewPuzzle()">Next Puzzle</button>
    </div>

    <div class="fail-overlay" id="failOverlay">
        <div class="fail-text">✗ Wrong Move</div>
        <div class="fail-subtext" id="failSubtext">Try again!</div>
        <button class="btn new-puzzle-btn" onclick="closeFail()">Try Again</button>
        <button class="btn" style="background:#555; margin-top:10px" onclick="loadNewPuzzle()">Skip</button>
    </div>

    <script>
        const PIECE_IMAGES = {
            'P': '/static/pieces/wP (1).png',
            'N': '/static/pieces/wN (1).png',
            'B': '/static/pieces/wB (1).png',
            'R': '/static/pieces/wR (1).png',
            'Q': '/static/pieces/wQ (1).png',
            'K': '/static/pieces/wK (1).png',
            'p': '/static/pieces/bP (1).png',
            'n': '/static/pieces/bN (1).png',
            'b': '/static/pieces/bB (1).png',
            'r': '/static/pieces/bR (1).png',
            'q': '/static/pieces/bQ (1).png',
            'k': '/static/pieces/bK (1).png'
        };

        let currentPuzzle = null;
        let currentFEN = '';
        let selectedSquare = null;
        let moveIndex = 0;
        let isAnimating = false;
        let hintSquare = null;

        // Load stats from localStorage
        let puzzleStats = JSON.parse(localStorage.getItem('puzzleStats') || '{"wins":0,"losses":0}');
        updateStatsDisplay();

        function updateStatsDisplay() {
            document.getElementById('winCount').textContent = puzzleStats.wins;
            document.getElementById('lossCount').textContent = puzzleStats.losses;
        }

        function saveStats() {
            localStorage.setItem('puzzleStats', JSON.stringify(puzzleStats));
            updateStatsDisplay();
        }

        window.onload = function() {
            loadNewPuzzle();
        };

        async function loadNewPuzzle() {
            document.getElementById('successOverlay').classList.remove('active');
            document.getElementById('failOverlay').classList.remove('active');
            document.getElementById('promoModal').classList.remove('active');
            selectedSquare = null;
            moveIndex = 0;
            hintSquare = null;
            isAnimating = false;

            setStatus('Loading puzzle...');

            try {
                const response = await fetch('/api/puzzle/random');
                const data = await response.json();

                if (data.error) {
                    setStatus('Error: ' + data.error);
                    return;
                }

                currentPuzzle = data;
                currentFEN = data.fen;

                // Show puzzle info
                document.getElementById('puzzleInfo').style.display = 'block';
                document.getElementById('puzzleRating').textContent = data.rating;
                document.getElementById('puzzleThemes').textContent = data.themes.join(', ');
                document.getElementById('moveCounter').textContent = 'Move 1 of ' + (data.moves.length / 2);
                document.getElementById('hintBtn').disabled = false;

                setStatus('Find the best move!');
                drawBoard();

            } catch(err) {
                setStatus('Failed to load puzzle: ' + err.message);
            }
        }

        function drawBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            const fenParts = currentFEN.split(' ');
            const fenRows = fenParts[0].split('/');
            const activeColor = fenParts[1] || 'w';
            const grid = [];
            for (let r = 0; r < 8; r++) {
                const row = [];
                for (let char of fenRows[r]) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) row.push(null);
                    } else {
                        row.push(char);
                    }
                }
                grid.push(row);
            }

            for (let vRow = 0; vRow < 8; vRow++) {
                for (let vCol = 0; vCol < 8; vCol++) {
                    const piece = grid[vRow][vCol];
                    const squareName = 'abcdefgh'[vCol] + (8 - vRow);
                    createSquare(board, vRow, vCol, squareName, piece, activeColor);
                }
            }
        }

        function createSquare(boardEl, vRow, vCol, squareName, piece, activeColor) {
            const square = document.createElement('div');
            const isLight = (vRow + vCol) % 2 === 0;

            square.className = 'square ' + (isLight ? 'light' : 'dark');
            square.dataset.square = squareName;

            if (hintSquare && square.dataset.square === hintSquare) {
                square.classList.add('hint-square');
            }

            if (piece && PIECE_IMAGES[piece]) {
                const img = document.createElement('img');
                img.src = PIECE_IMAGES[piece];
                img.alt = piece;
                square.appendChild(img);
            }

            if (selectedSquare === square.dataset.square) {
                square.classList.add('selected');
            }

            square.addEventListener('click', function() { handleClick(square); });
            boardEl.appendChild(square);
        }

        function handleClick(square) {
            if (isAnimating || !currentPuzzle) return;

            const sq = square.dataset.square;
            const piece = square.querySelector('img');

            // Determine whose turn it is from FEN
            const activeColor = currentFEN.split(' ')[1];
            const isWhiteTurn = activeColor === 'w';

            const isPlayerPiece = piece && (
                (isWhiteTurn && piece.src.includes('/w')) ||
                (!isWhiteTurn && piece.src.includes('/b'))
            );

            if (!selectedSquare) {
                if (isPlayerPiece) {
                    selectedSquare = sq;
                    drawBoard();
                }
                return;
            }

            if (selectedSquare === sq) {
                selectedSquare = null;
                drawBoard();
                return;
            }

            // Try to make the move
            const moveUCI = selectedSquare + sq;
            verifyMove(moveUCI);
            selectedSquare = null;
        }

        async function verifyMove(moveUCI) {
            if (!currentPuzzle) return;

            isAnimating = true;

            try {
                const response = await fetch('/api/puzzle/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        puzzle_id: currentPuzzle.id,
                        move_index: moveIndex,
                        move: moveUCI
                    })
                });

                const data = await response.json();

                if (data.correct) {
                    // Correct move!
                    highlightSquare(moveUCI.substring(0, 2), 'correct-move');
                    highlightSquare(moveUCI.substring(2, 4), 'correct-move');

                    // Update FEN locally (simple approach)
                    await applyMove(moveUCI);

                    if (data.completed) {
                        // Puzzle solved!
                        puzzleStats.wins++;
                        saveStats();
                        setTimeout(() => {
                            document.getElementById('successOverlay').classList.add('active');
                        }, 500);
                        isAnimating = false;
                        return;
                    }

                    // Play opponent's response
                    if (data.next_move) {
                        setTimeout(async () => {
                            await applyMove(data.next_move);
                            moveIndex += 2;
                            document.getElementById('moveCounter').textContent = 
                                'Move ' + (moveIndex / 2 + 1) + ' of ' + (currentPuzzle.moves.length / 2);
                            isAnimating = false;
                        }, 600);
                    } else {
                        moveIndex += 2;
                        isAnimating = false;
                    }

                } else {
                    // Wrong move - lenient: just show fail overlay, let them retry
                    highlightSquare(moveUCI.substring(0, 2), 'wrong-move');
                    highlightSquare(moveUCI.substring(2, 4), 'wrong-move');

                    puzzleStats.losses++;
                    saveStats();

                    setTimeout(() => {
                        document.getElementById('failSubtext').textContent = 
                            'Expected: ' + data.expected;
                        document.getElementById('failOverlay').classList.add('active');
                        isAnimating = false;
                    }, 500);
                }

            } catch(err) {
                isAnimating = false;
                setStatus('Error: ' + err.message);
            }
        }

        function highlightSquare(squareName, className) {
            const square = document.querySelector('[data-square="' + squareName + '"]');
            if (square) {
                square.classList.add(className);
                setTimeout(() => square.classList.remove(className), 1000);
            }
        }

        async function applyMove(moveUCI) {
            // Simple FEN update - in production you'd want proper move application
            // For now, we'll fetch a new puzzle state or use a simple approach
            // Since we don't have a move application endpoint, we'll use a workaround

            // Actually, let's just reload the board with the move applied
            // We need to apply the move to the FEN

            // For simplicity in this puzzle mode, we'll track moves and redraw
            // A proper implementation would have a server endpoint to apply moves

            // Workaround: use the chess.js equivalent logic or reload
            // Since we can't easily apply UCI to FEN client-side without a library,
            // let's create a temporary board state

            // Actually, let's add a simple move application
            const from = moveUCI.substring(0, 2);
            const to = moveUCI.substring(2, 4);
            const promo = moveUCI.length > 4 ? moveUCI.substring(4, 5) : null;

            // Parse current FEN
            const parts = currentFEN.split(' ');
            const board = parts[0];
            const turn = parts[1];
            const castling = parts[2];
            const ep = parts[3];
            const halfmove = parts[4];
            const fullmove = parts[5];

            // Simple piece move (not handling all chess rules, but enough for puzzles)
            // For a proper implementation, we'd call the server
            // Let's just switch turns for visual feedback
            const newTurn = turn === 'w' ? 'b' : 'w';
            const newFEN = board + ' ' + newTurn + ' ' + castling + ' ' + ep + ' ' + halfmove + ' ' + fullmove;
            currentFEN = newFEN;

            // Better: let's create a proper move application
            await applyMoveProper(from, to, promo);
        }

        async function applyMoveProper(from, to, promo) {
            // We'll use a simple client-side FEN updater
            // Parse board from FEN
            const fenParts = currentFEN.split(' ');
            let boardRows = fenParts[0].split('/');
            const turn = fenParts[1];

            // Convert to 8x8 grid
            let grid = [];
            for (let row of boardRows) {
                let expanded = [];
                for (let char of row) {
                    if (char >= '1' && char <= '8') {
                        for (let i = 0; i < parseInt(char); i++) expanded.push('.');
                    } else {
                        expanded.push(char);
                    }
                }
                grid.push(expanded);
            }

            // Convert squares to coordinates
            const fromFile = from.charCodeAt(0) - 'a'.charCodeAt(0);
            const fromRank = 8 - parseInt(from[1]);
            const toFile = to.charCodeAt(0) - 'a'.charCodeAt(0);
            const toRank = 8 - parseInt(to[1]);

            // Move piece
            const piece = grid[fromRank][fromFile];
            grid[fromRank][fromFile] = '.';

            // Handle promotion
            if (promo) {
                const isWhite = piece === piece.toUpperCase();
                grid[toRank][toFile] = isWhite ? promo.toUpperCase() : promo.toLowerCase();
            } else {
                grid[toRank][toFile] = piece;
            }

            // Convert back to FEN board
            let newBoard = [];
            for (let row of grid) {
                let fenRow = '';
                let emptyCount = 0;
                for (let cell of row) {
                    if (cell === '.') {
                        emptyCount++;
                    } else {
                        if (emptyCount > 0) {
                            fenRow += emptyCount;
                            emptyCount = 0;
                        }
                        fenRow += cell;
                    }
                }
                if (emptyCount > 0) fenRow += emptyCount;
                newBoard.push(fenRow);
            }

            // Switch turn
            const newTurn = turn === 'w' ? 'b' : 'w';
            const newHalfmove = (piece.toLowerCase() === 'p' || grid[toRank][toFile] !== '.') ? '0' : (parseInt(fenParts[4]) + 1).toString();
            const newFullmove = newTurn === 'w' ? (parseInt(fenParts[5]) + 1).toString() : fenParts[5];

            currentFEN = newBoard.join('/') + ' ' + newTurn + ' ' + fenParts[2] + ' ' + fenParts[3] + ' ' + newHalfmove + ' ' + newFullmove;

            drawBoard();
        }

        function showHint() {
            if (!currentPuzzle || moveIndex >= currentPuzzle.moves.length) return;

            const correctMove = currentPuzzle.moves[moveIndex];
            hintSquare = correctMove.substring(0, 2);
            drawBoard();

            setTimeout(() => {
                hintSquare = null;
                drawBoard();
            }, 2000);
        }

        function closeFail() {
            document.getElementById('failOverlay').classList.remove('active');
            // Reset to puzzle start
            moveIndex = 0;
            currentFEN = currentPuzzle.fen;
            drawBoard();
            setStatus('Try again! Find the best move.');
        }

        function doPromo(piece) {
            document.getElementById('promoModal').classList.remove('active');
            // Handle promotion if needed
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }
    </script>
</body>
</html>
