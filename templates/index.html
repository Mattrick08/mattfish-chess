<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e1e1e">
    <link rel="icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>MattFish</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 30px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .top-section {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .left-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            width: 300px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover { background-color: #45a049; }

        .period-btn {
            background-color: #555;
            font-size: 14px;
            padding: 8px 14px;
        }

        .period-btn.active { background-color: #4CAF50; }

        .avatar-frame {
            border: 8px solid #4a2e0a;
            padding: 6px;
            background-color: #7a4a1a;
            border-radius: 4px;
        }

        .avatar-frame img {
            width: 150px;
            height: 150px;
            display: block;
        }

        .avatar-placeholder {
            width: 150px;
            height: 150px;
            background-color: #2e2e2e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
        }

        .stats-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: #2e2e2e;
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            text-align: center;
        }

        .stat-card h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #4CAF50;
        }

        .stat-card p {
            font-size: 14px;
            margin: 5px 0;
            color: #ccc;
        }

        .stat-card .rating {
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .chart-section {
            max-width: 900px;
            margin: 0 auto 40px auto;
            background-color: #2e2e2e;
            border-radius: 10px;
            padding: 20px;
        }

        .chart-section h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #4CAF50;
        }

        .pie-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .pie-card {
            background-color: #2e2e2e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 220px;
        }

        .pie-card h3 {
            margin-bottom: 10px;
            color: #4CAF50;
        }

        .openings-section {
            max-width: 900px;
            margin: 0 auto 40px auto;
            background-color: #2e2e2e;
            border-radius: 10px;
            padding: 20px;
        }

        .openings-section h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #4CAF50;
        }

        .sort-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sort-btn {
            background-color: #555;
            font-size: 14px;
            padding: 8px 14px;
        }

        .sort-btn.active { background-color: #2196F3; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #444;
            font-size: 14px;
        }

        th { color: #4CAF50; }
        td { color: #ccc; }

        .loading {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
        }

        .h2h-section {
            max-width: 900px;
            margin: 0 auto 40px auto;
            background-color: #2e2e2e;
            border-radius: 10px;
            padding: 20px;
        }

        .h2h-section h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #4CAF50;
        }

        .h2h-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .h2h-inputs input {
            width: 220px;
        }

        .h2h-vs {
            font-weight: bold;
            color: #888;
        }

        .h2h-error {
            text-align: center;
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .h2h-summary {
            display: none;
        }

        .h2h-players {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .h2h-player {
            text-align: center;
        }

        .h2h-player img,
        .h2h-player .h2h-avatar-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            display: block;
            margin: 0 auto 8px auto;
            background-color: #1e1e1e;
        }

        .h2h-player .h2h-avatar-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
        }

        .h2h-player .name {
            font-weight: bold;
            font-size: 15px;
        }

        .h2h-player .wins {
            font-size: 26px;
            font-weight: bold;
            color: #4CAF50;
            margin-top: 4px;
        }

        .h2h-draws {
            text-align: center;
        }

        .h2h-draws .count {
            font-size: 22px;
            font-weight: bold;
            color: #aaa;
        }

        .h2h-draws .label {
            font-size: 12px;
            color: #888;
        }

        .h2h-bar {
            display: flex;
            height: 22px;
            border-radius: 6px;
            overflow: hidden;
            max-width: 500px;
            margin: 0 auto 20px auto;
        }

        .h2h-bar-segment.win1 { background-color: #4CAF50; }
        .h2h-bar-segment.draw { background-color: #777; }
        .h2h-bar-segment.win2 { background-color: #e74c3c; }

        .h2h-total {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .h2h-games-table {
            display: none;
        }

        .outcome-pill {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .outcome-pill.win { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .outcome-pill.loss { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .outcome-pill.draw { background-color: rgba(150, 150, 150, 0.2); color: #ccc; }

        .h2h-games-table a {
            color: #2196F3;
            text-decoration: none;
        }

        .h2h-games-table a:hover {
            text-decoration: underline;
        }
    </style>

<base target="_blank">
    <script src="/static/theme.js"></script>
    <style>
        /* Personalize toggle button */
        .personalize-toggle-btn {
            display: block;
            margin: 0 auto 20px auto;
            padding: 10px 30px;
            font-size: 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .personalize-toggle-btn:hover {
            background: #c0392b;
        }
        /* Personalize panel */
        .personalize-panel {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin: 0 auto 30px auto;
            max-width: 400px;
        }
        .personalize-panel h3 {
            font-size: 14px;
            margin-bottom: 12px;
            text-align: center;
        }
        .section-title {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin: 10px 0 6px 0;
            letter-spacing: 0.5px;
        }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }
        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .color-swatch:hover {
            transform: scale(1.15);
            border-color: white;
            z-index: 2;
            position: relative;
        }
        .color-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 0 2px #e74c3c;
        }
        .custom-color-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .custom-color-row label {
            font-size: 11px;
            color: #aaa;
            min-width: 70px;
        }
        .custom-color-row input[type="color"] {
            width: 36px;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        .custom-color-row input[type="text"] {
            flex: 1;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
            width: auto;
        }
        .upload-area {
            border: 2px dashed #555;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .upload-area:hover {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }
        .upload-area.dragover {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .upload-area p {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-btn {
            padding: 6px 14px;
            font-size: 12px;
            background: #444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .upload-btn:hover { background: #555; }
        .preview-img {
            max-width: 100%;
            max-height: 80px;
            border-radius: 6px;
            margin-top: 8px;
            display: none;
        }
        .preview-img.visible {
            display: block;
        }
        .remove-img-btn {
            padding: 4px 10px;
            font-size: 11px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 6px;
            display: none;
        }
        .remove-img-btn.visible {
            display: inline-block;
        }
        .remove-img-btn:hover { background: #a93226; }
        .reset-btn {
            width: 100%;
            padding: 8px;
            font-size: 12px;
            background: #555;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
        }
        .reset-btn:hover { background: #666; }
        .bg-image-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            opacity: 0.12;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
        }
    </style>

</head>
<body>
    <div class="bg-image-overlay" id="bgImageOverlay"></div>


<h1>MattFish</h1>

    <button id="personalizeToggleBtn" class="personalize-toggle-btn" onclick="togglePersonalizePanel()">&#127912; Personalize</button>

    <div id="themePanelContainer" style="text-align:center;"></div>

<div style="text-align: center; margin-bottom: 25px;">
    <a href="/play" style="
        display: inline-block;
        padding: 15px 40px;
        font-size: 18px;
        background: #e74c3c;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
        font-weight: bold;
        margin: 5px;
    " onmouseover="this.style.background='#c0392b'" onmouseout="this.style.background='#e74c3c'">
        ♔ Play vs MattFish Engine ♚
    </a>
    <a href="/multiplayer" style="
        display: inline-block;
        padding: 15px 40px;
        font-size: 18px;
        background: #2196F3;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
        font-weight: bold;
        margin: 5px;
    " onmouseover="this.style.background='#1769aa'" onmouseout="this.style.background='#2196F3'">
        ♟ Play a Friend
    </a>
    <a href="/review" style="
        display: inline-block;
        padding: 15px 40px;
        font-size: 18px;
        background: #3ba55c;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
        font-weight: bold;
        margin: 5px;
    " onmouseover="this.style.background='#2f8a4c'" onmouseout="this.style.background='#3ba55c'">
        📊 Review a Game
    </a>

</div>

<div class="top-section">
    <div class="left-inputs">
        <input type="text" id="username" placeholder="Enter your Chess.com username">
        <div class="buttons">
            <button onclick="loadAll()">Load Stats</button>
        </div>
        <div class="buttons">
            <button class="period-btn active" onclick="setPeriod(3, this)">Last 3 months</button>
            <button class="period-btn" onclick="setPeriod(6, this)">Last 6 months</button>
            <button class="period-btn" onclick="setPeriod(12, this)">Last year</button>
            <button class="period-btn" onclick="setPeriod(999, this)">All time</button>
        </div>
    </div>
    <div class="avatar-frame">
        <div class="avatar-placeholder" id="avatar-placeholder">No avatar</div>
        <img id="avatar-img" style="display:none" src="" alt="Avatar">
    </div>
</div>

<div class="stats-section" id="stats-section"></div>

<div class="pie-section" id="pie-section"></div>

<div class="chart-section" id="chart-section" style="display:none">
    <h2>Rating History</h2>
    <p class="loading" id="chart-loading">Loading games...</p>
    <canvas id="ratingChart"></canvas>
</div>

<div class="openings-section" id="openings-section" style="display:none">
    <h2>Opening Explorer</h2>
    <div class="sort-buttons">
        <button class="sort-btn active" onclick="sortOpenings('most_played', this)">Most Played</button>
        <button class="sort-btn" onclick="sortOpenings('winrate', this)">Best Winrate</button>
    </div>
    <p class="loading" id="openings-loading">Loading openings...</p>
    <table id="openings-table">
        <thead>
            <tr>
                <th>Opening</th>
                <th>Games</th>
                <th>Wins</th>
                <th>Draws</th>
                <th>Losses</th>
                <th>Winrate</th>
            </tr>
        </thead>
        <tbody id="openings-body"></tbody>
    </table>
</div>

<div class="h2h-section">
    <h2>Head-to-Head</h2>
    <div class="h2h-inputs">
        <input type="text" id="h2h-user1" placeholder="First username">
        <span class="h2h-vs">vs</span>
        <input type="text" id="h2h-user2" placeholder="Second username">
        <button onclick="loadHeadToHead()">Compare</button>
    </div>
    <div class="buttons" style="justify-content: center; margin-bottom: 10px;">
        <button class="period-btn h2h-period-btn active" onclick="setH2hPeriod(3, this)">Last 3 months</button>
        <button class="period-btn h2h-period-btn" onclick="setH2hPeriod(6, this)">Last 6 months</button>
        <button class="period-btn h2h-period-btn" onclick="setH2hPeriod(12, this)">Last year</button>
        <button class="period-btn h2h-period-btn" onclick="setH2hPeriod(999, this)">All time</button>
    </div>
    <p class="loading" id="h2h-loading" style="display:none;">Loading head-to-head record...</p>
    <p class="h2h-error" id="h2h-error"></p>

    <div class="h2h-summary" id="h2h-summary">
        <div class="h2h-players">
            <div class="h2h-player">
                <div id="h2h-avatar1-placeholder" class="h2h-avatar-placeholder">?</div>
                <img id="h2h-avatar1" style="display:none" src="" alt="">
                <div class="name" id="h2h-name1"></div>
                <div class="wins" id="h2h-wins1"></div>
            </div>
            <div class="h2h-draws">
                <div class="count" id="h2h-draws-count"></div>
                <div class="label">Draws</div>
            </div>
            <div class="h2h-player">
                <div id="h2h-avatar2-placeholder" class="h2h-avatar-placeholder">?</div>
                <img id="h2h-avatar2" style="display:none" src="" alt="">
                <div class="name" id="h2h-name2"></div>
                <div class="wins" id="h2h-wins2"></div>
            </div>
        </div>
        <div class="h2h-bar" id="h2h-bar"></div>
        <div class="h2h-total" id="h2h-total"></div>

        <table class="h2h-games-table" id="h2h-games-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time Control</th>
                    <th id="h2h-color-header">Color</th>
                    <th>Result</th>
                    <th>Game</th>
                </tr>
            </thead>
            <tbody id="h2h-games-body"></tbody>
        </table>
    </div>
</div>

<script>
    let currentPeriod = 3;
    let ratingChart = null;
    let pieCharts = {};
    let openingsData = [];
    let currentSort = "most_played";

    function setPeriod(months, btn) {
        currentPeriod = months;
        document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    async function loadAll() {
        const username = document.getElementById("username").value;
        if (!username) return;
        await loadStats(username);
        await loadHistory(username);
        await loadOpenings(username);
    }

    async function loadStats(username) {
        const response = await fetch(`/stats/${username}`);
        const data = await response.json();

        // Avatar
        if (data.avatar) {
            document.getElementById("avatar-placeholder").style.display = "none";
            const img = document.getElementById("avatar-img");
            img.src = data.avatar;
            img.style.display = "block";
        }

        const section = document.getElementById("stats-section");
        const pieSection = document.getElementById("pie-section");
        section.innerHTML = "";
        pieSection.innerHTML = "";

        // Destroy old pie charts
        Object.values(pieCharts).forEach(c => c.destroy());
        pieCharts = {};

        for (const [name, stats] of Object.entries(data.stats)) {
            const total = stats.wins + stats.draws + stats.losses;

            // Stat card
            section.innerHTML += `
                <div class="stat-card">
                    <h2>${name}</h2>
                    <div class="rating">${stats.current}</div>
                    <p>Best: ${stats.best}</p>
                    <p>Wins: ${stats.wins}</p>
                    <p>Draws: ${stats.draws}</p>
                    <p>Losses: ${stats.losses}</p>
                    <p>Total: ${total}</p>
                </div>
            `;

            // Pie card
            const pieId = `pie-${name}`;
            pieSection.innerHTML += `
                <div class="pie-card">
                    <h3>${name}</h3>
                    <canvas id="${pieId}"></canvas>
                </div>
            `;

            setTimeout(() => {
                const ctx = document.getElementById(pieId).getContext("2d");
                pieCharts[name] = new Chart(ctx, {
                    type: "pie",
                    data: {
                        labels: ["Wins", "Losses", "Draws"],
                        datasets: [{
                            data: [stats.wins, stats.losses, stats.draws],
                            backgroundColor: ["green", "red", "gray"]
                        }]
                    },
                    options: {
                        plugins: {
                            legend: { labels: { color: "white" } }
                        }
                    }
                });
            }, 100);
        }
    }

    async function loadHistory(username) {
        const chartSection = document.getElementById("chart-section");
        const loading = document.getElementById("chart-loading");
        chartSection.style.display = "block";
        loading.style.display = "block";

        const response = await fetch(`/history/${username}/${currentPeriod}`);
        const data = await response.json();

        loading.style.display = "none";

        if (ratingChart) ratingChart.destroy();

        const ctx = document.getElementById("ratingChart").getContext("2d");
        ratingChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: data.blitz.map((_, i) => i + 1),
                datasets: [
                    { label: "Rapid", data: data.rapid, borderColor: "green", backgroundColor: "transparent", tension: 0.3, borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 3 },
                    { label: "Blitz", data: data.blitz, borderColor: "gold", backgroundColor: "transparent", tension: 0.3, borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 3 },
                    { label: "Bullet", data: data.bullet, borderColor: "peru", backgroundColor: "transparent", tension: 0.3, borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 3 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: "white" } } },
                scales: {
                    x: { ticks: { color: "white" }, grid: { color: "#444" } },
                    y: { ticks: { color: "white" }, grid: { color: "#444" } }
                }
            }
        });
    }

    async function loadOpenings(username) {
        const section = document.getElementById("openings-section");
        const loading = document.getElementById("openings-loading");
        section.style.display = "block";
        loading.style.display = "block";

        const response = await fetch(`/openings/${username}/${currentPeriod}`);
        openingsData = await response.json();

        loading.style.display = "none";
        sortOpenings(currentSort);
    }

    function sortOpenings(sortBy, btn) {
        currentSort = sortBy;
        document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
        if (btn) btn.classList.add("active");

        let sorted = [...openingsData];
        if (sortBy === "most_played") {
            sorted.sort((a, b) => b.total - a.total);
        } else {
            sorted = sorted.filter(o => o.total >= 3);
            sorted.sort((a, b) => b.winrate - a.winrate);
        }

        const tbody = document.getElementById("openings-body");
        tbody.innerHTML = "";
        sorted.slice(0, 10).forEach(o => {
            tbody.innerHTML += `
                <tr>
                    <td>${o.name}</td>
                    <td>${o.total}</td>
                    <td style="color: green">${o.wins}</td>
                    <td style="color: gray">${o.draws}</td>
                    <td style="color: red">${o.losses}</td>
                    <td>${o.winrate}%</td>
                </tr>
            `;
        });
    }

    let h2hPeriod = 3;

    function setH2hPeriod(months, btn) {
        h2hPeriod = months;
        document.querySelectorAll(".h2h-period-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    function setH2hAvatar(prefix, url, fallbackLetter) {
        const placeholder = document.getElementById(`${prefix}-placeholder`);
        const img = document.getElementById(prefix);
        if (url) {
            placeholder.style.display = "none";
            img.src = url;
            img.style.display = "block";
        } else {
            img.style.display = "none";
            placeholder.style.display = "flex";
            placeholder.textContent = fallbackLetter.toUpperCase();
        }
    }

    async function loadHeadToHead() {
        const user1 = document.getElementById("h2h-user1").value.trim();
        const user2 = document.getElementById("h2h-user2").value.trim();
        const errorEl = document.getElementById("h2h-error");
        const loadingEl = document.getElementById("h2h-loading");
        const summaryEl = document.getElementById("h2h-summary");
        const gamesTable = document.getElementById("h2h-games-table");

        errorEl.style.display = "none";
        summaryEl.style.display = "none";
        gamesTable.style.display = "none";

        if (!user1 || !user2) {
            errorEl.textContent = "Enter both usernames.";
            errorEl.style.display = "block";
            return;
        }

        loadingEl.style.display = "block";

        try {
            const response = await fetch(`/api/h2h/${encodeURIComponent(user1)}/${encodeURIComponent(user2)}/${h2hPeriod}`);
            const data = await response.json();

            loadingEl.style.display = "none";

            if (!response.ok || data.error) {
                errorEl.textContent = data.error || "Something went wrong.";
                errorEl.style.display = "block";
                return;
            }

            document.getElementById("h2h-name1").textContent = data.user1;
            document.getElementById("h2h-name2").textContent = data.user2;
            document.getElementById("h2h-wins1").textContent = data.user1_wins;
            document.getElementById("h2h-wins2").textContent = data.user2_wins;
            document.getElementById("h2h-draws-count").textContent = data.draws;
            document.getElementById("h2h-color-header").textContent = `${data.user1}'s Color`;

            setH2hAvatar("h2h-avatar1", data.user1_avatar, data.user1[0] || "?");
            setH2hAvatar("h2h-avatar2", data.user2_avatar, data.user2[0] || "?");

            const total = data.total_games;
            const bar = document.getElementById("h2h-bar");
            bar.innerHTML = "";
            if (total > 0) {
                const pct1 = (data.user1_wins / total) * 100;
                const pctDraw = (data.draws / total) * 100;
                const pct2 = (data.user2_wins / total) * 100;
                bar.innerHTML = `
                    <div class="h2h-bar-segment win1" style="width:${pct1}%"></div>
                    <div class="h2h-bar-segment draw" style="width:${pctDraw}%"></div>
                    <div class="h2h-bar-segment win2" style="width:${pct2}%"></div>
                `;
                document.getElementById("h2h-total").textContent =
                    `${total} game${total === 1 ? "" : "s"} played (last ${h2hPeriod >= 999 ? "all time" : h2hPeriod + " months"})`;
            } else {
                document.getElementById("h2h-total").textContent =
                    `No games found between these players in this period.`;
            }

            const tbody = document.getElementById("h2h-games-body");
            tbody.innerHTML = "";
            if (data.games.length > 0) {
                gamesTable.style.display = "table";
                data.games.forEach(g => {
                    const date = new Date(g.end_time * 1000).toLocaleDateString();
                    const outcomeLabel = g.outcome === "win" ? "Win" : (g.outcome === "loss" ? "Loss" : "Draw");
                    const timeControlLabel = g.time_class ? g.time_class.charAt(0).toUpperCase() + g.time_class.slice(1) : "";
                    tbody.innerHTML += `
                        <tr>
                            <td>${date}</td>
                            <td>${timeControlLabel}</td>
                            <td>${g.u1_color === "white" ? "White" : "Black"}</td>
                            <td><span class="outcome-pill ${g.outcome}">${outcomeLabel}</span></td>
                            <td>${g.url ? `<a href="${g.url}" target="_blank">View</a>` : "-"}</td>
                        </tr>
                    `;
                });
            }

            summaryEl.style.display = "block";
        } catch (e) {
            loadingEl.style.display = "none";
            errorEl.textContent = "Could not load head-to-head data. Please try again.";
            errorEl.style.display = "block";
        }
    }
</script>

                    initThemePanel('themePanelContainer');
                }
            } catch (e) {
                console.log('Theme panel not available:', e);
            }
        };
