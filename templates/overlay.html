<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MattFish - Stream Overlay</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
        }
        /* Transparent background for chroma key */
        .overlay-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .eval-bar-container {
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            padding: 10px;
            backdrop-filter: blur(4px);
        }
        .eval-bar-wrapper {
            width: 100%;
            height: 20px;
            background: #b58863;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .eval-bar-white {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: #f0d9b5;
            transition: width 0.5s ease;
        }
        .eval-center-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e74c3c;
            z-index: 2;
        }
        .eval-number {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        .timer-box {
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .timer-label {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .timer-value {
            font-size: 24px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .timer-value.active { color: #4CAF50; }
        .timer-value.low { color: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .move-list-box {
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            backdrop-filter: blur(4px);
        }
        .move-list-box h3 {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .moves-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 13px;
        }
        .move-entry {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 3px;
        }
        .move-w { color: #f0d9b5; }
        .move-b { color: #b58863; }
        .status-box {
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        .join-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }
        .join-box input {
            padding: 12px;
            font-size: 18px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #1e1e1e;
            color: white;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            width: 200px;
            margin-bottom: 10px;
        }
        .join-box button {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .hidden { display: none !important; }
        /* Config panel for streamer setup */
        .config-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
        }
        .config-panel label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        .config-panel input[type="checkbox"] {
            margin-right: 5px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="join-box" id="joinBox">
        <h2 style="margin-bottom:15px;color:#e74c3c;">🔴 MattFish Stream Overlay</h2>
        <p style="margin-bottom:15px;color:#aaa;">Enter room code to overlay:</p>
        <input type="text" id="roomCode" placeholder="ROOM CODE" maxlength="6">
        <br>
        <button onclick="connectOverlay()">Connect</button>
        <p style="margin-top:15px;font-size:12px;color:#888;">
            Add this page as a Browser Source in OBS.<br>
            Size: 1920x1080 | Transparent background enabled.
        </p>
    </div>

    <div class="overlay-container hidden" id="overlayContainer">
        <div class="status-box" id="statusBox">Waiting for game...</div>

        <div class="timer-box">
            <span class="timer-label" id="whiteLabel">White</span>
            <span class="timer-value" id="whiteTimer">10:00</span>
        </div>

        <div class="eval-bar-container">
            <div class="eval-bar-wrapper">
                <div class="eval-bar-white" id="evalBarWhite" style="width:50%"></div>
                <div class="eval-center-line"></div>
            </div>
            <div class="eval-number" id="evalNumber">0.0</div>
        </div>

        <div class="timer-box">
            <span class="timer-label" id="blackLabel">Black</span>
            <span class="timer-value" id="blackTimer">10:00</span>
        </div>

        <div class="move-list-box">
            <h3>Moves</h3>
            <div class="moves-row" id="movesList"></div>
        </div>
    </div>

    <div class="config-panel" id="configPanel">
        <label><input type="checkbox" id="showEval" checked onchange="toggleEval()"> Show Eval Bar</label>
        <label><input type="checkbox" id="showTimers" checked onchange="toggleTimers()"> Show Timers</label>
        <label><input type="checkbox" id="showMoves" checked onchange="toggleMoves()"> Show Move List</label>
    </div>

    <script>
        const socket = io();
        let roomCode = null;
        let whiteTime = 180;
        let blackTime = 180;
        let timerInterval = null;

        function connectOverlay() {
            const code = document.getElementById('roomCode').value.trim().toUpperCase();
            if (code.length !== 6) return;
            roomCode = code;
            socket.emit('join_room', { room_code: code });
        }

        socket.on('joined_as_spectator', (data) => {
            document.getElementById('joinBox').classList.add('hidden');
            document.getElementById('overlayContainer').classList.remove('hidden');
            document.getElementById('statusBox').textContent = 'Spectating: ' + roomCode;
            socket.emit('request_sync', { room_code: roomCode });
        });

        socket.on('sync_state', (data) => {
            if (data.timers) {
                whiteTime = data.timers.white || whiteTime;
                blackTime = data.timers.black || blackTime;
            }
            updateTimers();
        });

        socket.on('move_made', (data) => {
            if (data.timers) {
                whiteTime = data.timers.white || whiteTime;
                blackTime = data.timers.black || blackTime;
            }
            updateTimers();

            const movesList = document.getElementById('movesList');
            const entry = document.createElement('span');
            entry.className = 'move-entry';
            if (data.player_color === 'white') {
                entry.innerHTML = '<span class="move-w">' + data.move + '</span>';
            } else {
                entry.innerHTML = '<span class="move-b">' + data.move + '</span>';
            }
            movesList.appendChild(entry);
            movesList.scrollTop = movesList.scrollHeight;

            // Keep only last 20 moves visible
            while (movesList.children.length > 20) {
                movesList.removeChild(movesList.firstChild);
            }
        });

        socket.on('game_over', (data) => {
            document.getElementById('statusBox').textContent = 'Game Over: ' + data.result;
            stopTimer();
        });

        socket.on('error', (data) => {
            alert('Error: ' + data.message);
        });

        function formatTime(seconds) {
            if (seconds <= 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function updateTimers() {
            document.getElementById('whiteTimer').textContent = formatTime(whiteTime);
            document.getElementById('blackTimer').textContent = formatTime(blackTime);
        }

        function startTimer(activeColor) {
            stopTimer();
            document.getElementById('whiteTimer').classList.toggle('active', activeColor === 'white');
            document.getElementById('blackTimer').classList.toggle('active', activeColor === 'black');

            timerInterval = setInterval(function() {
                if (activeColor === 'white') whiteTime -= 0.1;
                else blackTime -= 0.1;
                updateTimers();
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            document.getElementById('whiteTimer').classList.remove('active');
            document.getElementById('blackTimer').classList.remove('active');
        }

        // Config toggles
        function toggleEval() {
            document.querySelector('.eval-bar-container').style.display = 
                document.getElementById('showEval').checked ? 'block' : 'none';
        }
        function toggleTimers() {
            const display = document.getElementById('showTimers').checked ? 'flex' : 'none';
            document.querySelectorAll('.timer-box').forEach(el => el.style.display = display);
        }
        function toggleMoves() {
            document.querySelector('.move-list-box').style.display = 
                document.getElementById('showMoves').checked ? 'block' : 'none';
        }

        // Auto-connect from URL param
        const urlParams = new URLSearchParams(window.location.search);
        const autoCode = urlParams.get('room');
        if (autoCode && autoCode.length === 6) {
            document.getElementById('roomCode').value = autoCode;
            connectOverlay();
        }
    </script>
</body>
</html>
